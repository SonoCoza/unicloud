<!--
Changelog (refactor + feature update)
- Feature aggiunte: sidebar desktop collassabile + drawer mobile (persistenza), guard centralizzata route/permessi con pagina Accesso negato, validazioni robuste Viaggi con errori inline, import XML Fatture con dedup/complete-dati/link cliente, Clienti con tab Tutti/Scaduti-In scadenza, Files con tags/preview immagini/download unificato, nuova sezione Paghe con permesso payroll.manage e logging eventi.
- Migrazioni storage: schemaVersion nel root storage, inizializzazione safe di unitrans-ui, files.tags default [], payroll.status/visibility/netto default non distruttivi.
- Punti di attenzione: routing hash gestito centralmente con guardRoute; security per operatore ora è bloccata da permesso security.manage; import XML usa campi FatturaPA disponibili e richiede completamento solo se mancano sia denominazione sia P.IVA/CF.
-->
<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Portale Operativo Trasporti</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.svg">
  <style>
  :root{
    --bg:#090b12; --muted:#94a3b8; --text:#e6edf6; --brand:#ff1744; --brand-2:#ff5a78; --border:rgba(148,163,184,.22);
    --brand-rgb:255,23,68; --brand-2-rgb:255,90,120;
    --panel:rgba(255,255,255,.06);
    --font-body:'Plus Jakarta Sans','Segoe UI',sans-serif;
    --font-display:'Manrope','Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;}
  body{
    margin:0; color:var(--text); font-family:var(--font-body);
    background: radial-gradient(1200px 900px at 85% -10%, rgba(255,23,68,.22), transparent 60%),
               radial-gradient(1200px 900px at -10% -10%, rgba(255,90,120,.14), transparent 62%),
               radial-gradient(1200px 900px at 40% 120%, rgba(190,18,60,.12), transparent 60%),
               var(--bg);
    background-repeat:no-repeat; background-attachment:fixed;
    min-height:100dvh;
  }
  @media (max-width: 900px){
    .layout{grid-template-columns: 1fr !important;}
    .sidebar{position:sticky; top:0; z-index:10}
    .brand-logo{width:178px;height:56px}
    .brand-logo.large{width:272px;height:92px}
  }
  .container{max-width:1280px;margin:0 auto;padding:18px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;backdrop-filter:blur(6px)}
  .padded{padding:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .space{height:12px}.space-lg{height:20px}
  .muted{color:var(--muted)}
  h1,h2,h3,h4,.dashboard-title,.section-title,.login-title,.login-headline,.summary-client,.modal-title,.security-section-title{
    font-family:var(--font-display);
    letter-spacing:-.01em;
  }
  header.app{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--border)}
  .brand-badge{display:flex;align-items:center}
  .brand-logo{
    width:236px;height:76px;padding:0;
    display:block;background:transparent;border:0;min-width:0;
    overflow:hidden
  }
  .brand-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    transform:scale(1.72);
    transform-origin:center center
  }
  .brand-logo.large{width:338px;height:112px}
  .brand-logo.large img{transform:scale(1.98)}
  .btn{border:0;border-radius:12px;padding:10px 14px;background:linear-gradient(180deg,#2a3342,#1a2231);color:#fff;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease}
  .btn:hover{transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .btn.brand{background:linear-gradient(180deg,var(--brand),#be123c)}
  .btn.ghost{background:transparent;border:1px solid var(--border)}
  .btn.red{background:linear-gradient(180deg,#ef4444,#b91c1c)}
  .btn.green{background:linear-gradient(180deg,#22c55e,#16a34a)}
  .btn.yellow{background:linear-gradient(180deg,#ff1744,#be123c)}
  .input, select, textarea{
    width:100%;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,.06);
    border:1px solid var(--border);
    color:#fff;
    outline:none;
    transition:border-color .14s ease, box-shadow .14s ease, background .14s ease
  }
  .input:focus, .input:focus-visible, select:focus, select:focus-visible, textarea:focus, textarea:focus-visible{
    border-color:rgba(var(--brand-rgb),.85);
    box-shadow:0 0 0 3px rgba(var(--brand-rgb),.25);
    background:rgba(255,255,255,.08)
  }
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus{
    -webkit-text-fill-color:#fff;
    transition:background-color 9999s ease-in-out 0s;
    -webkit-box-shadow:0 0 0px 1000px rgba(255,255,255,.06) inset
  }
  .layout{display:grid;grid-template-columns:var(--sidebar-width,270px) minmax(0,1fr);gap:18px}
  .sidebar{width:100%}
  .nav{display:grid;gap:8px}
  .nav a{padding:12px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.04);display:flex;gap:10px;align-items:center;position:relative;
         text-decoration:none; color:inherit; transition:background .15s ease, outline .15s ease}
  .nav a:hover{background:rgba(255,255,255,.08)}
  .nav a.active{outline:2px solid rgba(var(--brand-rgb),.45); background:rgba(var(--brand-rgb),.10)}
  .icon{width:18px;height:18px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .kpi{padding:16px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--border);display:grid;gap:6px}
  .kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .kpi .value{font-size:24px;font-weight:700}
  .dashboard-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .dashboard-title{font-size:22px;font-weight:700}
  .dashboard-sub{color:var(--muted);font-size:14px}
  .dashboard-areas{grid-template-columns:2fr 1.1fr}
  .deadline-grid{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .status-line{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px}
  .status-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.05);font-size:13px;cursor:pointer;transition:all .12s ease;color:var(--text);font:inherit;text-transform:none;appearance:none}
  .status-chip strong{font-weight:700}
  .status-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 3px rgba(255,255,255,.04)}
  .status-chip.brand .dot{background:var(--brand)}
  .status-chip.green .dot{background:#22c55e}
  .status-chip.orange .dot{background:#ef4444}
  .status-chip.gray .dot{background:var(--muted)}
  .status-chip.danger .dot{background:#ef4444}
  .status-chip.active{border-color:rgba(var(--brand-rgb),.6);box-shadow:0 6px 18px rgba(var(--brand-rgb),.18)}
  .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .section-title{font-size:18px;font-weight:700}
  .section-sub{color:var(--muted);font-size:13px}
  .table-card{border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.03);padding:12px;overflow:auto;-webkit-overflow-scrolling:touch}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .form-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .table-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pill-mini{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;background:rgba(255,255,255,.05)}
  .pill-mini.danger{border-color:rgba(239,68,68,.35);color:#fecdd3;background:rgba(239,68,68,.12)}
  .pill-mini.warn{border-color:rgba(239,68,68,.35);color:#fecdd3;background:rgba(239,68,68,.12)}
  .pill-mini.good{border-color:rgba(34,197,94,.35);color:#bbf7d0;background:rgba(34,197,94,.12)}
  .deadline-list{display:grid;gap:10px;margin-top:8px}
  .deadline-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.03)}
  .deadline-main{display:grid;gap:4px}
  .deadline-title{font-weight:600}
  .deadline-meta{color:var(--muted);font-size:13px}
  .deadline-right{text-align:right;display:grid;gap:6px;justify-items:end}
  .deadline-date{font-size:12px;color:var(--muted)}
  .deadline-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px}
  .deadline-pill .dot{width:8px;height:8px;border-radius:999px}
  .deadline-pill.sev-high{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.35);color:#fecdd3}
  .deadline-pill.sev-high .dot{background:#f87171}
  .deadline-pill.sev-medium{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.28);color:#fecdd3}
  .deadline-pill.sev-medium .dot{background:#f43f5e}
  .deadline-pill.sev-low{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.32);color:#bbf7d0}
  .deadline-pill.sev-low .dot{background:#4ade80}
  .table{width:100%;border-collapse:collapse;font-size:14px}
  .table th,.table td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
  .login-shell{min-height:100dvh;padding:24px;background:radial-gradient(900px 700px at 82% -12%,rgba(255,23,68,.28),transparent 62%),radial-gradient(820px 680px at 6% -8%,rgba(244,63,94,.18),transparent 64%),var(--bg);display:flex;align-items:center;justify-content:center}
  .login-panel{display:flex;max-width:520px;width:100%;min-height:auto;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.14);box-shadow:0 28px 88px rgba(5,8,18,.65);background:linear-gradient(160deg,rgba(15,23,42,.92),rgba(17,24,39,.84));backdrop-filter:blur(14px)}
  .login-panel.compact{max-width:520px;min-height:auto;padding:34px;flex-direction:column;gap:22px}
  .login-hero{flex:1 1 46%;padding:48px;background:linear-gradient(160deg,rgba(255,23,68,.55),rgba(225,29,72,.35));display:flex;flex-direction:column;justify-content:space-between;color:#fff}
  .login-hero h1{font-size:34px;margin:0 0 18px}
  .login-hero p{font-size:16px;line-height:1.6;margin:0}
  .login-hero svg{width:48px;height:48px;color:#fff}
  .login-highlight{margin-top:auto;font-size:13px;opacity:.85;}
  .login-form{flex:1 1 54%;padding:48px;display:flex;flex-direction:column;gap:20px}
  .login-form.compact{padding:0;gap:16px}
  .login-brand{display:flex;align-items:center;justify-content:center}
  .login-title{font-size:30px;font-weight:700;margin:0}
  .login-subtitle{font-size:14px;color:var(--muted)}
  .login-headline{font-size:28px;font-weight:700;margin:0;letter-spacing:-.02em}
  .login-sub{font-size:14px;color:#cbd5e1}
  .login-fields{display:grid;gap:14px;margin-top:10px}
  .login-actions{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .login-btn{width:100%;padding:12px 18px;border-radius:16px;border:0;background:linear-gradient(180deg,var(--brand),#be123c);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 16px 32px rgba(var(--brand-rgb),.35)}
  .login-feedback{min-height:18px;font-size:13px}
  .login-feedback.error{color:#fca5a5}
  .login-feedback.success{color:#6ee7b7}
  .login-hint{font-size:12px;margin-top:2px;background:rgba(255,255,255,.05);border:1px solid rgba(148,163,184,.25);border-radius:10px;padding:8px 10px}
  .login-welcome{font-size:14px;color:#94a3b8;animation:fade .4s ease forwards}
  .login-floating{display:flex;align-items:center;gap:10px;margin-top:auto}
  .login-floating .badge{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:#fff}
  .fade-in{animation:fade .25s ease-out}
  .fade-up{animation:fadeUp .35s ease forwards}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  /* file input: wrap in label for style */
  .file{position:relative;display:inline-flex;align-items:center;gap:8px}
  .file input[type=file]{display:none}
  .file .tag{border:1px solid var(--border);border-radius:10px;padding:8px 12px;background:rgba(255,255,255,.06)}
  .badge{display:inline-block;padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);font-size:12px;letter-spacing:.02em}
  .status-green{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.4);color:#bbf7d0}
  .status-orange{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.36);color:#fecdd3}
  .status-gray{background:rgba(148,163,184,.2);border-color:rgba(148,163,184,.35);color:#e2e8f0}
  .modal-backdrop{position:fixed;inset:0;background:rgba(8,11,22,.82);display:flex;align-items:center;justify-content:center;padding:20px;z-index:2000;backdrop-filter:blur(6px);animation:fade .2s ease-out}
  .modal-card{background:var(--panel);border:1px solid var(--border);border-radius:18px;max-width:520px;width:100%;padding:22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 24px 60px rgba(8,11,22,.45)}
  .modal-title{font-size:18px;font-weight:600}
  .modal-body{display:flex;flex-direction:column;gap:12px}
  .modal-footer{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .step-indicator{font-size:13px;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .chip{border:1px solid var(--border);background:rgba(255,255,255,.06);border-radius:999px;padding:6px 12px;font-size:13px;cursor:pointer}
  .chip:hover{background:rgba(255,255,255,.12)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:13px;color:var(--muted)}
  .faux-input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:inherit;font:inherit;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border .15s ease, background .15s ease}
  .faux-input:hover{border-color:rgba(var(--brand-rgb),.4);background:rgba(var(--brand-rgb),.08)}
  .faux-input:focus, .faux-input:focus-visible{outline:none;border-color:rgba(var(--brand-rgb),.85);box-shadow:0 0 0 3px rgba(var(--brand-rgb),.25)}
  .faux-input .placeholder{color:var(--muted)}
  .faux-input span:last-child{margin-left:auto;opacity:.6;font-size:12px}
  .step-wrap{display:flex;flex-direction:column;gap:16px}
  .dropdown{position:relative;width:100%}
  .dropdown.open .dropdown-panel{opacity:1;pointer-events:auto;transform:translateY(0)}
  .dropdown-panel{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(12,18,35,.95);border:1px solid rgba(148,163,184,.35);border-radius:14px;padding:10px;display:grid;gap:6px;box-shadow:0 18px 48px rgba(8,11,22,.6);opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity .15s ease,transform .15s ease;z-index:20}
  .dropdown-option{padding:10px 12px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;gap:2px;background:rgba(255,255,255,.06);border:1px solid transparent;font-size:14px}
  .dropdown-option small{font-size:12px;color:var(--muted)}
  .dropdown-option:hover{border-color:rgba(var(--brand-rgb),.4);background:rgba(var(--brand-rgb),.16)}
  .dropdown-option.selected{border-color:rgba(var(--brand-rgb),.65);background:rgba(var(--brand-rgb),.28)}
  .date-field{position:relative;width:100%}
  .date-field.open .datepicker-panel{opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}
  .datepicker-panel{position:absolute;top:calc(100% + 8px);right:0;background:rgba(12,18,35,.95);border:1px solid rgba(148,163,184,.35);border-radius:16px;padding:16px;box-shadow:0 20px 48px rgba(8,11,22,.65);opacity:0;pointer-events:none;transform:translateY(6px) scale(.98);transition:opacity .15s ease,transform .15s ease;z-index:30;width:280px}
  .datepicker-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .datepicker-header strong{font-size:15px}
  .datepicker-nav{display:flex;gap:8px}
  .datepicker-nav button{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:inherit;cursor:pointer;transition:background .15s ease, border .15s ease}
  .datepicker-nav button:hover{background:rgba(var(--brand-rgb),.12);border-color:rgba(var(--brand-rgb),.4)}
  .datepicker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;font-size:13px}
  .datepicker-weekday{color:var(--muted);text-align:center;font-size:12px}
  .datepicker-day{border-radius:10px;padding:8px 0;text-align:center;cursor:pointer;background:rgba(255,255,255,.04);border:1px solid transparent;transition:background .15s ease,border .15s ease}
  .datepicker-day.other{opacity:.35}
  .datepicker-day:hover{border-color:rgba(var(--brand-rgb),.35);background:rgba(var(--brand-rgb),.12)}
  .datepicker-day.today{border-color:rgba(34,197,94,.4);box-shadow:0 0 0 1px rgba(34,197,94,.35);background:rgba(34,197,94,.16)}
  .datepicker-day.selected{background:linear-gradient(180deg,var(--brand),#be123c);border-color:transparent;color:#fff;box-shadow:none}
  .modal-card.confirm{max-width:420px}
  .modal-card.confirm .modal-title{font-size:20px}
  .modal-card.confirm .modal-body{gap:6px}
  .summary-card{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:18px;display:grid;gap:12px}
  .finance-card .summary-row span:last-child{font-size:18px;font-weight:600}
  .summary-header{display:flex;justify-content:space-between;align-items:center;gap:16px}
  .summary-client{font-weight:600;font-size:18px}
  .summary-route{display:flex;flex-direction:column;gap:4px;font-size:15px}
  .summary-grid{display:grid;gap:14px}
  .summary-row{display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:14px}
  .summary-row span:first-child{color:var(--muted)}
  .summary-row .summary-label{font-weight:600;color:var(--text)}
  .summary-row span:last-child{font-weight:500}
  .summary-row .summary-meta{color:var(--muted);font-size:12px}
  .quick-list{display:grid;gap:14px;margin-top:14px}
  .quick-item{display:grid;gap:6px;padding:14px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(148,163,184,.2)}
  .quick-item .quick-meta{color:var(--muted);font-size:12px}
  .quick-item .quick-actions{display:flex;align-items:center;gap:10px;margin-top:6px}
  .quick-item .quick-route{font-size:13px;color:var(--text)}
  .agenda-list{display:grid;gap:10px}
  .agenda-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:12px;border-radius:12px;border:1px solid rgba(148,163,184,.22);background:rgba(255,255,255,.03)}
  .agenda-main{display:grid;gap:4px}
  .agenda-title{font-weight:600}
  .agenda-meta{color:var(--muted);font-size:12px}
  .agenda-date{font-size:12px;color:var(--muted);text-align:right}
  .summary-grid.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
  .quick-card{background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.25);border-radius:14px;padding:16px;display:grid;gap:10px}
  .quick-card .summary-row{align-items:center}
  .quick-card .summary-meta{margin-top:-4px}
  .attachments-list{display:flex;flex-direction:column;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px}
  .attachments-item{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .attachments-item .muted{font-size:12px}
  .suggest-wrapper{position:relative}
  .suggest-panel{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(12,18,35,.95);border:1px solid rgba(148,163,184,.35);border-radius:14px;padding:6px;display:none;flex-direction:column;gap:4px;box-shadow:0 18px 48px rgba(8,11,22,.6);z-index:25}
  .suggest-panel.visible{display:flex}
  .suggest-item{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.06);cursor:pointer;display:flex;justify-content:space-between;gap:10px;font-size:14px}
  .suggest-item small{color:var(--muted);font-size:12px}
  .suggest-item:hover,.suggest-item.active{background:linear-gradient(180deg,var(--brand),#be123c);color:#fff}

<body>
  <div id="app"></div>
  <script>
  // ====== CONFIG & CONSTANTS ======
  const KEY='unitrans-suite-data'
  const UI_KEY='unitrans-ui'
  const SESSION='unitrans-session'
  const ADMIN_ID='u-admin'
  const STORAGE_SCHEMA_VERSION=2
  const LOGO_WHITE='assets/logo.svg'
  const APP_STATE={
    ui:{sidebarCollapsed:false},
    shell:null,
    currentRoute:'dashboard',
    routeContext:{customerPrefill:''}
  }
  const el=(t,a={},...c)=>{const n=document.createElement(t);for(const k in a){if(k==='class')n.className=a[k];else if(k==='style')n.setAttribute('style',a[k]);else if(k.startsWith('on'))n[k]=a[k];else n.setAttribute(k,a[k])} for(const x of c.flat()){if(x==null)continue;n.append(x.nodeType?x:document.createTextNode(x))}return n}
  const qs=(sel,root=document)=>root.querySelector(sel)
  const qsa=(sel,root=document)=>Array.from(root.querySelectorAll(sel))
  const escapeHtml=(str)=>String(str??'').replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))
  const icon=(d)=>{const s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('viewBox','0 0 24 24');s.setAttribute('class','icon');const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('fill','none');p.setAttribute('stroke','currentColor');p.setAttribute('stroke-width','1.6');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');p.setAttribute('d',d);s.appendChild(p);return s}
  const icons={dashboard:'M3 12h8V3H3v9zm10 9h8v-8h-8v8zM3 21h8v-6H3v6zm10-10h8V3h-8v8z',truck:'M3 7h11v7h4l3 3v3h-2a3 3 0 11-6 0H9a3 3 0 11-6 0H1V9a2 2 0 012-2z',invoice:'M6 2h12l2 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm3 6h8M9 12h8M9 16h6',fleet:'M3 18h18l-2-8H5l-2 8zm3-10h12l-1-4H7l-1 4z',user:'M12 12a5 5 0 100-10 5 5 0 000 10zm-9 9a9 9 0 1118 0H3z',clients:'M7 11a4 4 0 110-8 4 4 0 010 8zM1 22a6 6 0 1112 0H1zM17 13a4 4 0 110-8 4 4 0 010 8zM13 22a6 6 0 1112 0h-6',bell:'M12 22a2 2 0 002-2H10a2 2 0 002 2zm6-6V9a6 6 0 10-12 0v7L4 18v2h16v-2l-2-2z',report:'M5 3h14v18H5z M9 7h6M9 11h6M9 15h6',file:'M6 2h7l5 5v13a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2z',shield:'M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z',payroll:'M3 7h18M7 3v8M17 3v8M5 12h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z'}
  const ROLE_LABELS={admin:'Amministratore',operatore:'Operatore'}
  const PERMISSION_DEFS=[
    {id:'dashboard.view',label:'Accesso dashboard'},
    {id:'viaggi.manage',label:'Gestione viaggi'},
    {id:'fatture.manage',label:'Gestione fatture'},
    {id:'flotta.manage',label:'Gestione flotta'},
    {id:'drivers.manage',label:'Gestione autisti'},
    {id:'clienti.manage',label:'Gestione clienti'},
    {id:'notifiche.manage',label:'Gestione notifiche'},
    {id:'files.manage',label:'Gestione file'},
    {id:'reports.view',label:'Accesso report'},
    {id:'payroll.manage',label:'Gestione paghe'},
    {id:'security.manage',label:'Gestione sicurezza',adminOnly:true}
  ]
  const ROLE_PRESETS={
    admin: PERMISSION_DEFS.map(p=>p.id),
    operatore: PERMISSION_DEFS.map(p=>p.id).filter(id=>id!=='security.manage' && id!=='payroll.manage')
  }
  const permissionsForRole=(role)=> ROLE_PRESETS[role]? [...ROLE_PRESETS[role]]:[]
  const setActive=(id)=>{
    qsa('.nav a').forEach(a=>a.classList.remove('active'))
    const e=qs(`#nav-${id}`)
    if(e) e.classList.add('active')
  }
  const navigateTo=(hashOrId)=>{
    const cleaned=String(hashOrId||'dashboard').replace(/^#/,'').trim()||'dashboard'
    window.history.replaceState({},'',`#${cleaned}`)
    return cleaned
  }
  const routeTo=(id)=>navigateTo(id)

  // ====== STORAGE (load/save/migrate) ======
  const storageLoad=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return{}}}
  const storageSave=(value)=>localStorage.setItem(KEY, JSON.stringify(value))
  const storageLoadUI=()=>{try{return JSON.parse(localStorage.getItem(UI_KEY)||'{}')}catch{return{}}}
  const storageSaveUI=(value)=>localStorage.setItem(UI_KEY, JSON.stringify(value))
  const seedOnce=()=>{
    const d=storageLoad()
    if(d._seed) return
    storageSave({
      _seed:true,
      schemaVersion:STORAGE_SCHEMA_VERSION,
      users:[{id:ADMIN_ID,name:'Administrator',username:'admin',email:'admin@unitrans.local',gender:'male',pass:'admin',role:'admin',permissions:ROLE_PRESETS.admin,active:true,lastLogin:null,forceChange:false,createdAt:new Date().toISOString()}],
      trips:[],
      invoices:[],
      fleet:[],
      drivers:[],
      customers:[],
      notifications:[],
      files:[],
      payroll:[],
      logs:[]
    })
  }
  const storageMigrate=()=>{
    const data=storageLoad()
    let changed=false
    const collections=['users','trips','invoices','fleet','drivers','customers','notifications','files','payroll','logs']
    collections.forEach((key)=>{
      if(!Array.isArray(data[key])){
        data[key]=[]
        changed=true
      }
    })
    if(!data._seed){
      data._seed=true
      changed=true
    }
    data.files=(data.files||[]).map((entry)=>{
      const tags=Array.isArray(entry?.tags)? entry.tags.filter(Boolean).map(v=>String(v).trim()).filter(Boolean):[]
      if(!Array.isArray(entry?.tags)){changed=true}
      return {...entry,tags}
    })
    data.payroll=(data.payroll||[]).map((entry)=>{
      const status=entry?.status||'Bozza'
      const visibility=entry?.visibility||'admin_only'
      const netto=Number(entry?.netto||0)
      const safeNetto=Number.isFinite(netto)?netto:0
      const createdAt=entry?.createdAt||entry?.updatedAt||new Date().toISOString()
      const updatedAt=entry?.updatedAt||entry?.createdAt||createdAt
      if(!entry?.status || !entry?.visibility || !Number.isFinite(netto) || !entry?.createdAt || !entry?.updatedAt){changed=true}
      return {...entry,status,visibility,netto:safeNetto,createdAt,updatedAt}
    })
    if(data.schemaVersion!==STORAGE_SCHEMA_VERSION){
      data.schemaVersion=STORAGE_SCHEMA_VERSION
      changed=true
    }
    if(changed) storageSave(data)

    const ui=storageLoadUI()
    let uiChanged=false
    if(typeof ui.sidebarCollapsed!=='boolean'){
      ui.sidebarCollapsed=false
      uiChanged=true
    }
    if(uiChanged) storageSaveUI(ui)
    APP_STATE.ui.sidebarCollapsed=ui.sidebarCollapsed===true
  }
  const uiPreferencesLoad=()=>storageLoadUI()
  const uiPreferencesSave=(patch={})=>{
    const current=uiPreferencesLoad()
    const next={...current,...patch}
    storageSaveUI(next)
    APP_STATE.ui.sidebarCollapsed=next.sidebarCollapsed===true
    return next
  }
  const get=()=>storageLoad()
  const set=(value)=>storageSave(value)

  // ====== AUTH & PERMISSIONS ======
  const enforceAdminGuard=()=>{
    const data=get()
    data.users=data.users||[]
    const requiredPerms=ROLE_PRESETS.admin
    let changed=false
    let adminIndex=data.users.findIndex(u=>u.id===ADMIN_ID)
    if(adminIndex===-1){
      adminIndex=data.users.findIndex(u=>u.email==='admin@unitrans.local')

  const createDropdown=({value='',options=[],placeholder='Seleziona',onSelect,allowEmpty=false})=>{
    const root=el('div',{class:'dropdown'})
    const trigger=el('button',{class:'faux-input',type:'button'})
    const labelSpan=el('span',{class:value?'':'placeholder'})
    const caret=el('span',{},'▾')
    trigger.append(labelSpan, caret)
    const panel=el('div',{class:'dropdown-panel'})
    root.append(trigger,panel)
    let current=value
    let detach=null
    const normalized=()=>{
      const list=[...options]
      if(allowEmpty && !list.some(o=>o.value==='')){
        list.unshift({value:'',label:'Nessuno'})
      }
      return list
    }
    const getOption=(val)=> normalized().find(o=>String(o.value)===String(val))
    const renderTrigger=()=>{
      const opt=getOption(current)
      if(opt){
        labelSpan.classList.remove('placeholder')
        if(opt.color){
          const content=el('span',{class:'option-content'})
          content.append(el('span',{class:'option-dot',style:`background:${opt.color}`}))
          content.append(document.createTextNode(opt.label))
          labelSpan.replaceChildren(content)
        }else{
          labelSpan.replaceChildren(document.createTextNode(opt.label))
        }
      }else{
        labelSpan.classList.add('placeholder')
        labelSpan.replaceChildren(document.createTextNode(placeholder))
      }
    }
    const renderPanel=()=>{
      panel.replaceChildren(...normalized().map(opt=>{
        const optionEl=el('div',{class:`dropdown-option${String(opt.value)===String(current)?' selected':''}`})
        const content=el('div',{class:'option-content'})
        if(opt.color) content.append(el('span',{class:'option-dot',style:`background:${opt.color}`}))
        content.append(document.createTextNode(opt.label))
        optionEl.append(content)
        if(opt.sub) optionEl.append(el('small',{},opt.sub))
        optionEl.onclick=()=>{current=opt.value; renderTrigger(); close(); onSelect?.(opt.value)}
        return optionEl
      }))
    }
    const open=()=>{
      if(root.classList.contains('open')) return
      root.classList.add('open')
      renderPanel()
      detach=attachClickOutside(root, close)
    }
    const close=()=>{
      root.classList.remove('open')
      if(detach){detach(); detach=null}
    }
    trigger.onclick=()=> root.classList.contains('open')?close():open()
    renderTrigger()
    return {root,setValue:(val)=>{current=val??''; renderTrigger()},close,open}
  }
  const createDateField=({value='',placeholder='Seleziona data',onChange})=>{
    const root=el('div',{class:'date-field'})
    const trigger=el('button',{class:'faux-input',type:'button'})
    const labelSpan=el('span',{class:value?'':'placeholder'}, value?fmtDateDisplay(value):placeholder)

    trigger.append(labelSpan, caret)

    root.append(trigger,panel)
    let selected=value? fromISODate(value):null
    let visible= selected? new Date(selected): new Date()
    visible.setHours(0,0,0,0); visible.setDate(1)
    let detach=null
    const months=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']
    const weekdays=['Lun','Mar','Mer','Gio','Ven','Sab','Dom']
    const render=()=>{
      panel.replaceChildren()
      const header=el('div',{class:'datepicker-header'},
        el('strong',{}, `${months[visible.getMonth()]} ${visible.getFullYear()}`),
        el('div',{class:'datepicker-nav'},
          el('button',{type:'button',onclick:()=>{visible.setMonth(visible.getMonth()-1); render()}},'‹'),
          el('button',{type:'button',onclick:()=>{visible.setMonth(visible.getMonth()+1); render()}},'›')
        )
      )
      const grid=el('div',{class:'datepicker-grid'})
      weekdays.forEach(w=>grid.append(el('div',{class:'datepicker-weekday'},w)))
      const firstDay=(visible.getDay()+6)%7
      const month=visible.getMonth()
      const today=new Date(); today.setHours(0,0,0,0)
      for(let i=0;i<42;i++){
        const date=new Date(visible)
        date.setDate(i-firstDay+1)
        const other=date.getMonth()!==month
        const isSelected= selected && date.toDateString()===selected.toDateString()
        const isToday=date.toDateString()===today.toDateString()
        let cls='datepicker-day'
        if(other) cls+=' other'
        if(isToday) cls+=' today'
        if(isSelected) cls+=' selected'
        const btn=el('div',{class:cls}, String(date.getDate()))
        btn.onclick=()=>{
          const localDate=new Date(date.getFullYear(), date.getMonth(), date.getDate())
          selected=localDate
          const iso=toLocalISO(localDate)
          labelSpan.classList.remove('placeholder')
          labelSpan.textContent=fmtDateDisplay(iso)
          onChange?.(iso)
          close()
        }
        grid.append(btn)
      }
      panel.append(header, grid)
    }
    const open=()=>{
      if(root.classList.contains('open')) return
      root.classList.add('open')
      render()
      detach=attachClickOutside(root, close)
    }
    const close=()=>{
      root.classList.remove('open')
      if(detach){detach(); detach=null}
    }
    trigger.onclick=()=> root.classList.contains('open')?close():open()
    return {root,setValue:(iso)=>{if(iso){selected=fromISODate(iso); visible=new Date(selected); visible.setDate(1); labelSpan.classList.remove('placeholder'); labelSpan.textContent=fmtDateDisplay(iso);}else{selected=null; labelSpan.classList.add('placeholder'); labelSpan.textContent=placeholder;}},close,open}
  }
  const createCurrencyInput=(initial,{onChange}={})=>{
    let digits = initial!=null && !isNaN(initial) ? String(Math.round(Number(initial)*100)) : ''
    const input=el('input',{class:'input currency-input',placeholder:'0,00 €'})
    const sanitize=(str)=> str.replace(/^0+(?=\d)/,'')
    const sync=()=>{
      if(!digits){
        input.value=''
        onChange?.(null)
      }else{
        const value=Number(digits)/100
        input.value=formatCurrencyValue(value)
        onChange?.(value)
      }
    }
    const setDigits=(next)=>{
      digits=sanitize(next.replace(/\D/g,''))
      sync()
    }
    input.addEventListener('keydown',(e)=>{
      if(e.key>='0' && e.key<='9'){
        e.preventDefault()
        setDigits((digits||'') + e.key)
      }else if(e.key==='Backspace'){
        e.preventDefault()
        setDigits(digits.slice(0,-1))
      }else if(e.key==='Delete'){
        e.preventDefault()
        setDigits('')
      }else if(e.key==='Escape'){
        e.preventDefault()
        input.blur()
      }else if(e.key==='Tab' || e.key==='ArrowLeft' || e.key==='ArrowRight' || e.key==='ArrowUp' || e.key==='ArrowDown' || e.key==='Shift'){
        // allow navigation
      }else{
        e.preventDefault()
      }
    })
    input.addEventListener('focus',()=>{setTimeout(()=>input.select(),0)})
    sync()
    return {input,setValue:(val)=>{digits=val!=null?String(Math.round(Number(val)*100)):'', sync()}}
  }

  // ---------- FatturaPA XML parse (basic) ----------
  const SALE_TYPES=new Set(['TD01','TD02','TD03','TD04','TD05','TD06','TD24'])
  const PURCHASE_TYPES=new Set(['TD10','TD11','TD12','TD13','TD16','TD17','TD18','TD19'])
  const detectInvoiceCategory=(tipo)=>{
    const code=(tipo||'').toUpperCase()
    if(PURCHASE_TYPES.has(code)) return 'acquisto'
    if(SALE_TYPES.has(code)) return 'vendita'
    return 'vendita'
  }
  function parseFatturaPAXML(xmlText){
    const doc=new DOMParser().parseFromString(xmlText,'text/xml')
    if(doc.querySelector('parsererror')){
      return {ok:false,error:'File XML non valido o non leggibile.'}
    }
    const pick=(sel)=>(doc.querySelector(sel)?.textContent||'').trim()
    const numero=pick('DatiGeneraliDocumento > Numero')
    const data=pick('DatiGeneraliDocumento > Data')
    const totaleRaw=pick('DatiGeneraliDocumento > ImportoTotaleDocumento')
    const totale=parseFloat((totaleRaw||'0').replace(',','.'))||0
    const valuta=pick('DatiGeneraliDocumento > Divisa') || 'EUR'
    const tipo=pick('DatiGeneraliDocumento > TipoDocumento')
    const categoria=detectInvoiceCategory(tipo)

    const clienteDen=pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Denominazione')
      || [pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Nome'),pick('CessionarioCommittente > DatiAnagrafici > Anagrafica > Cognome')].filter(Boolean).join(' ')
    const clientePI=pick('CessionarioCommittente > DatiAnagrafici > IdFiscaleIVA > IdCodice')
    const clienteCF=pick('CessionarioCommittente > DatiAnagrafici > CodiceFiscale')

    const fornitoreDen=pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Denominazione')
      || [pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Nome'),pick('CedentePrestatore > DatiAnagrafici > Anagrafica > Cognome')].filter(Boolean).join(' ')
    const fornitorePI=pick('CedentePrestatore > DatiAnagrafici > IdFiscaleIVA > IdCodice')
    const fornitoreCF=pick('CedentePrestatore > DatiAnagrafici > CodiceFiscale')

    return {
      ok:true,
      numero,
      data,
      totale,
      valuta,
      tipo,
      categoria,
      clienteDen,
      clientePI,
      clienteCF,
      fornitoreDen,
      fornitorePI,
      fornitoreCF
    }
  }

  // ====== SECTIONS (one function per section) ======

  const Dashboard=()=>{
    const now=new Date()
    const startToday=new Date(now)
    startToday.setHours(0,0,0,0)
    const endWeek=new Date(startToday.getTime()+7*24*60*60*1000)
    const todayIso=toLocalISO(now)
    const trips=list('trips')||[]
    const drivers=list('drivers')||[]
    const fleet=list('fleet')||[]
    const invoices=list('invoices')||[]
    const statusTotals={daFare:0,inCorso:0,completati:0}

    const parseTripDate=(value)=>{
      if(!value) return null
      const date=new Date(`${value}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const dayDiff=(date)=> Math.round((date-startToday)/(1000*60*60*24))
    const diffLabel=(diff)=>{
      if(diff===0) return 'Oggi'
      if(diff>0) return diff===1?'Domani':`Tra ${diff}g`
      const abs=Math.abs(diff)
      return abs===1?'Ieri':`Scaduta da ${abs}g`
    }

    trips.forEach(trip=>{
      const stato=(trip?.stato||'').toString().toLowerCase()
      if(stato.includes('corso')) statusTotals.inCorso+=1
      else if(stato.includes('compl')) statusTotals.completati+=1
      else statusTotals.daFare+=1
    })

    const openTrips=trips.filter(trip=> !(trip.stato||'').toString().toLowerCase().includes('compl'))
    const pendingTrips=trips.filter(trip=> (trip.stato||'').toString().toLowerCase().includes('fare')).length
    const inProgress=trips.filter(trip=> (trip.stato||'').toString().toLowerCase().includes('corso')).slice(0,6)
    const dueToday=openTrips.filter(trip=> trip.dataCarico===todayIso || trip.dataScarico===todayIso).length
    const plannedWeek=openTrips.filter(trip=>{
      const date=parseTripDate(trip.dataCarico||trip.dataScarico)
      return date && date>=startToday && date<=endWeek
    }).length
    const assignedDrivers=new Set(openTrips.map(trip=>trip.autista).filter(Boolean))
    const busyVehicles=new Set(openTrips.flatMap(trip=>[trip.camion,trip.rimorchio]).filter(Boolean))
    const openInvoices=invoices.filter(inv=>!inv.paid).length
    const driverById=new Map(drivers.map(d=>[d.id,d.name||d.id]))

    const upcomingTrips=openTrips.map(trip=>{
      const carico=parseTripDate(trip.dataCarico)
      const scarico=parseTripDate(trip.dataScarico)
      let when=null
      let label='Data'
      if(carico && scarico){
        if(carico<=scarico){when=carico; label='Carico'}
        else{when=scarico; label='Consegna'}
      }else if(carico){
        when=carico
        label='Carico'
      }else if(scarico){
        when=scarico
        label='Consegna'
      }
      if(!when) return null
      return {trip,when,label}
    }).filter(Boolean).sort((a,b)=>a.when-b.when).slice(0,6)

    const creditoDebito=invoices.reduce((acc,inv)=>{
      const category=invoiceCategory(inv)
      if(category==='vendita' && !inv.paid) acc.credito+=Number(inv?.totale||0)
      if(category==='acquisto' && !inv.paid) acc.debito+=Number(inv?.totale||0)
      return acc
    },{credito:0,debito:0})
    const balance=creditoDebito.credito-creditoDebito.debito

    const fleetDates=[]
    const pushFleetDate=(item,dateStr,label,type)=>{
      if(!dateStr) return
      const when=new Date(dateStr)
      if(isNaN(when.getTime())) return
      fleetDates.push({item,when,label,type})
    }
    fleet.forEach(item=>{
      pushFleetDate(item,item.assScad,`Assicurazione${item.assNome?` · ${item.assNome}`:''}`,'insurance')
      pushFleetDate(item,item.revisioneScad,'Revisione','revisione')
      pushFleetDate(item,item.bolloScad,'Bollo','bollo')
      pushFleetDate(item,item.assStradaleScad,`Assistenza stradale${item.assStradale?` · ${item.assStradale}`:''}`,'roadside')
      pushFleetDate(item,item.tachoScad,'Tachigrafo','tachigrafo')
    })
    const fleetWithSeverity=fleetDates.sort((a,b)=>a.when-b.when).map(entry=>{
      const diff=dayDiff(entry.when)
      const severityType=diff<0?'expired':diff<=15?'soon':'ok'
      const severityClass=diff<0?'sev-high':diff<=15?'sev-medium':'sev-low'
      return {...entry,diff,severityType,severityClass}
    })
    const fleetDeadlines=fleetWithSeverity.slice(0,6)
    const fleetCounters=fleetWithSeverity.reduce((acc,entry)=>{
      if(entry.severityType==='expired') acc.expired++
      else if(entry.severityType==='soon') acc.soon++
      else acc.ok++
      return acc
    },{expired:0,soon:0,ok:0})

    const statusChip=(label,value,tone='brand')=> el('div',{class:`status-chip ${tone}`},
      el('span',{class:'dot'}),
      el('span',{}, label),
      el('strong',{}, Number(value||0).toLocaleString('it-IT'))
    )
    const deadlinePill=(label,severity)=> el('span',{class:`deadline-pill ${severity}`}, el('span',{class:'dot'}), label)
    const updatedLabel=`Aggiornata ${now.toLocaleDateString('it-IT')} · ${now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`
    const kpiCard=(label,value,meta)=> el('div',{class:'kpi'},
      el('div',{class:'label'},label),
      el('div',{class:'value'}, Number(value||0).toLocaleString('it-IT')),
      meta?el('div',{class:'muted',style:'font-size:12px'}, meta):null
    )

    const wrap=el('div',{})
    const head=el('div',{class:'dashboard-head'},
      el('div',{}, el('div',{class:'dashboard-title'},'Dashboard operativa'), el('div',{class:'dashboard-sub'}, updatedLabel)),
      el('div',{class:'badge'}, fmtCount(trips.length||0,'viaggio registrato','viaggi registrati'))
    )
    wrap.append(head)

    const kpiRow=el('div',{class:'kpi-grid'})
    kpiRow.append(
      kpiCard('Viaggi in corso', statusTotals.inCorso, statusTotals.inCorso?fmtCount(statusTotals.inCorso,'viaggio attivo','viaggi attivi'):'Nessun viaggio attivo'),
      kpiCard('Da programmare', pendingTrips, pendingTrips?fmtCount(pendingTrips,'viaggio da pianificare','viaggi da pianificare'):'Tutto programmato'),
      kpiCard('Consegne oggi', dueToday, dueToday?fmtCount(dueToday,'movimento previsto','movimenti previsti'):'Nessun movimento oggi'),
      kpiCard('Completati', statusTotals.completati, statusTotals.completati?fmtCount(statusTotals.completati,'viaggio chiuso','viaggi chiusi'):'Nessuna chiusura'),
      kpiCard('Autisti registrati', drivers.length||0, drivers.length?fmtCount(drivers.length,'autista in anagrafica','autisti in anagrafica'):'Aggiungi gli autisti'),
      kpiCard('Mezzi registrati', fleet.length||0, fleet.length?fmtCount(fleet.length,'mezzo censito','mezzi censiti'):'Completa la flotta')
    )

    const statusLine=el('div',{class:'status-line'},
      statusChip('In corso', statusTotals.inCorso,'brand'),
      statusChip('Da programmare', pendingTrips,'orange'),
      statusChip('Completati', statusTotals.completati,'green')
    )

    const canManageTrips=can('viaggi.manage')
    const activeTripsCard=el('div',{class:'card padded'})
    activeTripsCard.append(
      el('div',{class:'summary-header'},
        el('div',{class:'summary-client'},'Viaggi attivi'),
        el('div',{class:'badge'}, inProgress.length?fmtCount(inProgress.length,'viaggio in corso','viaggi in corso'):'Nessun viaggio attivo')
      ),

    const concludeTrip=(trip)=>{
      if(!canManageTrips) return
      const previous=trip.stato||'In corso'
      const actor=me()
      put('trips', trip.id,{stato:'Completato',updatedAt:new Date().toISOString()})

    const quickList=el('div',{class:'quick-list'})
    if(!inProgress.length){
      quickList.append(el('div',{class:'empty-state'},'I viaggi in corso compariranno qui per una chiusura rapida.'))
    }else{
      inProgress.forEach(trip=>{
        const actionBtn=el('button',{class:'btn green',type:'button',disabled:!canManageTrips},'Segna completato')
        actionBtn.onclick=async(e)=>{
          e.preventDefault()
          if(!can('viaggi.manage')) return
          const ok=await askConfirm({
            title:'Segna completato',
            message:`Vuoi segnare come completato il viaggio per ${trip.cliente||'cliente'}?`,
            confirmLabel:'Conferma',
            cancelLabel:'Annulla'
          })

        const actions=el('div',{class:'quick-actions'}, actionBtn)
        quickList.append(el('div',{class:'quick-item'}, el('div',{class:'summary-label'}, `${trip.cliente||'Cliente'}`), route, meta, actions))
      })

      el('div',{class:'summary-header'},
        el('div',{class:'summary-client'},'Agenda prossimi viaggi'),
        el('div',{class:'badge'}, upcomingTrips.length?fmtCount(upcomingTrips.length,'viaggio pianificato','viaggi pianificati'):'Nessuna data pianificata')
      )
    )
    const agendaList=el('div',{class:'agenda-list'})
    if(!upcomingTrips.length){
      agendaList.append(el('div',{class:'empty-state'},'Compila le date di carico/scarico per vedere la pianificazione.'))
    }else{
      upcomingTrips.forEach(({trip,when,label})=>{

        agendaList.append(
          el('div',{class:'agenda-item'},

              el('div',{class:'agenda-title'}, trip.cliente||'Cliente'),
              el('div',{class:'agenda-meta'}, `${trip.origine||'-'} → ${trip.arrivo||'-'}`),
              el('div',{class:'agenda-meta'}, `Autista ${driverById.get(trip.autista)||trip.autista||'-'}`)
            ),

              deadlinePill(diffLabel(timing), timing<0?'sev-high':timing<=2?'sev-medium':'sev-low'),

    const financeCard=el('div',{class:'summary-card finance-card'},

      ),

        el('div',{class:'summary-row'}, el('span',{class:'muted'},'Crediti aperti'), el('span',{}, formatCurrencyValue(creditoDebito.credito))),
        el('div',{class:'summary-row'}, el('span',{class:'muted'},'Debiti aperti'), el('span',{}, formatCurrencyValue(creditoDebito.debito))),
        el('div',{class:'summary-row'}, el('span',{class:'muted'},'Saldo operativo'), el('span',{}, formatCurrencyValue(balance))),

  // Files
  const Files=()=>{
    const wrap=el('div',{})
    wrap.append(el('div',{style:'font-weight:700;font-size:18px'},'File'))
    const picker=el('input',{type:'file',multiple:true,'aria-label':'Seleziona file da caricare'})
    const label=el('label',{class:'file'}, el('span',{class:'tag'},'Scegli file'), picker)
    const feedback=el('div',{class:'ops-note'})
    const formatBytes=(size)=>{
      const value=Number(size||0)
      if(value<1024) return `${value} B`
      if(value<1024*1024) return `${(value/1024).toFixed(1)} KB`
      if(value<1024*1024*1024) return `${(value/(1024*1024)).toFixed(1)} MB`
      return `${(value/(1024*1024*1024)).toFixed(1)} GB`
    }
    const isImage=(file)=>/image\/(png|jpe?g|webp)/i.test(file?.type||'') || /\.(png|jpe?g|webp)$/i.test(file?.name||'')
    const isPdf=(file)=>(file?.type||'').toLowerCase()==='application/pdf' || /\.pdf$/i.test(file?.name||'')
    const openPreview=(file)=>{
      if(!isImage(file) || !file?.data) return
      const image=el('img',{class:'files-preview-image',src:`data:${file.type||'image/png'};base64,${file.data}`,alt:file.name||'Anteprima'})
      const closeBtn=el('button',{class:'btn brand',type:'button'},'Chiudi')
      let modal
      closeBtn.onclick=()=>uiModalClose(modal,true)
      modal=uiModalOpen({
        title:file.name||'Anteprima file',
        body:image,
        footer:el('div',{class:'modal-footer'}, el('div',{}), closeBtn)
      })
      modal.overlay.focus()
    }
    const updateFileTags=(fileId,nextTags)=>{
      const tags=(nextTags||[]).map(v=>String(v||'').trim()).filter(Boolean)
      put('files',fileId,{tags,updatedAt:new Date().toISOString()})
      refresh()
    }
    const btn=el('button',{class:'btn brand',onclick:async()=>{
      const selected=Array.from(picker.files||[])
      if(!selected.length){
        feedback.textContent='Seleziona almeno un file da caricare.'
        return
      }
      feedback.textContent='Caricamento in corso...'
      for(const file of selected){
        const data=await fileToBase64(file)
        saveFile({
          id:crypto.randomUUID(),
          name:file.name,
          size:file.size,
          type:file.type,
          data,
          tags:[],
          createdAt:new Date().toISOString()
        })
      }
      picker.value=''
      feedback.textContent=selected.length===1?'File caricato con successo.':`${selected.length.toLocaleString('it-IT')} file caricati.`
      refresh()
    }},'Carica')
    const head=el('div',{class:'card padded'}, el('div',{class:'row'}, label, btn), feedback)
    const table=el('table',{class:'table'})
    function refresh(){
      const files=listFiles().slice().sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))
      table.replaceChildren(
        el('thead',{}, el('tr',{}, el('th',{},'Anteprima'), el('th',{},'Nome'), el('th',{},'Tag'), el('th',{},'Dim.'), el('th',{},'Tipo'), el('th',{},'Data'), el('th',{},''))),
        el('tbody',{}, ...files.map(file=>{
          const previewCell=(()=>{
            if(isImage(file)){
              const thumb=el('button',{class:'file-preview-thumb',type:'button',title:'Apri anteprima',onclick:()=>openPreview(file),'aria-label':`Apri anteprima ${file.name||'immagine'}`},
                el('img',{src:`data:${file.type||'image/png'};base64,${file.data}`,alt:file.name||'Anteprima'})
              )
              return thumb
            }
            if(isPdf(file)){
              return el('span',{class:'badge'},'PDF')
            }
            return el('span',{class:'muted'},'-')
          })()
          const tagWrap=el('div',{class:'file-tag-list'})
          const currentTags=Array.isArray(file.tags)?file.tags:[]
          currentTags.forEach((tag)=>{
            tagWrap.append(el('span',{class:'file-tag-chip'},
              tag,
              el('button',{type:'button',onclick:()=>updateFileTags(file.id,currentTags.filter(item=>item!==tag)),'aria-label':`Rimuovi tag ${tag}`},'×')
            ))
          })
          const tagInput=el('input',{class:'input file-tag-input',placeholder:'Aggiungi tag'})
          const commitTag=()=>{
            const raw=tagInput.value.trim()
            if(!raw) return
            const tag=raw.toLowerCase()
            if(currentTags.includes(tag)){tagInput.value=''; return}
            updateFileTags(file.id,[...currentTags,tag])
            tagInput.value=''
          }
          tagInput.addEventListener('keydown',(event)=>{
            if(event.key==='Enter' || event.key===','){
              event.preventDefault()
              commitTag()
            }
          })
          tagInput.addEventListener('blur',commitTag)
          tagWrap.append(tagInput)

          const downloadBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>downloadStoredFile(file.id)},'Scarica')
          const deleteBtn=el('button',{class:'btn red',type:'button',onclick:async()=>{
            const ok=await askConfirm({
              title:'Elimina file',
              message:`Vuoi eliminare ${file.name||'questo file'}?`,
              confirmLabel:'Elimina',
              cancelLabel:'Annulla',
              tone:'danger'
            })
            if(!ok) return
            deleteFile(file.id)
            refresh()
          }},'Elimina')

          return el('tr',{},
            el('td',{},previewCell),
            el('td',{},file.name||'-'),
            el('td',{},tagWrap),
            el('td',{},formatBytes(file.size)),
            el('td',{},file.type||'-'),
            el('td',{},fmtDateTime(file.createdAt)),
            el('td',{},el('div',{class:'row'},downloadBtn,deleteBtn))
          )
        }))
      )
    }
    refresh()
    return el('div',{}, head, el('div',{class:'space'}), el('div',{class:'table-card'}, table))
  }

  // Fatture: workspace professionale con sottofunzioni e analisi
  const Fatture=()=>{
    const wrap=el('div',{class:'invoice-suite'})
    const tabState={id:'cruscotto'}
    const tabs=[
      {id:'cruscotto',label:'Cruscotto',sub:'Panoramica KPI e trend',icon:icons.dashboard},
      {id:'documenti',label:'Documenti',sub:'Archivio e creazione guidata',icon:icons.file},
      {id:'scadenze',label:'Scadenze',sub:'Pagamenti e solleciti',icon:icons.bell},
      {id:'incassi',label:'Incassi',sub:'Movimenti e registrazioni',icon:icons.invoice},
      {id:'analisi',label:'Analisi',sub:'Performance e ranking',icon:icons.report}
    ]
    const content=el('div',{class:'invoice-content'})
    const tabBar=el('div',{class:'invoice-nav card padded'})
    const dayMs=24*60*60*1000

    const parseDate=(value)=>{
      if(!value) return null
      const raw=String(value)
      const date=raw.includes('T') ? new Date(raw) : new Date(`${raw}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const monthKey=(date)=>`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`
    const getMonths=(count=12)=>{
      const now=new Date()
      const arr=[]
      for(let i=count-1;i>=0;i--){
        const date=new Date(now.getFullYear(), now.getMonth()-i, 1)
        arr.push({
          key:monthKey(date),
          label:date.toLocaleDateString('it-IT',{month:'short'})
        })
      }
      return arr
    }
    const hydrateInvoice=(inv)=>{
      const category=inv.category||detectInvoiceCategory(inv.tipo)
      const counterparty=invoiceCounterparty(inv)||'-'
      const baseDate=inv.data||inv.createdAt||inv.ts||null
      const baseDateObj=parseDate(baseDate)
      const autoDue=baseDateObj? new Date(baseDateObj.getTime()+30*dayMs).toISOString().slice(0,10):null
      return {
        ...inv,
        category,
        counterparty,
        paid:inv.paid===true,
        paymentMethod:inv.paymentMethod||'Bonifico',
        dueDate:inv.dueDate||autoDue,
        customerLinked:inv.customerLinked===true || Boolean(inv.customerId),
        customerVatCf:inv.customerVatCf || inv.clientePI || inv.clienteCF || ''
      }
    }
    const listInvoices=()=> (list('invoices')||[])
      .map(hydrateInvoice)
      .sort((a,b)=>{
        const da=parseDate(a.data||a.createdAt||a.ts)||new Date(0)
        const db=parseDate(b.data||b.createdAt||b.ts)||new Date(0)
        return db-da
      })
    const invAmount=(inv)=>Number(inv?.totale||0)
    const statusLabel=(inv)=>inv.paid ? (inv.category==='vendita'?'Incassata':'Pagata') : (inv.category==='vendita'?'Da incassare':'Da pagare')

    const animateBars=(root)=>{

    const animateTrendChart=(canvas,{labels,series})=>{
      const ctx=canvas.getContext('2d')
      if(!ctx) return
      const rect=canvas.getBoundingClientRect()
      if(!rect.width || !rect.height) return
      const dpr=Math.max(1,window.devicePixelRatio||1)
      canvas.width=Math.round(rect.width*dpr)
      canvas.height=Math.round(rect.height*dpr)
      ctx.setTransform(dpr,0,0,dpr,0,0)
      const width=rect.width
      const height=rect.height
      const pad={left:44,right:14,top:16,bottom:30}
      const plotW=width-pad.left-pad.right
      const plotH=height-pad.top-pad.bottom
      const values=series.flatMap(s=>s.values||[])
      const max=Math.max(1,...values,0)
      const steps=4
      const xFor=(idx)=> pad.left + (labels.length<=1 ? plotW/2 : (idx/(labels.length-1))*plotW)
      const yFor=(val)=> pad.top + (1-(val/max))*plotH
      const makePoints=(vals,progress)=>{
        if(!vals.length) return []
        if(vals.length===1) return [{x:xFor(0),y:yFor(vals[0])}]
        const position=Math.max(0,Math.min(vals.length-1,progress*(vals.length-1)))
        const full=Math.floor(position)
        const frac=position-full
        const pts=[]
        for(let i=0;i<=full;i++) pts.push({x:xFor(i),y:yFor(vals[i]||0)})
        if(full<vals.length-1){
          const x1=xFor(full); const y1=yFor(vals[full]||0)
          const x2=xFor(full+1); const y2=yFor(vals[full+1]||0)
          pts.push({x:x1+(x2-x1)*frac,y:y1+(y2-y1)*frac})
        }
        return pts
      }
      const draw=(progress)=>{
        ctx.clearRect(0,0,width,height)
        ctx.strokeStyle='rgba(148,163,184,.26)'
        ctx.lineWidth=1
        ctx.font='11px "Plus Jakarta Sans", sans-serif'
        ctx.fillStyle='rgba(148,163,184,.85)'
        for(let i=0;i<=steps;i++){
          const y=pad.top + (plotH/steps)*i
          ctx.beginPath()
          ctx.moveTo(pad.left,y)
          ctx.lineTo(width-pad.right,y)
          ctx.stroke()
          const v=Math.round(max*(1-i/steps))
          ctx.fillText(v.toLocaleString('it-IT'),4,y+4)
        }
        labels.forEach((lbl,idx)=>{
          if(labels.length<=6 || idx%2===0 || idx===labels.length-1){
            ctx.fillText(lbl,xFor(idx)-12,height-9)
          }
        })
        const traceLine=(pts)=>{
          if(!pts.length) return
          ctx.beginPath()
          ctx.moveTo(pts[0].x,pts[0].y)
          for(let i=1;i<pts.length;i++){
            const prev=pts[i-1]
            const curr=pts[i]
            const cx=(prev.x+curr.x)/2
            const cy=(prev.y+curr.y)/2
            ctx.quadraticCurveTo(prev.x,prev.y,cx,cy)
          }
          const last=pts[pts.length-1]
          ctx.lineTo(last.x,last.y)
        }
        series.forEach(s=>{
          const pts=makePoints(s.values||[],progress)
          if(pts.length<2) return
          if(s.fill){
            traceLine(pts)
            const first=pts[0]
            const last=pts[pts.length-1]
            ctx.lineTo(last.x,pad.top+plotH)
            ctx.lineTo(first.x,pad.top+plotH)
            ctx.closePath()
            ctx.fillStyle=s.fill
            ctx.fill()
          }
          traceLine(pts)
          ctx.strokeStyle=s.color
          ctx.lineWidth=2.6
          ctx.stroke()
          const end=pts[pts.length-1]
          ctx.beginPath()
          ctx.arc(end.x,end.y,3.4,0,Math.PI*2)
          ctx.fillStyle=s.color
          ctx.fill()
        })
      }
      const duration=850
      let start=null
      const step=(ts)=>{
        if(!start) start=ts
        const progress=Math.min(1,(ts-start)/duration)
        draw(progress)
        if(progress<1) requestAnimationFrame(step)
      }
      requestAnimationFrame(step)
    }
    const createTrendCard=({title,subtitle,labels,series})=>{

    const createDonutCard=(paid,open)=>{
      const total=Math.max(1,paid+open)
      const radius=72
      const circ=Math.PI*2*radius
      const paidLen=(paid/total)*circ
      const openLen=(open/total)*circ

      const openCircle=el('circle',{class:'ring-open',cx:'100',cy:'100',r:String(radius)})
      paidCircle.style.strokeDasharray=`${paidLen} ${circ}`
      openCircle.style.strokeDasharray=`${openLen} ${circ}`
      paidCircle.style.strokeDashoffset=String(circ)
      openCircle.style.strokeDashoffset=String(circ)
      const card=el('div',{class:'card padded'},

        )

    }
    const computeStats=(rows)=>{
      const now=new Date()
      const today=new Date(now)
      today.setHours(0,0,0,0)
      const months=getMonths(12)
      const monthMap=Object.fromEntries(months.map((m,i)=>[m.key,i]))
      const monthly=months.map(m=>({label:m.label,key:m.key,sales:0,purchases:0,collections:0,count:0}))
      const openRows=[]
      const paidRows=[]
      let salesOpen=0, salesPaid=0, purchasesOpen=0, purchasesPaid=0
      rows.forEach(inv=>{
        const amount=invAmount(inv)
        const category=inv.category
        const docDate=parseDate(inv.data||inv.createdAt||inv.ts)
        if(docDate){
          const idx=monthMap[monthKey(docDate)]
          if(idx!=null){
            monthly[idx].count+=1
            if(category==='vendita') monthly[idx].sales+=amount
            else monthly[idx].purchases+=amount
          }
        }
        if(inv.paid){
          paidRows.push(inv)
          if(category==='vendita') salesPaid+=amount
          else purchasesPaid+=amount
        }else{
          openRows.push(inv)
          if(category==='vendita') salesOpen+=amount
          else purchasesOpen+=amount
        }
      })
      paidRows.forEach(inv=>{
        if(inv.category!=='vendita') return
        const paidDate=parseDate(inv.paidDate)
        if(!paidDate) return
        const idx=monthMap[monthKey(paidDate)]
        if(idx!=null) monthly[idx].collections+=invAmount(inv)
      })
      const dueOpen=openRows.map(inv=>{
        const due=parseDate(inv.dueDate||inv.data||inv.createdAt||inv.ts)
        if(!due) return null
        const diff=Math.round((due-today)/dayMs)
        return {...inv,due,diff}
      }).filter(Boolean).sort((a,b)=>a.due-b.due)

      const bucketDefs=[
        {id:'overdue',label:'Scadute',check:(d)=>d<0},
        {id:'week',label:'0-7 giorni',check:(d)=>d>=0 && d<=7},
        {id:'month',label:'8-30 giorni',check:(d)=>d>=8 && d<=30},
        {id:'future',label:'Oltre 30 giorni',check:(d)=>d>30}
      ]
      const dueBuckets=bucketDefs.map(def=>{
        const entries=dueOpen.filter(item=>def.check(item.diff))
        return {
          ...def,
          count:entries.length,
          total:entries.reduce((sum,item)=>sum+invAmount(item),0)
        }
      })

      const methodsMap={}
      rows.forEach(inv=>{
        const key=(inv.paymentMethod||'Non indicato').trim()||'Non indicato'
        if(!methodsMap[key]) methodsMap[key]={name:key,count:0,total:0}
        methodsMap[key].count+=1
        methodsMap[key].total+=invAmount(inv)
      })
      const methods=Object.values(methodsMap).sort((a,b)=>b.total-a.total)

      const cpMap={}
      rows.forEach(inv=>{
        const key=invoiceCounterparty(inv)||'-'
        if(!cpMap[key]) cpMap[key]={name:key,total:0,open:0,count:0}
        cpMap[key].count+=1
        cpMap[key].total+=invAmount(inv)
        if(!inv.paid) cpMap[key].open+=invAmount(inv)
      })
      const topCounterparties=Object.values(cpMap).sort((a,b)=>b.total-a.total).slice(0,8)

      const recentPayments=paidRows.slice().sort((a,b)=>{
        const da=parseDate(a.paidDate)||new Date(0)
        const db=parseDate(b.paidDate)||new Date(0)
        return db-da
      }).slice(0,8)

      const salesPaidWithDays=paidRows.filter(inv=>inv.category==='vendita').map(inv=>{
        const doc=parseDate(inv.data||inv.createdAt||inv.ts)
        const paid=parseDate(inv.paidDate)
        if(!doc || !paid) return null
        const days=Math.round((paid-doc)/dayMs)
        return days>=0?days:null
      }).filter(v=>v!=null)
      const avgCollectionDays=salesPaidWithDays.length? Math.round(salesPaidWithDays.reduce((a,b)=>a+b,0)/salesPaidWithDays.length):0

      const punctualRows=paidRows.filter(inv=>inv.category==='vendita').map(inv=>{
        const due=parseDate(inv.dueDate||inv.data)
        const paid=parseDate(inv.paidDate)
        if(!due || !paid) return null
        return paid<=due
      }).filter(v=>v!=null)
      const punctuality=punctualRows.length? Math.round((punctualRows.filter(Boolean).length/punctualRows.length)*100):0

      const invoiceTotal=rows.reduce((sum,inv)=>sum+invAmount(inv),0)
      const salesTotal=rows.filter(inv=>inv.category==='vendita').reduce((sum,inv)=>sum+invAmount(inv),0)
      const purchaseTotal=rows.filter(inv=>inv.category==='acquisto').reduce((sum,inv)=>sum+invAmount(inv),0)

      return {
        rows,
        monthly,
        dueOpen,
        dueBuckets,
        methods,
        topCounterparties,
        recentPayments,
        avgCollectionDays,
        punctuality,
        invoiceTotal,
        salesTotal,
        purchaseTotal,
        salesOpen,
        salesPaid,
        purchasesOpen,
        purchasesPaid,
        openCount:openRows.length,
        paidCount:paidRows.length
      }
    }

    const renderDocuments=()=>{
      const pane=el('div',{class:'invoice-pane'})
