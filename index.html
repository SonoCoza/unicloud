      const info=el('div',{class:'filters-count'},'')
      const table=el('table',{class:'table'})
      const importFeedback=el('div',{class:'ops-note'})
      const now=new Date()
      const todayIso=toLocalISO(now)
      const currentMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`
      const monthOptions=(()=>{
        const arr=[]
        for(let i=0;i<24;i++){
          const d=new Date(now.getFullYear(), now.getMonth()-i, 1)
          arr.push({
            value:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
            label:d.toLocaleDateString('it-IT',{month:'long',year:'numeric'})
          })
        }
        return arr
      })()
      const round2=(value)=>Math.round((Number(value)||0)*100)/100
      const normalize=(value)=>(value||'').toString().trim().toLowerCase()
      const addDays=(iso,days)=>{
        const base=parseDate(iso)||new Date()
        return toLocalISO(new Date(base.getTime()+days*dayMs))
      }
      const tripDateISO=(trip)=>{
        const base=trip?.dataScarico||trip?.dataCarico||trip?.updatedAt||trip?.createdAt
        const parsed=parseDate(base)
        return parsed? toLocalISO(parsed):''
      }
      const tripAmount=(trip)=>round2(estimateTripRevenue(trip))
      const isTripCompleted=(trip)=> (trip?.stato||'').toString().toLowerCase().includes('compl')
      const buildTripLineDescription=(trip)=>{
        const doc=[trip?.documento?.tipo,trip?.documento?.numero].filter(Boolean).join(' ')
        const route=`${trip?.origine||'-'} -> ${trip?.arrivo||'-'}`
        return `Viaggio ${trip?.id||''} · ${route}${doc?` · ${doc}`:''} · ${fmtDateDisplay(tripDateISO(trip))}`
      }
      const getCounterpartyOptions=()=>{
        const names=[
          ...(list('customers')||[]).map(c=>c.name).filter(Boolean),
          ...(list('trips')||[]).map(t=>t.cliente).filter(Boolean),
          ...listInvoices().map(inv=>inv.counterparty).filter(Boolean)
        ]
        return Array.from(new Set(names.map(v=>v.trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b,'it',{sensitivity:'base'}))
      }
      const buildSuggestedNumber=(dateIso=todayIso)=>{
        const year=(dateIso||todayIso).slice(0,4)
        const progressive=(listInvoices().filter(inv=>String(inv.data||'').startsWith(year)).length+1).toString().padStart(4,'0')
        return `FT-${year}-${progressive}`
      }
      const getPeriodRange=(state)=>{
        if(state.periodMode==='mese'){
          const [yRaw,mRaw]=(state.periodMonth||'').split('-')
          const year=Number(yRaw)
          const month=Number(mRaw)
          if(!year || !month) return {from:'',to:'',label:'Seleziona mese'}
          return {
            from:`${year}-${String(month).padStart(2,'0')}-01`,
            to:toLocalISO(new Date(year, month, 0)),
            label:new Date(year, month-1, 1).toLocaleDateString('it-IT',{month:'long',year:'numeric'})
          }
        }
        let from=state.periodFrom||''
        let to=state.periodTo||''
        if(from && to && from>to){const t=from; from=to; to=t}
        if(!from || !to) return {from:'',to:'',label:'Completa dal/al'}
        return {from,to,label:`${fmtDateDisplay(from)} - ${fmtDateDisplay(to)}`}
      }
      const computeTripCandidates=(state)=>{
        if(state.category!=='vendita') return []
        const customer=normalize(state.counterparty)
        if(!customer) return []
        const period=getPeriodRange(state)
        if(!period.from || !period.to) return []
        const trips=(list('trips')||[]).filter(trip=>!trip?.draft)
        let matches=trips.filter(trip=>normalize(trip?.cliente)===customer)
        if(!matches.length){
          matches=trips.filter(trip=>{
            const name=normalize(trip?.cliente)
            return name && (name.includes(customer) || customer.includes(name))
          })
        }
        return matches.filter(trip=>{
          if(state.onlyCompleted && !isTripCompleted(trip)) return false
          if(trip?.invoiceId || trip?.invoiceNumber || trip?.invoicedAt) return false
          const iso=tripDateISO(trip)
          if(!iso) return false
          return iso>=period.from && iso<=period.to
        }).sort((a,b)=>(tripDateISO(b)||'').localeCompare(tripDateISO(a)||''))
      }

      const openInvoiceWizard=(seed={})=>{
        const wizard={
          category:seed.category||'vendita',
          number:seed.number||buildSuggestedNumber(todayIso),
          counterparty:seed.counterparty||'',
          issueDate:seed.issueDate||todayIso,
          dueDate:seed.dueDate||addDays(todayIso,30),
          tipo:seed.tipo||'TD01',
          paymentMethod:seed.paymentMethod||'Bonifico',
          vatRate:seed.vatRate!=null?Number(seed.vatRate):22,
          note:seed.note||'',
          periodMode:seed.periodMode||'mese',
          periodMonth:seed.periodMonth||currentMonth,
          periodFrom:seed.periodFrom||todayIso.slice(0,8)+'01',
          periodTo:seed.periodTo||todayIso,
          onlyCompleted:seed.onlyCompleted!==false,
          selectedTripIds:Array.isArray(seed.selectedTripIds)? [...seed.selectedTripIds]:[],
          extras:Array.isArray(seed.extras)? [...seed.extras]:[]
        }
        let stepIndex=0
        let matched=[]
        let extraAmountValue=null

        const overlay=el('div',{class:'modal-backdrop'})
        overlay.tabIndex=0
        const card=el('div',{class:'modal-card'})
        const title=el('div',{class:'modal-title'},'Nuova fattura guidata')
        const stepInfo=el('div',{class:'step-indicator'})
        const body=el('div',{class:'modal-body'})
        const error=el('div',{class:'muted',style:'color:#fca5a5;min-height:18px'})
        const back=el('button',{class:'btn ghost',type:'button'},'Indietro')
        const next=el('button',{class:'btn brand',type:'button'},'Avanti')
        const cancel=el('button',{class:'btn ghost',type:'button'},'Chiudi')
        card.append(title, stepInfo, body, error, el('div',{class:'modal-footer'}, el('div',{class:'row',style:'gap:8px'}, cancel, back), el('div',{class:'row',style:'gap:8px'}, next)))
        overlay.append(card)
        document.body.append(overlay)
        overlay.focus()

        const counterpartyListId=`inv-wizard-counterparty-${crypto.randomUUID()}`
        const counterpartyList=el('datalist',{id:counterpartyListId}, ...getCounterpartyOptions().map(name=>el('option',{value:name})))
        card.append(counterpartyList)

        const selectedTrips=()=> matched.filter(trip=>wizard.selectedTripIds.includes(trip.id))
        const totalsData=()=>{
          const selected=selectedTrips()
          const tripsSubtotal=round2(selected.reduce((sum,trip)=>sum+tripAmount(trip),0))
          const extrasSubtotal=round2(wizard.extras.reduce((sum,line)=>sum+Number(line.amount||0),0))
          const imponibile=round2(tripsSubtotal+extrasSubtotal)
          const vat=round2(imponibile*(Number(wizard.vatRate||0)/100))
          return {selected,tripsSubtotal,extrasSubtotal,imponibile,vat,total:round2(imponibile+vat)}
        }

        const syncTripSelection=(preserve=true)=>{
          const prev=new Set(wizard.selectedTripIds)
          matched=computeTripCandidates(wizard)
          if(preserve && prev.size){
            wizard.selectedTripIds=matched.map(t=>t.id).filter(id=>prev.has(id))
          }else{
            wizard.selectedTripIds=matched.map(t=>t.id)
          }
        }

        const persist=()=>{
          const calc=totalsData()
          const period=getPeriodRange(wizard)
          const tripLines=wizard.category==='vendita'
            ? calc.selected.map(trip=>({
                id:`L-${crypto.randomUUID()}`,
                type:'trip',
                tripId:trip.id,
                description:buildTripLineDescription(trip),
                qty:1,
                unitPrice:tripAmount(trip),
                total:tripAmount(trip)
              }))
            : []
          const extraLines=wizard.extras.map(line=>({
            id:line.id,
            type:'manual',
            description:line.description,
            qty:1,
            unitPrice:round2(line.amount),
            total:round2(line.amount)
          }))
          let invoice={
            id:`F-${crypto.randomUUID()}`,
            numero:(wizard.number||'').trim(),
            data:wizard.issueDate,
            dueDate:wizard.dueDate,
            clienteDen:wizard.category==='vendita'?(wizard.counterparty||'').trim():'',
            fornitoreDen:wizard.category==='acquisto'?(wizard.counterparty||'').trim():'',
            totale:calc.total,
            imponibile:calc.imponibile,
            ivaRate:Number(wizard.vatRate||0),
            ivaImporto:calc.vat,
            valuta:'EUR',
            tipo:(wizard.tipo||'').trim().toUpperCase() || (wizard.category==='vendita'?'TD01':'TD10'),
            category:wizard.category,
            paymentMethod:wizard.paymentMethod||'Bonifico',
            paid:false,
            paidDate:null,
            note:(wizard.note||'').trim(),
            tripIds:calc.selected.map(trip=>trip.id),
            lines:[...tripLines,...extraLines],
            source:calc.selected.length?'trip_auto':'manual',
            period:{mode:wizard.periodMode,month:wizard.periodMode==='mese'?wizard.periodMonth:null,from:period.from||null,to:period.to||null}
          }
          if(invoice.category==='vendita'){
            invoice=linkInvoiceToCustomer({
              ...invoice,
              customerVatCf:'',
              customerEmail:''
            })
          }
          add('invoices',invoice)
          if(invoice.category==='vendita'){
            const stamp=new Date().toISOString()
            calc.selected.forEach(trip=>{
              put('trips',trip.id,{invoiceId:invoice.id,invoiceNumber:invoice.numero,invoicedAt:stamp,updatedAt:stamp})
            })
          }
          logEvent('invoice_created',{numero:invoice.numero,category:invoice.category,total:invoice.totale,trips:invoice.tripIds.length},{targetId:invoice.id})
        }

        const buildTripsStep=()=>{
          const section=el('div',{class:'invoice-wizard-period'})
          const periodModeDropdown=createDropdown({
            value:wizard.periodMode,
            placeholder:'Periodo',
            options:[{value:'mese',label:'Mese'},{value:'intervallo',label:'Intervallo date'}],
            onSelect:(val)=>{wizard.periodMode=val||'mese'; syncTripSelection(true); renderStep()}
          })
          const monthDropdown=createDropdown({
            value:wizard.periodMonth,
            placeholder:'Seleziona mese',
            options:monthOptions,
            onSelect:(val)=>{wizard.periodMonth=val||currentMonth; syncTripSelection(false); renderStep()}
          })
          const fromPicker=createDateField({value:wizard.periodFrom,placeholder:'Data inizio',onChange:(iso)=>{wizard.periodFrom=iso||''; syncTripSelection(true); renderStep()}})
          const toPicker=createDateField({value:wizard.periodTo,placeholder:'Data fine',onChange:(iso)=>{wizard.periodTo=iso||''; syncTripSelection(true); renderStep()}})
          const onlyCompleted=el('input',{type:'checkbox'})
          onlyCompleted.checked=wizard.onlyCompleted
          onlyCompleted.onchange=()=>{wizard.onlyCompleted=onlyCompleted.checked; syncTripSelection(false); renderStep()}

          const actions=el('div',{class:'invoice-actions-row'},
            el('button',{class:'btn ghost',type:'button',onclick:()=>{wizard.selectedTripIds=matched.map(t=>t.id); renderStep()}},'Seleziona tutti'),
            el('button',{class:'btn ghost',type:'button',onclick:()=>{wizard.selectedTripIds=matched.filter(t=>tripAmount(t)>0).map(t=>t.id); renderStep()}},'Solo con tariffa'),
            el('button',{class:'btn ghost',type:'button',onclick:()=>{wizard.selectedTripIds=[]; renderStep()}},'Deseleziona')
          )

          const tripsList=el('div',{class:'invoice-wizard-list'})
          const period=getPeriodRange(wizard)
          if(wizard.category!=='vendita'){
            tripsList.append(el('div',{class:'invoice-empty-compact'},'Per fatture acquisto non viene caricata la lista viaggi.'))
          }else if(!normalize(wizard.counterparty)){
            tripsList.append(el('div',{class:'invoice-empty-compact'},'Inserisci il cliente nel primo step.'))
          }else if(!period.from || !period.to){
            tripsList.append(el('div',{class:'invoice-empty-compact'},'Completa il periodo per cercare i viaggi.'))
          }else if(!matched.length){
            tripsList.append(el('div',{class:'invoice-empty-compact'},'Nessun viaggio non fatturato trovato per il filtro selezionato.'))
          }else{
            matched.forEach(trip=>{
              const checked=wizard.selectedTripIds.includes(trip.id)
              const checkbox=el('input',{type:'checkbox'})
              checkbox.checked=checked
              checkbox.onchange=()=>{
                if(checkbox.checked) wizard.selectedTripIds=Array.from(new Set([...wizard.selectedTripIds,trip.id]))
                else wizard.selectedTripIds=wizard.selectedTripIds.filter(id=>id!==trip.id)
                renderStep()
              }
              tripsList.append(
                el('label',{class:`invoice-trip-row${checked?' active':''}`},
                  checkbox,
                  el('div',{class:'invoice-trip-main'},
                    el('div',{class:'title'},`${trip.cliente||'Cliente'} · ${trip.origine||'-'} -> ${trip.arrivo||'-'}`),
                    el('div',{class:'meta'},`${fmtDateDisplay(tripDateISO(trip))} · ${trip.documento?.tipo||'-'} ${trip.documento?.numero||''}`.trim())
                  ),
                  el('div',{class:'invoice-trip-right'},
                    el('div',{class:'amount'},fmtMoney(tripAmount(trip))),
                    el('span',{class:`badge ${(trip.stato||'').toLowerCase().includes('compl')?'status-green':(trip.stato||'').toLowerCase().includes('corso')?'status-orange':'status-gray'}`},trip.stato||'Da fare')
                  )
                )
              )
            })
          }

          section.append(
            el('div',{class:'invoice-wizard-period-grid'},
              field('Modalità periodo',periodModeDropdown.root),
              wizard.periodMode==='mese'
                ? field('Mese competenza',monthDropdown.root)
                : field('Intervallo',el('div',{class:'invoice-wizard-period-grid'},fromPicker.root,toPicker.root)),
              field('Filtro stato',el('label',{class:'row',style:'font-size:13px;gap:8px'},onlyCompleted,'Solo viaggi completati'))
            ),
            el('div',{class:'invoice-inline-note'},`Periodo elaborato: ${period.label}`),
            actions,
            tripsList
          )
          return section
        }

        const buildExtrasStep=()=>{
          const wrap=el('div',{class:'invoice-pane'})
          const desc=el('input',{class:'input',placeholder:'Descrizione voce (es. Pedaggi, extra servizio)'})
          const amountField=createCurrencyInput(null,{onChange:(v)=>{extraAmountValue=v}})
          amountField.input.classList.add('input')
          const listNode=el('div',{class:'invoice-extra-list'})
          const formError=el('div')
          uiShowInlineError(formError,[])
          const refreshList=()=>{
            if(!wizard.extras.length){
              listNode.replaceChildren(el('div',{class:'invoice-empty-compact'},'Nessuna voce manuale inserita.'))
              return
            }
            listNode.replaceChildren(...wizard.extras.map(line=>
              el('div',{class:'invoice-extra-item'},
                el('div',{},el('div',{},line.description),el('div',{class:'meta'},'Voce manuale')),
                el('div',{class:'row',style:'gap:8px;align-items:center'},
                  el('strong',{},fmtMoney(line.amount)),
                  el('button',{class:'btn red',type:'button',onclick:()=>{wizard.extras=wizard.extras.filter(x=>x.id!==line.id); refreshList(); renderStep(true)}},'Rimuovi')
                )
              )
            ))
          }
          const addBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{
            uiShowInlineError(formError,[])
            const description=(desc.value||'').trim()
            const amount=Number(extraAmountValue||0)
            if(!description){uiShowInlineError(formError,['Inserisci la descrizione della voce manuale.']); return}
            if(!(amount>0)){uiShowInlineError(formError,['Inserisci un importo valido.']); return}
            wizard.extras.push({id:`XL-${crypto.randomUUID()}`,description,amount:round2(amount)})
            desc.value=''
            extraAmountValue=null
            amountField.setValue(null)
            refreshList()
            renderStep(true)
          }},'Aggiungi voce')
          refreshList()
          wrap.append(el('div',{class:'invoice-form-grid'},desc,amountField.input),formError,addBtn,listNode)
          return wrap
        }

        const buildSummaryStep=()=>{
          const calc=totalsData()
          const summary=el('div',{class:'invoice-wizard-summary'},
            el('div',{class:'line'},el('span',{},`Viaggi selezionati (${calc.selected.length.toLocaleString('it-IT')})`),el('strong',{},fmtMoney(calc.tripsSubtotal))),
            el('div',{class:'line'},el('span',{},`Voci manuali (${wizard.extras.length.toLocaleString('it-IT')})`),el('strong',{},fmtMoney(calc.extrasSubtotal))),
            el('div',{class:'line'},el('span',{},'Imponibile'),el('strong',{},fmtMoney(calc.imponibile))),
            el('div',{class:'line'},el('span',{},`IVA ${Number(wizard.vatRate||0).toLocaleString('it-IT')}%`),el('strong',{},fmtMoney(calc.vat))),
            el('div',{class:'line total'},el('span',{},'Totale fattura'),el('span',{},fmtMoney(calc.total)))
          )
          const lines=el('div',{class:'invoice-mini-lines'})
          const tripLines=calc.selected.map(trip=>({label:buildTripLineDescription(trip),value:fmtMoney(tripAmount(trip))}))
          const manualLines=wizard.extras.map(line=>({label:line.description,value:fmtMoney(line.amount)}))
          const all=[...tripLines,...manualLines]
          if(!all.length){
            lines.append(el('div',{class:'invoice-empty-compact'},'Nessuna riga presente.'))
          }else{
            all.forEach(line=>lines.append(el('div',{class:'invoice-mini-line'},el('span',{},line.label),el('strong',{},line.value))))
          }
          return el('div',{class:'invoice-pane'}, summary, lines)
        }

        const steps=[
          {
            title:'Documento',
            validate:()=>{
              if(!(wizard.number||'').trim()) return 'Inserisci il numero fattura'
              if(!(wizard.counterparty||'').trim()) return 'Inserisci cliente/fornitore'
              if(!wizard.issueDate) return 'Inserisci la data emissione'
              if(!wizard.dueDate) return 'Inserisci la scadenza'
              return null
            },
            render:()=>{
              const categoryDropdown=createDropdown({
                value:wizard.category,
                placeholder:'Categoria',
                options:[{value:'vendita',label:'Vendita cliente'},{value:'acquisto',label:'Acquisto fornitore'}],
                onSelect:(val)=>{wizard.category=val||'vendita'; if(wizard.category==='acquisto' && wizard.tipo==='TD01') wizard.tipo='TD10'; if(wizard.category==='vendita' && wizard.tipo==='TD10') wizard.tipo='TD01'; syncTripSelection(true); renderStep()}
              })
              const paymentDropdown=createDropdown({
                value:wizard.paymentMethod,
                placeholder:'Pagamento',
                options:[{value:'Bonifico',label:'Bonifico'},{value:'SEPA',label:'SEPA Direct Debit'},{value:'RIBA',label:'RiBa'},{value:'Carta',label:'Carta'},{value:'Contanti',label:'Contanti'}],
                onSelect:(val)=>{wizard.paymentMethod=val||'Bonifico'}
              })
              const issuePicker=createDateField({value:wizard.issueDate,placeholder:'Data emissione',onChange:(iso)=>{wizard.issueDate=iso||todayIso}})
              const duePicker=createDateField({value:wizard.dueDate,placeholder:'Scadenza',onChange:(iso)=>{wizard.dueDate=iso||''}})
              const numberInput=el('input',{class:'input',value:wizard.number,placeholder:'Numero fattura'})
              numberInput.oninput=()=>{wizard.number=numberInput.value}
              const counterpartyInput=el('input',{class:'input',value:wizard.counterparty,placeholder:'Cliente/Fornitore',list:counterpartyListId})
              counterpartyInput.oninput=()=>{wizard.counterparty=counterpartyInput.value; syncTripSelection(true)}
              const tipoInput=el('input',{class:'input',value:wizard.tipo,placeholder:'Tipo documento (TD01, TD10...)'})
              tipoInput.oninput=()=>{wizard.tipo=tipoInput.value.toUpperCase()}
              const vatInput=el('input',{class:'input',type:'number',step:'0.1',min:'0',max:'100',value:String(wizard.vatRate)})
              vatInput.oninput=()=>{wizard.vatRate=Math.max(0,Math.min(100,Number(vatInput.value||0)))}
              const noteInput=el('input',{class:'input',value:wizard.note,placeholder:'Note fattura'})
              noteInput.oninput=()=>{wizard.note=noteInput.value}
              const autoBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>{wizard.number=buildSuggestedNumber(wizard.issueDate||todayIso); numberInput.value=wizard.number}},'Auto numero')
              return el('div',{class:'invoice-pane'},
                el('div',{class:'invoice-form-grid'},
                  field('Numero',el('div',{class:'row',style:'gap:8px'},numberInput,autoBtn)),
                  field('Categoria',categoryDropdown.root),
                  field('Cliente/Fornitore',counterpartyInput),
                  field('Data emissione',issuePicker.root),
                  field('Scadenza',duePicker.root),
                  field('Tipo documento',tipoInput),
                  field('Pagamento',paymentDropdown.root),
                  field('IVA %',vatInput),
                  field('Note',noteInput)
                )
              )
            }
          },
          {
            title:'Viaggi e Periodo',
            validate:()=>null,
            render:()=>buildTripsStep()
          },
          {
            title:'Voci Manuali',
            validate:()=>null,
            render:()=>buildExtrasStep()
          },
          {
            title:'Riepilogo',
            validate:()=>{
              const calc=totalsData()
              const hasRows=wizard.category==='vendita' ? (calc.selected.length>0 || wizard.extras.length>0) : wizard.extras.length>0
              if(!hasRows) return wizard.category==='vendita' ? 'Seleziona almeno un viaggio o inserisci una voce manuale' : 'Inserisci almeno una voce manuale'
              if(calc.total<=0) return 'Il totale fattura deve essere maggiore di zero'
              return null
            },
            render:()=>buildSummaryStep()
          }
        ]

        const onKey=(e)=>{
          if(e.key==='Escape'){
            e.preventDefault()
            close()
            return
          }
          if(e.key==='Enter' && !e.shiftKey){
            const target=e.target
            if(target && target.closest('.dropdown.open')) return
            if(target && target.closest('.datepicker-panel')) return
            if(target && target.tagName==='TEXTAREA') return
            e.preventDefault()
            next.click()
          }
        }
        const close=()=>{
          overlay.removeEventListener('keydown',onKey)
          overlay.remove()
        }
        cancel.onclick=close
        back.onclick=()=>{
          if(stepIndex===0){close(); return}
          stepIndex--
          renderStep()
        }
        next.onclick=()=>{
          error.textContent=''
          const step=steps[stepIndex]
          const fail=step.validate?.()
          if(fail){error.textContent=fail; return}
          if(stepIndex===steps.length-1){
            persist()
            close()
            renderActiveTab()
            return
          }
          stepIndex++
          if(stepIndex===1) syncTripSelection(true)
          renderStep()
        }
        overlay.addEventListener('keydown',onKey)
        overlay.addEventListener('click',(e)=>{if(e.target===overlay) close()})

        function renderStep(skipResetError=false){
          if(!skipResetError) error.textContent=''
          const step=steps[stepIndex]
          stepInfo.textContent=`Passo ${stepIndex+1} di ${steps.length}`
          title.textContent=`Nuova fattura guidata · ${step.title}`
          back.style.visibility=stepIndex===0?'hidden':'visible'
          back.style.pointerEvents=stepIndex===0?'none':'auto'
          next.textContent=stepIndex===steps.length-1?'Crea fattura':'Avanti'
          next.className=stepIndex===steps.length-1?'btn green':'btn brand'
          body.replaceChildren(step.render())
          card.scrollTop=0
        }

        syncTripSelection(false)
        renderStep()
      }

      const openLinkedCustomer=(invoice)=>{
        const query=(invoice.customerVatCf||invoice.clientePI||invoice.clienteCF||invoice.counterparty||'').trim()
        if(query) APP_STATE.routeContext.customerPrefill=query
        navigateTo('clienti')
        renderApp()
      }
      const importInvoiceXml=async()=>{
        importFeedback.textContent=''
        const file=await pickFile({accept:'.xml,text/xml,application/xml'})
        if(!file) return
        try{
          const xmlText=await file.text()
          const parsed=parseFatturaPAXML(xmlText)
          if(!parsed?.ok){
            importFeedback.textContent=parsed?.error||'Impossibile leggere il file XML selezionato.'
            return
          }
          const category=parsed.categoria||detectInvoiceCategory(parsed.tipo)
          const counterpartyName=(category==='vendita'
            ? (parsed.clienteDen||'')
            : (parsed.fornitoreDen||parsed.clienteDen||'')).trim()
          const counterpartyTax=(category==='vendita'
            ? (parsed.clientePI||parsed.clienteCF||'')
            : (parsed.fornitorePI||parsed.fornitoreCF||parsed.clientePI||parsed.clienteCF||'')).trim()
          let completion=null
          if(!counterpartyName && !counterpartyTax){
            completion=await askCompleteCustomerData({})
            if(!completion){
              importFeedback.textContent='Import annullato: dati cliente non completati.'
              return
            }
          }

          let invoice={
            id:`F-${crypto.randomUUID()}`,
            numero:(parsed.numero||'').trim()||`XML-${new Date().getTime()}`,
            data:(parsed.data||todayIso).slice(0,10),
            dueDate:addDays((parsed.data||todayIso).slice(0,10),30),
            clienteDen:category==='vendita'?((counterpartyName||completion?.name||'').trim()):'',
            fornitoreDen:category==='acquisto'?((counterpartyName||completion?.name||'').trim()):'',
            clientePI:category==='vendita'?((parsed.clientePI||completion?.tax||'').trim()):'',
            clienteCF:category==='vendita'?((parsed.clienteCF||'').trim()):'',
            fornitorePI:category==='acquisto'?((parsed.fornitorePI||completion?.tax||'').trim()):'',
            fornitoreCF:category==='acquisto'?((parsed.fornitoreCF||'').trim()):'',
            customerVatCf:(counterpartyTax||completion?.tax||'').trim(),
            customerEmail:(completion?.email||'').trim(),
            totale:amountKey(parsed.totale||0),
            imponibile:amountKey(parsed.totale||0),
            ivaRate:0,
            ivaImporto:0,
            valuta:(parsed.valuta||'EUR').trim()||'EUR',
            tipo:(parsed.tipo||'').trim().toUpperCase() || (category==='vendita'?'TD01':'TD10'),
            category,
            paymentMethod:'Bonifico',
            paid:false,
            paidDate:null,
            note:'Import XML FatturaPA',
            tripIds:[],
            lines:[],
            source:'xml_import',
            period:null
          }
          const duplicate=findDuplicateInvoice(invoice)
          if(duplicate){
            const ok=await askConfirm({
              title:'Documento già presente',
              message:`Esiste già una fattura con numero ${invoice.numero}. Vuoi importarla comunque?`,
              confirmLabel:'Importa comunque',
              cancelLabel:'Annulla'
            })
            if(!ok){
              importFeedback.textContent='Import annullato: documento duplicato.'
              return
            }
          }
          if(invoice.category==='vendita'){
            invoice=linkInvoiceToCustomer(invoice)
          }
          add('invoices',invoice)
          logEvent('invoice_created',{numero:invoice.numero,category:invoice.category,total:invoice.totale,source:'xml_import'},{targetId:invoice.id})
          importFeedback.textContent='Fattura XML importata con successo.'
          renderTable()
        }catch{
          importFeedback.textContent='Errore durante l importazione XML.'
        }
      }

      const filterSearch=el('input',{class:'input',type:'search',placeholder:'Cerca numero, controparte, tipo o note...'})
      const filterCategory=createDropdown({
        value:'',
        placeholder:'Categoria',
        options:[{value:'',label:'Tutte le categorie'},{value:'vendita',label:'Vendite'},{value:'acquisto',label:'Acquisti'}],
        onSelect:(value)=>{filters.category=value||''; renderTable()}
      })
      const filterStatus=createDropdown({
        value:'',
        placeholder:'Stato',
        options:[{value:'',label:'Tutti'},{value:'open',label:'Aperti'},{value:'paid',label:'Saldati'},{value:'overdue',label:'Scaduti'}],
        onSelect:(value)=>{filters.status=value||''; renderTable()}
      })
      const filterMethod=createDropdown({
        value:'',
        placeholder:'Pagamento',
        options:[
          {value:'',label:'Tutti i metodi'},
          {value:'Bonifico',label:'Bonifico'},
          {value:'SEPA',label:'SEPA'},
          {value:'RIBA',label:'RiBa'},
          {value:'Carta',label:'Carta'},
          {value:'Contanti',label:'Contanti'}
        ],
        onSelect:(value)=>{filters.method=value||''; renderTable()}
      })
      const fromPicker=createDateField({value:'',placeholder:'Emissione da',onChange:(iso)=>{filters.from=iso||''; renderTable()}})
      const toPicker=createDateField({value:'',placeholder:'Emissione a',onChange:(iso)=>{filters.to=iso||''; renderTable()}})
      const resetDateFilters=el('button',{class:'btn ghost',type:'button',onclick:()=>{filters.from=''; filters.to=''; fromPicker.setValue(''); toPicker.setValue(''); renderTable()}},'Reset date')

      filterSearch.oninput=()=>{filters.search=filterSearch.value.trim().toLowerCase(); renderTable()}

      const head=el('div',{class:'card padded'},
        el('div',{class:'invoice-doc-head'},
          el('div',{},
            el('div',{class:'title'},'Gestione documenti fatture'),
            el('div',{class:'sub'},'Flusso professionale con creazione guidata, compilazione automatica dai viaggi e controllo stato incassi/pagamenti.')
          ),
          el('div',{class:'row',style:'gap:8px'},
            el('button',{class:'btn ghost',type:'button',onclick:importInvoiceXml},'Importa XML'),
            el('button',{class:'btn brand',type:'button',onclick:()=>openInvoiceWizard()},'Nuova fattura guidata')
          )
        ),
        importFeedback
      )

      const filterRow=el('div',{class:'filters-top'},
        filterSearch,
        filterCategory.root,
        filterStatus.root,
        filterMethod.root,
        el('div',{class:'invoice-date-filters'}, fromPicker.root, toPicker.root, resetDateFilters),
        info
      )

      const renderTable=()=>{
        let rows=listInvoices()
        rows=rows.filter(inv=>{
          if(filters.search){
            const hay=[inv.numero,inv.counterparty,inv.tipo,inv.paymentMethod,inv.fileName,inv.note].map(v=>(v||'').toString().toLowerCase())
            if(!hay.some(v=>v.includes(filters.search))) return false
          }
          if(filters.category && inv.category!==filters.category) return false
          if(filters.method && (inv.paymentMethod||'')!==filters.method) return false
          if(filters.status==='open' && inv.paid) return false
          if(filters.status==='paid' && !inv.paid) return false
          if(filters.status==='overdue'){
            if(inv.paid) return false
            const due=parseDate(inv.dueDate||inv.data||Date.now())
            if(!due || due>=new Date()) return false
          }
          const docIso=(inv.data||'').slice(0,10)
          if(filters.from && (!docIso || docIso<filters.from)) return false
          if(filters.to && (!docIso || docIso>filters.to)) return false
          return true
        })

        info.textContent=rows.length?fmtCount(rows.length,'documento','documenti'):'Nessun documento'
        const bodyRows=rows.map(inv=>{
          const due=parseDate(inv.dueDate||inv.data)
          const diff=due?Math.round((due-new Date())/dayMs):null
          const dueBadge=diff==null
            ? el('span',{class:'badge'},'—')
            : el('span',{class:`badge ${diff<0?'status-orange':diff<=7?'status-orange':'status-gray'}`},dueText(diff))
          const sourceLabel=inv.tripIds?.length
            ? `Viaggi (${inv.tripIds.length.toLocaleString('it-IT')})`
            : inv.lines?.length
              ? `Manuale (${inv.lines.length.toLocaleString('it-IT')})`
              : 'Manuale'
          const customerLinked=inv.category==='vendita' && Boolean(inv.customerId||inv.customerLinked)
          const counterpartyCell=el('div',{class:'cell-stack'},
            el('div',{class:'cell-main'},inv.counterparty||'-'),
            customerLinked?el('span',{class:'badge status-green'},'Collegata a cliente'):null
          )
          const actions=el('div',{class:'row',style:'gap:6px;flex-wrap:wrap'},
            el('button',{class:'btn ghost',onclick:()=>markPaid(inv,!inv.paid)},inv.paid?'Riapri':'Segna saldata'),
            customerLinked?el('button',{class:'btn ghost',type:'button',onclick:()=>openLinkedCustomer(inv)},'Apri cliente'):null,
            el('button',{class:'btn red',onclick:()=>removeInvoice(inv)},'Elimina')
          )
          return el('tr',{},
            el('td',{},inv.numero||'-'),
            el('td',{},fmtDateDisplay(inv.data)),
            el('td',{},el('div',{class:'cell-stack'},el('div',{class:'cell-main'},fmtDateDisplay(inv.dueDate)),el('div',{class:'cell-sub'},dueBadge))),
            el('td',{},counterpartyCell),
            el('td',{},inv.category==='vendita'?'Vendita':'Acquisto'),
            el('td',{},sourceLabel),
            el('td',{},inv.tipo||'-'),
            el('td',{},inv.paymentMethod||'—'),
            el('td',{},statusBadge(inv)),
            el('td',{},fmtMoney(invAmount(inv))),
            el('td',{},actions)
          )
        })

        if(!bodyRows.length){
          bodyRows.push(el('tr',{},el('td',{colspan:'11',style:'text-align:center;padding:24px;color:var(--muted)'},'Nessun documento trovato con i filtri correnti.')))
        }

        table.replaceChildren(
          el('thead',{},el('tr',{},
            el('th',{},'#'),
            el('th',{},'Emissione'),
            el('th',{},'Scadenza'),
            el('th',{},'Controparte'),
            el('th',{},'Categoria'),
            el('th',{},'Origine'),
            el('th',{},'Tipo'),
            el('th',{},'Pagamento'),
            el('th',{},'Stato'),
            el('th',{},'Totale'),
            el('th',{},'Azioni')
          )),
          el('tbody',{},...bodyRows)
        )
      }
      renderTable()

      pane.append(head, filterRow, el('div',{class:'invoice-table-wrap'}, table))
      return pane
    }

      const overdue=openRows.filter(inv=>{
        const due=parseDate(inv.dueDate||inv.data)
        return due && due<new Date()
      }).length
      const tabMeta={
        cruscotto:`${rows.length.toLocaleString('it-IT')} doc`,
        documenti:`${rows.length.toLocaleString('it-IT')}`,
        scadenze:overdue?`${overdue.toLocaleString('it-IT')} crit.`:`${openRows.length.toLocaleString('it-IT')} aperte`,
        incassi:`${rows.filter(inv=>inv.paid).length.toLocaleString('it-IT')} saldate`,
        analisi:'KPI'
      }
      tabBar.replaceChildren(
        el('div',{class:'invoice-nav-head'},
          el('strong',{},'Sezioni Fatture'),
          el('span',{},'Navigazione operativa')
        ),
        ...tabs.map(tab=>el('button',{
          class:`invoice-tab${tabState.id===tab.id?' active':''}`,
          type:'button',
          onclick:()=>{tabState.id=tab.id; renderActiveTab()}
        },
          el('span',{class:'invoice-tab-icon'}, icon(tab.icon||icons.invoice)),

          el('span',{class:'invoice-tab-meta'}, tabMeta[tab.id]||'')
        ))

    function renderActiveTab(){
      renderTabButtons()
      let pane
      switch(tabState.id){
        case 'documenti': pane=renderDocuments(); break
        case 'scadenze': pane=renderScadenze(); break

      el('div',{class:'badge'},'Contabilità operativa')
    )
    const workspace=el('div',{class:'invoice-workspace'}, tabBar, content)
    wrap.append(head, workspace)
    renderActiveTab()
    return wrap
  }

    const search=el('input',{

    }
    const sortDropdown=createDropdown({

    const addName=el('input',{class:'input',placeholder:'Denominazione'})
    const addVat=el('input',{class:'input',placeholder:'P. IVA / CF'})
    const addPhone=el('input',{class:'input',placeholder:'Telefono'})
    const addEmail=el('input',{class:'input',placeholder:'Email'})
    const addPec=el('input',{class:'input',placeholder:'PEC'})
    const addSdi=el('input',{class:'input',placeholder:'Codice SDI'})
    const addAddress=el('input',{class:'input',placeholder:'Indirizzo'})
    const addCity=el('input',{class:'input',placeholder:'Citta'})
    const addProvince=el('input',{class:'input',placeholder:'Provincia'})
    const addTerms=el('input',{class:'input',placeholder:'Termini pagamento (es. 30 gg FM)'})
    const addFeedback=el('div',{class:'ops-note'})
    const addBtn=el('button',{class:'btn brand',type:'button',onclick:()=>{
      const customerName=(addName.value||'').trim()
      if(!customerName){
