      function renderStep(){
        setError([])
        const step=steps[stepIndex]
        title.textContent=isEdit?`Modifica viaggio · ${step.title}`:`Nuovo viaggio · ${step.title}`
        stepInfo.textContent=`Passo ${stepIndex+1} di ${steps.length}`
        const rendered=step.render()
        const nodes=Array.isArray(rendered)? rendered: [rendered]
        body.replaceChildren(...nodes)
        back.style.visibility=stepIndex===0?'hidden':'visible'
        back.style.pointerEvents=stepIndex===0?'none':'auto'
        next.textContent=stepIndex===steps.length-1 ? (isEdit?'Salva modifiche':'Crea viaggio') : 'Avanti'
        next.className=stepIndex===steps.length-1 ? 'btn green' : 'btn brand'
        card.scrollTop=0
      }

      function persist(){
        const payload=buildPayload(false)
        payload.draft=false
        const validationErrors=validateTripPayload(payload)
        if(validationErrors.length){
          setError(validationErrors)
          return false
        }
        const clienteName=(payload.cliente||'').trim()
        let tripId=null
        if(isEdit){
          tripId=trip.id
          put('trips', trip.id, payload)
          draftId=trip.id
        }else{
          const id=draftId || 'T-'+crypto.randomUUID()
          tripId=id
          if(draftId){
            put('trips', id, payload)
          }else{
            draftId=id
            add('trips',{id,createdAt:new Date().toISOString(),...payload})
          }
          const exists=clienteName && list('customers').some(c=>(c.name||'').toLowerCase()===clienteName.toLowerCase())
          if(state.saveCliente && clienteName && !exists){
            add('customers',{id:'CUST-'+crypto.randomUUID(),name:clienteName,vat:'',phone:'',email:'',pec:'',sdi:'',address:'',city:'',province:'',paymentTerms:''})
            logEvent('customer_autocreated',{name:clienteName})
          }
        }
        if(tripId){
          logEvent('trip_saved',{tripId,cliente:payload.cliente||'',draft:false},{targetId:tripId})
        }
        refresh()
        close()
        return true
      }

      next.onclick=()=>{
        setError([])
        const currentStep=steps[stepIndex]
        if(currentStep.validate && !currentStep.validate()) return
        if(stepIndex===steps.length-1){
          persist()
        }else{
          stepIndex++
          renderStep()
        }
      }

      renderStep()
    }
    function refresh(){
      const allRows=list('trips').slice().sort((a,b)=> new Date(b.createdAt||0) - new Date(a.createdAt||0))
      const driversCache=list('drivers')||[]
      const fleetCache=list('fleet')||[]
      const parsePlainDate=(val)=> val? new Date(`${val}T00:00:00`):null
      const filtered=allRows.filter(trip=>{
        if(filters.search){
          const term=filters.search
          const hay=[trip.cliente,trip.azienda,trip.tipoTrasporto,trip.caricoAzienda,trip.scaricoAzienda,trip.documento?.numero,trip.documento?.tipo,trip.riferimento,trip.priorita,trip.note,trip.id]
            .map(s=>(s||'').toString().toLowerCase())
          if(!hay.some(h=>h.includes(term))) return false
        }
        if(filters.cliente && filters.cliente!=='' && !(trip.cliente||'').toString().toLowerCase().includes(filters.cliente)) return false
        if(filters.azienda && filters.azienda!=='' && trip.azienda!==filters.azienda) return false
        if(filters.stato && filters.stato!=='' && trip.stato!==filters.stato) return false
        if(filters.priorita && filters.priorita!=='' && (trip.priorita||'Normale')!==filters.priorita) return false
        if(filters.autista && filters.autista!=='' && trip.autista!==filters.autista) return false
        if(filters.from || filters.to){
          const fromDate=parsePlainDate(filters.from)
          const toDateRaw=parsePlainDate(filters.to)
          const toDate=toDateRaw? new Date(toDateRaw.getTime()+24*60*60*1000-1):null
          const carico=trip.dataCarico? parsePlainDate(trip.dataCarico):null
          const scarico=trip.dataScarico? parsePlainDate(trip.dataScarico):null
          let rangeStart=carico||scarico
          let rangeEnd=scarico||carico
          if(rangeStart && rangeEnd && rangeStart>rangeEnd){const tmp=rangeStart; rangeStart=rangeEnd; rangeEnd=tmp}
          if((fromDate||toDate) && !rangeStart && !rangeEnd) return false
          if(fromDate && (!rangeEnd || rangeEnd<fromDate)) return false
          if(toDate && (!rangeStart || rangeStart>toDate)) return false
        }
        return true
      })
      resultsInfo.textContent = filtered.length ? fmtCount(filtered.length,'viaggio','viaggi') : 'Nessun viaggio'
      for(const id of Array.from(expanded)){
        if(!filtered.some(t=>String(t.id)===String(id))) expanded.delete(id)
      }

      const downloadAttachment=(att)=>{
        const file=att.file
        if(!file?.data) return
        downloadBase64File({base64:file.data,name:file.name || att.titolo || 'documento',type:file.type||'application/octet-stream'})
      }
      const addAttachment=async(trip)=>{
        if(!can('viaggi.manage')) return
        const tipo=await askDocumentType()
        if(!tipo) return
        let titolo=tipo==='ddt'?'DDT':tipo==='fr'?'Formulario rifiuti':null
        if(tipo==='altro'){
          titolo=await askTextModal({title:'Titolo documento',placeholder:'Es. Contratto fornitore'})
          if(!titolo) return
        }
        const file=await pickFile()
        if(!file) return
        const data=await fileToBase64(file)
        const next=(trip.attachments||[]).concat({
          id:'ATT-'+crypto.randomUUID(),
          tipo,
          titolo:titolo,
          file:{name:file.name,size:file.size,type:file.type,data}
        })
        put('trips', trip.id,{attachments:next,updatedAt:new Date().toISOString()})
        logEvent('trip_attachment_added',{tripId:trip.id,title:titolo},{targetId:trip.id})
        refresh()
      }
      const removeAttachment=async(trip,attId)=>{
        if(!can('viaggi.manage')) return
        const ok=await askConfirm({title:'Rimuovi documento',message:'Vuoi eliminare questo documento?',confirmLabel:'Elimina',cancelLabel:'Annulla',tone:'danger'})
        if(!ok) return
        const target=(trip.attachments||[]).find(a=>a.id===attId)
        const next=(trip.attachments||[]).filter(a=>a.id!==attId)
        put('trips', trip.id,{attachments:next,updatedAt:new Date().toISOString()})
        logEvent('trip_attachment_removed',{tripId:trip.id,title:target?.titolo||target?.file?.name},{targetId:trip.id})
        refresh()
      }
        const buildDetail=(trip)=>{
          const drivers=list('drivers')
          const fleet=list('fleet')
          const driverLabel=drivers.find(d=>d.id===trip.autista)?.name || trip.autista || '-'
          const camionLabel=fleet.find(f=>f.id===trip.camion)?.targa || trip.camion || '-'
          const rimorchioLabel=fleet.find(f=>f.id===trip.rimorchio)?.targa || trip.rimorchio || '-'
        const generalList=el('div',{class:'detail-list'},
          el('div',{}, el('strong',{},'Cliente fatturazione'), el('span',{}, trip.cliente||'-')),
          el('div',{}, el('strong',{},'Società esecutrice'), el('span',{}, trip.azienda||'-')),
          el('div',{}, el('strong',{},'Documento'), el('span',{}, `${trip.documento?.tipo||'-'} ${trip.documento?.numero||''}`.trim()||'-')),
          el('div',{}, el('strong',{},'Riferimento'), el('span',{}, trip.riferimento||'-')),
          el('div',{}, el('strong',{},'Priorità'), el('span',{}, trip.priorita||'Normale')),
          el('div',{}, el('strong',{},'Tariffa'), el('span',{}, describeTariff(trip.tariffa))),
          el('div',{}, el('strong',{},'Peso'), el('span',{}, formatWeight(trip.peso, trip.pesoUnit))),
          el('div',{}, el('strong',{},'Stato'), el('span',{}, trip.stato||'-'))
        )
        const logisticsList=el('div',{class:'detail-list'},
          el('div',{}, el('strong',{},'Carico'), el('span',{}, `${trip.caricoAzienda||'-'} · ${trip.origine||'-'}`), el('span',{class:'muted'}, fmtDateDisplay(trip.dataCarico))),
          el('div',{}, el('strong',{},'Scarico'), el('span',{}, `${trip.scaricoAzienda||'-'} · ${trip.arrivo||'-'}`), el('span',{class:'muted'}, fmtDateDisplay(trip.dataScarico))),
          el('div',{}, el('strong',{},'Autista'), el('span',{}, driverLabel)),
          el('div',{}, el('strong',{},'Mezzi'), el('span',{}, `${camionLabel} • ${rimorchioLabel}`))
        )
        const columns=el('div',{class:'trip-columns'}, generalList, logisticsList)
        const detailError=el('div')
        uiShowInlineError(detailError,[])
        const pesoInput=el('input',{class:'input',placeholder:'Quantità',value:trip.peso!=null?Number(trip.peso).toLocaleString('it-IT',{maximumFractionDigits:2}):''})
        const formatPesoField=(val)=> val==null?'':Number(val).toLocaleString('it-IT',{maximumFractionDigits:3})
        pesoInput.value=formatPesoField(trip.peso)
        let localUnit=trip.pesoUnit||'t'
        const unitDropdown=createDropdown({
          value:localUnit,
          placeholder:'Unità',
          options:[
            {value:'t',label:'Tonnellate (t)'},
            {value:'q',label:'Quintali (q)'},
            {value:'kg',label:'Chilogrammi (kg)'}
          ],
          onSelect:(val)=>{
            localUnit=val||'t'
            commitPeso('auto')
          }
        })
        unitDropdown.root.style.minWidth='120px'
        unitDropdown.root.style.flex='0 0 140px'
        const commitPeso=(mode)=>{
          if(!can('viaggi.manage')){
            if(mode!=='auto') uiShowInlineError(detailError,['Permesso negato.'])
            return
          }
          uiShowInlineError(detailError,[])
          const raw=pesoInput.value.trim()
          if(!raw){
            if(trip.peso==null && (trip.pesoUnit||'t')===localUnit) return
            put('trips', trip.id,{peso:null,pesoUnit:localUnit,updatedAt:new Date().toISOString()})
            logEvent('trip_weight_cleared',{tripId:trip.id,unit:localUnit},{targetId:trip.id})
            refresh()
            return
          }
          const normalized=raw.replace(/\s/g,'').replace(/,/g,'.')
          const val=parseFloat(normalized)
          if(Number.isNaN(val)){
            if(mode!=='auto') uiShowInlineError(detailError,['Inserisci un valore numerico valido.'])
            return
          }
          const rounded=Number(val.toFixed(3))
          const sameValue=trip.peso!=null && Math.abs(Number(trip.peso)-rounded)<0.0005 && (trip.pesoUnit||'t')===localUnit
          if(sameValue && mode==='auto') return
          put('trips', trip.id,{peso:rounded,pesoUnit:localUnit,updatedAt:new Date().toISOString()})
          logEvent('trip_weight_updated',{tripId:trip.id,peso:rounded,unit:localUnit},{targetId:trip.id})
          refresh()
        }
        const savePeso=el('button',{class:'btn brand',onclick:()=>{commitPeso('button')}},'Salva peso')
        const clearPeso=el('button',{class:'btn ghost',onclick:()=>{
          pesoInput.value=''
          localUnit='t'
          unitDropdown.setValue('t')
          commitPeso('button')
        }},'Rimuovi')
        pesoInput.addEventListener('blur',()=>commitPeso('auto'))
        pesoInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault(); commitPeso('button')}})
        const pesoSection=el('div',{class:'detail-grid'},
          el('strong',{},'Peso'),
          el('div',{class:'detail-inline'}, pesoInput, unitDropdown.root, savePeso, clearPeso)
        )
        const attachmentsWrap=el('div',{class:'attachments-list'})
        if((trip.attachments||[]).length){
          trip.attachments.forEach(att=>{
            attachmentsWrap.append(
              el('div',{class:'attachments-item'},
                el('div',{}, el('div',{}, att.titolo||att.tipo?.toUpperCase()||'Documento'), el('div',{class:'muted'}, att.file?.name||'')),
                el('div',{class:'row',style:'gap:6px'},
                  el('button',{class:'btn ghost',onclick:()=>downloadAttachment(att)},'Scarica'),
                  el('button',{class:'btn red',onclick:()=>removeAttachment(trip, att.id)},'Elimina')
                )
              )
            )
          })
        }else{
          attachmentsWrap.append(el('span',{class:'muted'},'Nessun documento allegato'))
        }
        const attachmentsSection=el('div',{},
          el('strong',{},'Documenti allegati'),
          attachmentsWrap,
          el('div',{class:'detail-actions'}, el('button',{class:'btn ghost',onclick:()=>addAttachment(trip)},'Aggiungi documento'))
        )
        const noteArea=el('textarea',{class:'input',rows:3,placeholder:'Note',value:trip.note||''})
        const noteSection=el('div',{class:'detail-note'},
          el('strong',{},'Note'),
          noteArea,
          el('div',{class:'detail-actions'}, el('button',{class:'btn brand',onclick:()=>{
            put('trips', trip.id,{note:noteArea.value,updatedAt:new Date().toISOString()})
            refresh()
          }},'Salva note'))
        )
        const statusDropdown=createDropdown({
          value:trip.stato||'Da fare',
          placeholder:'Aggiorna stato',
          options:[
            {value:'Da fare',label:'Da fare',color:statusColors['Da fare']},
            {value:'In corso',label:'In corso',color:statusColors['In corso']},
            {value:'Completato',label:'Completato',color:statusColors['Completato']}
          ],
          onSelect:(val)=>{
            if(!can('viaggi.manage')){uiShowInlineError(detailError,['Permesso negato.']); return}
            uiShowInlineError(detailError,[])
            const from=trip.stato||'Da fare'
            const to=val||'Da fare'
            put('trips', trip.id,{stato:to,updatedAt:new Date().toISOString()})
            logEvent('trip_status_changed',{tripId:trip.id,from,to},{actorId:me()?.id,targetId:trip.id})
            refresh()
          }
        })
        statusDropdown.root.style.minWidth='180px'
        const actionRow=el('div',{class:'detail-actions'}, statusDropdown.root, el('button',{class:'btn ghost',onclick:()=>openTripWizard(trip)},'Apri in modifica'))
        if(trip.draft){
          actionRow.append(el('button',{class:'btn green',onclick:()=>{
            put('trips', trip.id,{draft:false,updatedAt:new Date().toISOString()})
            refresh()
          }},'Segna come definitivo'))
        }
        const draftTag=trip.draft? el('div',{class:'detail-tag'},'Bozza salvata automaticamente'):null
        const blocks=[draftTag, columns, detailError, pesoSection, attachmentsSection, noteSection, actionRow].filter(Boolean)
        return el('div',{class:'trip-detail'}, ...blocks)
      }

      let closeMenu=null
      const header=el('thead',{}, el('tr',{},
        el('th',{class:'tight'},''),
        el('th',{},'Cliente'),
        el('th',{},'Società'),
        el('th',{},'Carico'),
        el('th',{},'Scarico'),
        el('th',{},'Autista e mezzi'),
        el('th',{},'Tariffa / Peso'),
        el('th',{},'Documento'),
        el('th',{},'Stato'),
        el('th',{},'Azioni')
      ))
      const body=el('tbody',{})
      if(!filtered.length){
        body.append(el('tr',{}, el('td',{colspan:'10',style:'text-align:center;padding:24px;color:var(--muted)'},'Nessun viaggio registrato.')))
      }else{
        filtered.forEach(trip=>{
          const isExpanded=expanded.has(trip.id)
          const clientLabel=(trip.cliente||'').trim() || (trip.draft?'Bozza':'—')
          const docLabel=`${trip.documento?.tipo||'-'} ${trip.documento?.numero||''}`.trim()||'-'
          const attachmentsCount=(trip.attachments||[]).length
          const driverLabel=driversCache.find(d=>d.id===trip.autista)?.name || trip.autista || '-'
          const camionLabel=fleetCache.find(f=>f.id===trip.camion)?.targa || trip.camion || '-'
          const rimorchioLabel=fleetCache.find(f=>f.id===trip.rimorchio)?.targa || trip.rimorchio || '-'
          const statusNodes=[]
          if(trip.draft) statusNodes.push(el('span',{class:'badge status-gray'},'Bozza'))
          statusNodes.push(statusBadge(trip.stato))
          if(trip.priorita && trip.priorita!=='Normale'){
            const cls=trip.priorita==='Alta'?'status-orange':'status-gray'
            statusNodes.push(el('span',{class:`badge ${cls}`}, trip.priorita))
          }
          const toggle=el('button',{class:`toggle-btn${isExpanded?' open':''}`,type:'button',title:isExpanded?'Nascondi dettaglio':'Mostra dettaglio',onclick:(e)=>{
            e.stopPropagation()
            if(isExpanded){expanded.delete(trip.id)} else {expanded.add(trip.id)}
            refresh()
          }}, isExpanded?'▾':'▸')
          const menuBtn=el('button',{class:'menu-btn',type:'button'},'⋯')
          const menuPanel=el('div',{class:'menu-panel'},
            el('button',{class:'btn ghost',onclick:()=>{closeMenu&&closeMenu(); openTripWizard(trip)}},'Modifica'),
            el('button',{class:'btn red',onclick:async()=>{
              closeMenu&&closeMenu()
              const ok=await askConfirm({
                title:'Elimina viaggio',
                message:`Vuoi eliminare il viaggio per ${trip.cliente||'cliente'}?`,
                confirmLabel:'Elimina',
                cancelLabel:'Annulla',
                tone:'danger'
              })
              if(ok){
                remove('trips', trip.id)
                refresh()
              }
            }},'Elimina')
          )
          const menuWrap=el('div',{class:'menu-wrapper'}, menuBtn, menuPanel)
          const openMenu=()=>{
            if(closeMenu) closeMenu()
            menuWrap.classList.add('open')
            const detach=attachClickOutside(menuWrap,()=>{
              menuWrap.classList.remove('open')
              closeMenu=null
            })
            closeMenu=()=>{
              detach()
              menuWrap.classList.remove('open')
              closeMenu=null
            }
          }
          menuBtn.onclick=(e)=>{
            e.stopPropagation()
            if(menuWrap.classList.contains('open')){
              closeMenu&&closeMenu()
            }else{
              openMenu()
            }
          }
          const caricoTop=trip.caricoAzienda||'Carico'
          const caricoSub=`${trip.origine||'-'} · ${fmtDate(trip.dataCarico)}`
          const scaricoTop=trip.scaricoAzienda||'Scarico'
          const scaricoSub=`${trip.arrivo||'-'} · ${fmtDate(trip.dataScarico)}`
          const tariffa=describeTariff(trip.tariffa)
          const peso=trip.peso!=null?formatWeight(trip.peso, trip.pesoUnit):'—'
          body.append(el('tr',{},
            el('td',{class:'tight'}, toggle),
            el('td',{}, el('div',{class:'cell-stack'},
              el('div',{class:'cell-main'}, clientLabel),
              trip.tipoTrasporto?el('div',{class:'cell-sub'}, trip.tipoTrasporto):null,
              trip.riferimento?el('div',{class:'cell-sub'}, `Rif. ${trip.riferimento}`):null
            )),
            el('td',{}, el('div',{class:'cell-stack'}, el('span',{class:'cell-label'},'Società esecutrice'), el('div',{class:'cell-main'}, trip.azienda||'-'))),
            el('td',{}, el('div',{class:'cell-stack'}, el('span',{class:'cell-label'},'Carico'), el('div',{class:'cell-main'}, caricoTop), el('div',{class:'cell-sub'}, caricoSub))),
            el('td',{}, el('div',{class:'cell-stack'}, el('span',{class:'cell-label'},'Scarico'), el('div',{class:'cell-main'}, scaricoTop), el('div',{class:'cell-sub'}, scaricoSub))),
            el('td',{}, el('div',{class:'cell-stack'}, el('span',{class:'cell-label'},'Autista'), el('div',{class:'cell-main'}, driverLabel), el('div',{class:'cell-sub'}, `${camionLabel}${trip.rimorchio?` · Rimorchio ${rimorchioLabel}`:''}`))),
            el('td',{}, el('div',{class:'cell-stack'}, el('div',{class:'cell-main'}, tariffa), el('div',{class:'cell-sub'}, `Peso ${peso}`))),
            el('td',{}, el('div',{class:'cell-stack'}, el('div',{class:'cell-main'}, docLabel), el('div',{class:'cell-sub'}, attachmentsCount?fmtCount(attachmentsCount,'documento','documenti'):'Nessun allegato'))),
            el('td',{}, el('div',{class:'cell-badge'}, ...statusNodes), el('div',{class:'cell-sub'}, fmtDateDisplay(trip.updatedAt||trip.createdAt||''))),
            el('td',{}, menuWrap)
          ))
          if(isExpanded){
            body.append(el('tr',{class:'detail-row'}, el('td',{colspan:'10'}, buildDetail(trip))))
          }
        })
      }
      table.replaceChildren(header, body)
    }

  refresh()
  return wrap
}

  const Paghe=()=>{
    const current=me()
    const wrap=el('div',{class:'ops-suite'})
    const statusValues=['Bozza','Confermato','Pagato']
    const parseMonthLabel=(value)=>{
      if(!value || !/^\d{4}-\d{2}$/.test(value)) return '-'
      const [year,month]=value.split('-').map(Number)
      return new Date(year,month-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'})
    }
    const getUsers=()=>{
      // Paghe operative: escludiamo l'amministratore perché non è un dipendente operativo.
      return (list('users')||[]).filter(user=>user.id!==ADMIN_ID && user.active!==false)
    }
    const getRows=()=> (list('payroll')||[]).slice().sort((a,b)=>{
      const am=(a.month||'').localeCompare(b.month||'')
      if(am!==0) return -am
      return new Date(b.updatedAt||b.createdAt||0)-new Date(a.updatedAt||a.createdAt||0)
    })
    const userLabel=(userId)=>{
      const user=(list('users')||[]).find(item=>item.id===userId)
      return user?.name || user?.username || user?.email || userId || '-'
    }

    const hero=el('div',{class:'ops-hero'},
      el('div',{class:'ops-hero-title'},'Paghe'),
      el('div',{class:'ops-hero-sub'},'Gestione paghe mensili con stato di avanzamento, tracciamento modifiche e visibilità per dipendente.')
    )
    const stats=el('div',{class:'kpi-grid'})
    const table=el('table',{class:'table'})
    const info=el('div',{class:'filters-count'})
    const feedback=el('div',{class:'ops-note'})
    const search=el('input',{class:'input',type:'search',placeholder:'Cerca per mese o dipendente'})
    search.addEventListener('input',refresh)

    const openPayrollModal=(record=null)=>{
      const editing=Boolean(record)
      let nettoValue=record?Number(record.netto||0):null
      let modal
      const month=el('input',{class:'input',type:'month',value:record?.month||toLocalISO(new Date()).slice(0,7)})
      const users=getUsers()
      const userSelect=el('select',{class:'input'})
      userSelect.append(el('option',{value:''},'Seleziona dipendente'))
      users.forEach(user=>userSelect.append(el('option',{value:user.id},user.name||user.username||user.email||user.id)))
      userSelect.value=record?.userId||''
      const nettoInput=createCurrencyInput(record?.netto!=null?Number(record.netto):null,{onChange:(value)=>{nettoValue=value}})
      nettoInput.input.classList.add('input')
      const error=el('div')
      uiShowInlineError(error,[])
      const cancelBtn=el('button',{class:'btn ghost',type:'button'},'Annulla')
      const saveBtn=el('button',{class:'btn brand',type:'button'},editing?'Salva':'Crea paga')

      const submit=()=>{
        const errors=[]
        const selectedMonth=(month.value||'').trim()
        const selectedUser=(userSelect.value||'').trim()
        if(!selectedMonth) errors.push('Seleziona il mese (YYYY-MM).')
        if(!selectedUser) errors.push('Seleziona un dipendente.')
        if(!(Number(nettoValue)>0)) errors.push('Inserisci un netto maggiore di zero.')
        if(errors.length){
          uiShowInlineError(error,errors)
          return
        }
        const stamp=new Date().toISOString()
        if(editing){
          put('payroll',record.id,{
            month:selectedMonth,
            userId:selectedUser,
            netto:Number(nettoValue),
            updatedAt:stamp
          })
          logEvent('payroll_updated',{month:selectedMonth,userId:selectedUser,userLabel:userLabel(selectedUser)},{actorId:current?.id,targetId:record.id})
          feedback.textContent='Paga aggiornata.'
        }else{
          const id=`PAY-${crypto.randomUUID()}`
          add('payroll',{
            id,
            month:selectedMonth,
            userId:selectedUser,
            netto:Number(nettoValue),
            status:'Bozza',
            visibility:'admin_only',
            createdAt:stamp,
            updatedAt:stamp
          })
          logEvent('payroll_created',{month:selectedMonth,userId:selectedUser,userLabel:userLabel(selectedUser)},{actorId:current?.id,targetId:id})
          feedback.textContent='Paga creata.'
        }
        uiModalClose(modal,true)
        refresh()
      }

      cancelBtn.onclick=()=>uiModalClose(modal,null)
      saveBtn.onclick=submit
      modal=uiModalOpen({
        title:editing?'Modifica paga':'Nuova paga',
        variant:'confirm',
        body:[field('Mese',month),field('Dipendente',userSelect),field('Netto',nettoInput.input),error],
        footer:el('div',{class:'modal-footer'},el('div',{}),el('div',{class:'row',style:'gap:8px'},cancelBtn,saveBtn))
      })
      modal.overlay.addEventListener('keydown',(event)=>{
        if(event.key==='Enter'){
          event.preventDefault()
          submit()
        }
      })
      modal.overlay.focus()
      month.focus()
    }

    const toolbar=el('div',{class:'ops-toolbar'},
      search,
      el('button',{class:'btn brand',type:'button',onclick:()=>openPayrollModal()},'Nuova paga'),
      info
    )

    const refresh=()=>{
      const rows=getRows().filter((row)=>{
        const query=(search.value||'').trim().toLowerCase()
        if(!query) return true
        const hay=[row.month,userLabel(row.userId),row.status,row.visibility].map(v=>(v||'').toString().toLowerCase())
        return hay.some(v=>v.includes(query))
      })
      const draft=rows.filter(row=>(row.status||'Bozza')==='Bozza').length
      const paid=rows.filter(row=>(row.status||'Bozza')==='Pagato').length
      const totalNet=rows.reduce((sum,row)=>sum+Number(row.netto||0),0)
      stats.replaceChildren(
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Paghe'),
          el('div',{class:'value'},rows.length.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},`Record filtrati`)
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Bozze'),
          el('div',{class:'value'},draft.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},'Da confermare')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Pagate'),
          el('div',{class:'value'},paid.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},fmtMoney(totalNet))
        )
      )
      info.textContent=rows.length?fmtCount(rows.length,'record','record'):'Nessuna paga'
      const bodyRows=rows.map((row)=>{
        const statusSelect=el('select',{class:'input payroll-status'})
        statusValues.forEach(status=>statusSelect.append(el('option',{value:status,selected:(row.status||'Bozza')===status},status)))
        statusSelect.addEventListener('change',()=>{
          const from=row.status||'Bozza'
          const to=statusSelect.value
          if(from===to) return
          put('payroll',row.id,{status:to,updatedAt:new Date().toISOString()})
          logEvent('payroll_status_changed',{month:row.month,userId:row.userId,userLabel:userLabel(row.userId),from,to},{actorId:current?.id,targetId:row.id})
          refresh()
        })
        const editBtn=el('button',{class:'btn ghost',type:'button',onclick:()=>openPayrollModal(row)},'Modifica')
        const delBtn=el('button',{class:'btn red',type:'button',onclick:async()=>{
          const ok=await askConfirm({
            title:'Elimina paga',
            message:`Vuoi eliminare la paga ${parseMonthLabel(row.month)} di ${userLabel(row.userId)}?`,
            confirmLabel:'Elimina',
            cancelLabel:'Annulla',
            tone:'danger'
          })
          if(!ok) return
          remove('payroll',row.id)
          logEvent('payroll_deleted',{month:row.month,userId:row.userId,userLabel:userLabel(row.userId)},{actorId:current?.id,targetId:row.id})
          refresh()
        }},'Elimina')

        return el('tr',{},
          el('td',{},parseMonthLabel(row.month)),
          el('td',{},userLabel(row.userId)),
          el('td',{},fmtMoney(row.netto||0)),
          el('td',{},statusSelect),
          el('td',{},row.visibility==='employee_visible'?'Visibile dipendente':'Solo admin'),
          el('td',{},fmtDateTime(row.updatedAt||row.createdAt||'')),
          el('td',{},el('div',{class:'row',style:'gap:8px'},editBtn,delBtn))
        )
      })
      if(!bodyRows.length){
        bodyRows.push(el('tr',{},el('td',{colspan:'7',style:'text-align:center;padding:24px;color:var(--muted)'},'Nessuna paga registrata.')))
      }
      table.replaceChildren(
        el('thead',{},el('tr',{},
          el('th',{},'Mese'),
          el('th',{},'Dipendente'),
          el('th',{},'Netto'),
          el('th',{},'Stato'),
          el('th',{},'Visibilità'),
          el('th',{},'Aggiornata'),
          el('th',{},'Azioni')
        )),
        el('tbody',{},...bodyRows)
      )
    }

    refresh()
    wrap.append(hero, stats, el('div',{class:'ops-panel'}, toolbar, feedback, el('div',{class:'table-card'},table)))
    return wrap
  }

  const Sicurezza=()=>{
    const current=me()
    if(!current){
      return el('div',{class:'card padded'}, el('div',{class:'muted'},'Sessione non valida. Effettua di nuovo il login.'))
    }
    return current.role==='admin'? SecurityAdmin(current): SecurityOperator(current)
  }

  const SecurityOperator=(current)=>{
    const wrap=el('div',{class:'security-wrap'})
    wrap.append(
      el('div',{style:'font-weight:700;font-size:18px'},'Sicurezza account personale'),
      el('div',{class:'muted'},'Puoi aggiornare la password di accesso e consultare gli ultimi accessi registrati dal sistema.')
    )
    const card=el('div',{class:'security-detail'})
    const info=el('div',{class:'summary-grid'},
      el('div',{class:'summary-row'}, el('span',{class:'muted'},'Nome'), el('span',{}, current.name||'—')),
      el('div',{class:'summary-row'}, el('span',{class:'muted'},'Nome utente'), el('span',{}, current.username||'—')),
      el('div',{class:'summary-row'}, el('span',{class:'muted'},'Genere'), el('span',{}, current.gender==='female'?'Operatrice':'Operatore')),
      el('div',{class:'summary-row'}, el('span',{class:'muted'},'Ruolo'), el('span',{}, ROLE_LABELS[current.role]||current.role))
    )
    card.append(el('div',{class:'security-section-title'},'Profilo'), info)

    const pass=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Nuova password (min 8 caratteri)'})
    const confirm=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Conferma password'})
    const feedback=el('div',{class:'login-feedback'})
    const submit=el('button',{class:'btn brand',type:'button'},'Aggiorna password')
    const actions=el('div',{class:'security-actions'}, submit)
    const form=el('div',{class:'security-form'},
      field('Nuova password', pass, 'Almeno 8 caratteri, evita parole di uso comune'),
      field('Conferma password', confirm),
      feedback,
      actions
    )

    const applyChange=()=>{
      feedback.className='login-feedback'
      feedback.textContent=''
      const p1=pass.value
      const p2=confirm.value
      if(!p1 || p1.length<8){
        feedback.classList.add('login-feedback','error')
        feedback.textContent='La password deve contenere almeno 8 caratteri'
        pass.focus()
        return
      }
      if(p1!==p2){
        feedback.classList.add('login-feedback','error')
        feedback.textContent='Le password non coincidono'
        confirm.focus()
        return
      }
      submit.disabled=true
      submit.textContent='Aggiornamento...'
      setTimeout(()=>{
        put('users', current.id,{pass:p1.trim(),forceChange:false})
        logEvent('user_password_change_self',{username:current.username||current.email||''},{actorId:current.id,targetId:current.id})
        const updated={...current,forceChange:false}
        sessionStorage.setItem(SESSION, JSON.stringify(updated))
        Object.assign(current, updated)
        submit.disabled=false
        submit.textContent='Aggiorna password'
        pass.value=''
        confirm.value=''
        feedback.classList.add('login-feedback','success')
        feedback.textContent='Password aggiornata con successo'
      },260)
    }

    submit.onclick=applyChange
    confirm.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault(); applyChange()}})

    card.append(el('div',{class:'security-section-title'},'Cambio password'), form)

    const logsBlock=el('div',{class:'security-logs'})
    logsBlock.append(el('div',{class:'security-section-title'},'Ultimi accessi registrati'))
    const loginLogs=listLogs().filter(l=>l.actorId===current.id && l.action==='login').slice(0,12)
    if(!loginLogs.length){

      table.append(el('thead',{}, el('tr',{}, el('th',{},'Data'), el('th',{},'Dettaglio'))))

      loginLogs.forEach(log=>{
        tbody.append(el('tr',{}, el('td',{}, fmtDateTime(log.ts)), el('td',{}, describeLogAction(log))))
      })
      table.append(tbody)
      logsBlock.append(table)
    }
    card.append(logsBlock)
    wrap.append(card)
    return wrap
  }

  const SecurityAdmin=(current)=>{

    const detailPane=el('div',{class:'security-detail'})
    grid.append(listPane, detailPane)
    wrap.append(grid)

    const generatePassword=()=>Math.random().toString(36).slice(-10)
    const hydrateUser=(u)=>{
      const role=ROLE_LABELS[u.role]?u.role:'operatore'
      const perms=Array.isArray(u.permissions)&&u.permissions.length?u.permissions:permissionsForRole(role)
      return {...u,role,permissions:perms,gender:u.gender==='female'?'female':'male'}
    }

    let users=[]
    const refreshUsers=()=>{
      users=list('users').map(hydrateUser).sort((a,b)=>{
        if(a.id===ADMIN_ID) return -1
        if(b.id===ADMIN_ID) return 1
        const aLabel=(a.name||a.username||'').toLowerCase()
        const bLabel=(b.name||b.username||'').toLowerCase()
        return aLabel.localeCompare(bLabel,'it',{sensitivity:'base'})
      })
    }
    refreshUsers()
    let selectedId=users.find(u=>u.id===ADMIN_ID)?.id || users[0]?.id || null

    const ensureSelection=()=>{
      if(selectedId && !users.some(u=>u.id===selectedId)){
        selectedId=users[0]?.id||null
      }
    }

    const renderUsers=()=>{
      refreshUsers()
      ensureSelection()
      listPane.replaceChildren(...users.map(u=>{
        const isProtected=u.id===ADMIN_ID
        const card=el('div',{class:`user-card${u.id===selectedId?' active':''}${isProtected?' protected':''}`})
        const header=el('div',{class:'user-header'},

            el('div',{class:'muted',style:'font-size:12px'}, u.username?`@${u.username}`:'—')

        meta.append(el('div',{}, 'Ultimo accesso: ', u.lastLogin?fmtDateTime(u.lastLogin):'—'))
        meta.append(el('div',{}, 'Stato: ', u.active===false?'Disabilitato':'Attivo'))
        if(isProtected) meta.append(el('div',{class:'muted'},'Account principale protetto'))
        card.append(header, meta)
        card.onclick=()=>{selectedId=u.id; renderUsers(); renderDetail()}
        return card
      }))
    }

    const renderDetail=()=>{

      ensureSelection()
      detailPane.replaceChildren()
      if(!selectedId){
        const title=el('div',{class:'security-section-title'},'Nuovo utente')
        const nameInput=el('input',{class:'input',placeholder:'Nome completo'})
        const usernameInput=el('input',{class:'input',placeholder:'Nome utente (senza spazi)'})

        genderSelect.append(
          el('option',{value:'male'},'Operatore (Lui)'),

      const handleSave=()=>{

        const role=roleSelect.value

        put('users', user.id, payload)
        logEvent('user_updated',{username:username,role,gender:payload.gender},{actorId:current.id,targetId:user.id})
        const isSelf=user.id===current.id
        if(isSelf){
          const sessionUser={...me(),...payload}

        feedback.classList.add('login-feedback','success')

        const ok=await askConfirm({

        selectedId=users.find(u=>u.id===ADMIN_ID)?.id || null
        renderUsers()

      const logs=listLogs().filter(l=>l.actorId===user.id || l.targetId===user.id).slice(0,120)
      const logsBlock=el('div',{class:'security-logs'})
      logsBlock.append(el('div',{class:'security-section-title'},'Registro attività utente'))
      const clearBtn=el('button',{class:'btn ghost',type:'button',disabled:!logs.length||locked},'Svuota registro')
      clearBtn.onclick=async()=>{

        const ok=await askConfirm({

        const tbody=el('tbody',{})
        logs.forEach(log=>{

          const actorLabel=actor?actor.name||actor.username||actor.email:'Sistema'
          const removeBtn=el('button',{class:'btn ghost',type:'button'},'Elimina')
          removeBtn.onclick=async()=>{

              message:'Vuoi eliminare questa voce dal registro?',
              confirmLabel:'Elimina',
              cancelLabel:'Annulla',
              tone:'danger'
            })
            if(!ok) return
            removeLogEntry(log.id)
            renderDetail()
          }
          tbody.append(el('tr',{},
            el('td',{}, fmtDateTime(log.ts)),
            el('td',{}, describeLogAction(log)),
            el('td',{}, actorLabel),
            el('td',{}, el('div',{class:'actions'}, removeBtn))
          ))
        })
        table.append(tbody)
        logsBlock.append(table)
      }

      detailPane.append(
        title,
        field('Nome completo', nameInput),
        field('Nome utente', usernameInput),
        field('Genere', genderSelect),
        field('Ruolo', roleSelect),
        field('Stato', activeToggle),
        field('Cambio password obbligato', forceToggle),
        passwordPreview,
        field('Password temporanea', el('div',{class:'row',style:'gap:10px;flex-wrap:wrap'}, resetInput, resetGenerate, resetApply)),
        field('Moduli abilitati', modulesWrap),
        lastAccess,
        feedback,
        el('div',{class:'security-actions'}, saveBtn, deleteBtn),
        logsBlock
      )
      if(locked){
        feedback.classList.add('login-feedback','success')
        feedback.textContent='Account amministratore protetto: modifiche limitate.'
      }
    }

    addBtn.onclick=()=>{
      selectedId=null
      renderUsers()
      renderDetail()
    }

    renderUsers()
    renderDetail()
    return wrap
  }

    ]

    const hero=el('div',{class:'ops-hero'},
      el('div',{class:'ops-hero-title'},'Report'),
      el('div',{class:'ops-hero-sub'},'Centro esportazioni del portale con dataset pronti per analisi amministrativa, controllo operativo e archivio documentale.')
    )
    const stats=el('div',{class:'kpi-grid'})
    const exportPanel=el('div',{class:'ops-panel'})
    const cardsWrap=el('div',{class:'ops-report-grid'})
    const previewPanel=el('div',{class:'ops-panel'})

    const datasetDropdown=createDropdown({
      value:state.dataset,
      placeholder:'Dataset',
      options:datasets.map(d=>({value:d.id,label:d.label,sub:d.subtitle})),
      onSelect:(val)=>{state.dataset=val||'trips'; render()}
    })
    const formatDropdown=createDropdown({
      value:'csv',
      placeholder:'Formato',
      options:[
        {value:'csv',label:'CSV (Excel compatibile)'},
        {value:'pdf',label:'PDF stampabile'}
      ],
      onSelect:(val)=>{state.format=val||'csv'}
    })
    const exportFeedback=el('div',{class:'ops-note'})

    const escapeHtml=(str)=> String(str||'').replace(/[&<>"']/g,(m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]))
    const valueToText=(value)=>{
      if(value==null) return ''
      if(typeof value==='number') return Number.isFinite(value)?String(value):''
      if(typeof value==='boolean') return value?'SI':'NO'
      if(Array.isArray(value)) return value.map(valueToText).join(' | ')
      if(typeof value==='object') return JSON.stringify(value)
      return String(value)
    }
    const flattenObject=(source,prefix='',target={})=>{
      Object.entries(source||{}).forEach(([key,value])=>{
        const path=prefix?`${prefix}.${key}`:key
        if(value && typeof value==='object' && !Array.isArray(value) && !(value instanceof Date)){
          flattenObject(value,path,target)
        }else{
          target[path]=valueToText(value)
        }
      })
      return target
    }
    const normalizeDate=(value)=>{
      if(!value) return null
      const date=new Date(String(value).includes('T')?value:`${value}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const latestDate=(rows)=>{
      const dates=rows.flatMap(row=>[
        normalizeDate(row.updatedAt),
        normalizeDate(row.createdAt),
        normalizeDate(row.ts),
        normalizeDate(row.data),
        normalizeDate(row.dueDate),
        normalizeDate(row.scadenza),
        normalizeDate(row.prossimaScadenza)
      ].filter(Boolean))
      if(!dates.length) return null
      return new Date(Math.max(...dates.map(d=>d.getTime())))
    }
    const prepareRows=(datasetId)=>{
      switch(datasetId){
        case 'trips':
          return (list('trips')||[]).map(trip=>({
            id:trip.id||'',
            cliente:trip.cliente||'',
            azienda:trip.azienda||'',
            origine:trip.origine||'',
            arrivo:trip.arrivo||'',
            stato:trip.stato||'',
            priorita:trip.priorita||'',
            dataCarico:trip.dataCarico||'',
            dataScarico:trip.dataScarico||'',
            autista:trip.autista||'',
            camion:trip.camion||'',
            rimorchio:trip.rimorchio||'',
            tariffaTipo:trip.tariffa?.tipo||'',
            tariffaValore:trip.tariffa?.tipo==='A viaggio'?trip.tariffa?.prezzo??'':trip.tariffa?.prezzoTonnellata??'',
            peso:trip.peso??'',
            pesoUnita:trip.pesoUnit||'',
            documentoTipo:trip.documento?.tipo||'',
            documentoNumero:trip.documento?.numero||'',
            allegati:(trip.attachments||[]).length,
            draft:trip.draft===true,
            updatedAt:trip.updatedAt||trip.createdAt||''
          }))
        case 'invoices':
          return (list('invoices')||[]).map(inv=>({
            id:inv.id||'',
            numero:inv.numero||'',
            tipo:inv.tipo||'',
            categoria:invoiceCategory(inv),
            controparte:invoiceCounterparty(inv),
            data:inv.data||inv.createdAt||inv.ts||'',
            scadenza:inv.dueDate||'',
            totale:inv.totale??0,
            pagata:inv.paid===true,
            metodoPagamento:inv.paymentMethod||'',
            note:inv.note||''
          }))
        case 'fleet':
          return (list('fleet')||[]).map(vehicle=>({
            id:vehicle.id||'',
            tipo:vehicle.tipo||'',
            modello:vehicle.modello||'',
            targa:vehicle.targa||'',
            acquisizione:vehicle.leasing?'Leasing':'Acquisto',
            canoneLeasing:vehicle.canoneLeasing??'',
            costoAcquisto:vehicle.costoAcquisto??'',
            carburanteMensile:vehicle.carburanteMensile??'',
            km:vehicle.km??'',
            assNome:vehicle.assNome||'',
            assScad:vehicle.assScad||'',
            revisioneScad:vehicle.revisioneScad||'',
            bolloScad:vehicle.bolloScad||'',
            assStradale:vehicle.assStradale||'',
            assStradaleScad:vehicle.assStradaleScad||'',
            tachoScad:vehicle.tachoScad||'',
            allegati:(vehicle.attachments||[]).length
          }))
        case 'drivers':
          return (list('drivers')||[]).map(driver=>{
            const payroll=driver.payroll||[]
            const saldo=payroll.reduce((sum,row)=>sum+Number(row.amount||0),0)
            return {
              id:driver.id||'',
              nome:driver.name||'',
              telefono:driver.phone||'',
              camionId:driver.camionId||'',
              rimorchioId:driver.rimorchioId||'',
              contratto:driver.contractType||'',
              retribuzione:driver.payType||'',
              patenteScad:driver.patenteScad||'',
              cqcScad:driver.cqcScad||'',
              medicoScad:driver.medicoScad||'',
              tachoScad:driver.tachoScad||'',
              allegati:(driver.attachments||[]).length,
              movimenti:payroll.length,
              saldoMovimenti:saldo
            }
          })
        case 'customers':
          return (list('customers')||[]).map(customer=>({
            id:customer.id||'',
            nome:customer.name||'',
            vatCf:customer.vat||'',
            telefono:customer.phone||'',
            email:customer.email||'',
            pec:customer.pec||'',
            sdi:customer.sdi||'',
            indirizzo:customer.address||'',
            citta:customer.city||'',
            provincia:customer.province||'',
            terminiPagamento:customer.paymentTerms||'',
            credito:customer.credito??0,
            debito:customer.debito??0,
            prossimaScadenza:customer.due||''
          }))
        case 'notifications':
          return buildNotifications(false).map(alert=>({
            tipologia:alert.type||'',
            severita:alert.severity||'',
            titolo:alert.title||'',
            dettaglio:alert.detail||'',
            quando:alert.when||'',
            giorniAllaScadenza:alert.diff??''
          }))
        default:
          return []
      }
    }
    const toFlatRows=(datasetId)=>prepareRows(datasetId).map(row=>flattenObject(row))
    const toCsv=(rows)=>{
      if(!rows.length) return ''
      const headers=Object.keys(rows[0])
      const escape=(value)=>`"${String(value??'').replace(/"/g,'""')}"`
      const lines=[headers.map(escape).join(',')]
      rows.forEach(row=>{
        lines.push(headers.map(key=>escape(row[key])).join(','))
      })
      return lines.join('\n')
    }
    const exportPdf=(rows,title)=>{
      if(!rows.length){
        exportFeedback.textContent='Nessun dato disponibile per il report selezionato.'
        return false
      }
      const headers=Object.keys(rows[0])
      const body=rows.map(r=>`<tr>${headers.map(h=>`<td>${escapeHtml(r[h])}</td>`).join('')}</tr>`).join('')
      const win=window.open('','_blank')
      if(!win){
        exportFeedback.textContent='Popup bloccato dal browser. Consenti i popup per stampare in PDF.'
        return false
      }
      win.document.write(`<!doctype html><html><head><meta charset="utf-8"/><title>${escapeHtml(title)}</title>
        <style>
          body{font-family:Arial,Helvetica,sans-serif;margin:24px;color:#111}
          h1{font-size:18px;margin:0 0 12px}
          table{border-collapse:collapse;width:100%;font-size:12px}
          th,td{border:1px solid #ccc;padding:6px 8px;text-align:left;vertical-align:top}
          th{background:#f4f4f4}
        </style></head><body>
        <h1>${escapeHtml(title)} · ${new Date().toLocaleDateString('it-IT')}</h1>
        <table><thead><tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>
      </body></html>`)
      win.document.close()
      win.focus()
      win.print()
      return true
    }
    const runExport=(datasetId,format)=>{
      const descriptor=datasets.find(d=>d.id===datasetId)
      const label=descriptor?.label||datasetId
      const rows=toFlatRows(datasetId)
      if(!rows.length){
        exportFeedback.textContent='Nessun dato disponibile per il dataset selezionato.'
        return
      }
      if(format==='pdf'){
        if(exportPdf(rows,`Report ${label}`)){
          exportFeedback.textContent=`Report PDF "${label}" inviato alla stampa.`
        }
        return
      }
      const csv=toCsv(rows)
      const stamp=new Date().toISOString().slice(0,10)
      blobDownload(new Blob([csv],{type:'text/csv;charset=utf-8;'}), `${datasetId}-${stamp}.csv`)
      exportFeedback.textContent=`Esportazione CSV completata per ${label}.`
    }

    const exportBtn=el('button',{class:'btn brand',type:'button',onclick:()=>runExport(state.dataset,state.format)},'Esporta dataset')

    const render=()=>{
      const perDataset=datasets.map(dataset=>{
        const prepared=prepareRows(dataset.id)
        const rows=prepared.map(row=>flattenObject(row))
        return {dataset,prepared,rows,count:rows.length,last:latestDate(prepared)}
      })
      const totalRecords=perDataset.reduce((sum,item)=>sum+item.count,0)
      const populated=perDataset.filter(item=>item.count>0).length
      const latest=perDataset.map(item=>item.last).filter(Boolean).sort((a,b)=>b-a)[0]||null
      const selected=perDataset.find(item=>item.dataset.id===state.dataset) || perDataset[0]
      if(selected && selected.dataset.id!==state.dataset){
        state.dataset=selected.dataset.id
        datasetDropdown.setValue(state.dataset)
      }

      stats.replaceChildren(
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Record disponibili'),
          el('div',{class:'value'}, totalRecords.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},'Somma di tutti i dataset esportabili')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Dataset popolati'),
          el('div',{class:'value'}, populated.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, `${populated}/${datasets.length} con almeno un record`)
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Dataset selezionato'),
          el('div',{class:'value'}, selected.dataset.label),
          el('div',{class:'muted',style:'font-size:12px'}, `${selected.count.toLocaleString('it-IT')} record`)
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Ultimo aggiornamento'),
          el('div',{class:'value'}, latest?latest.toLocaleDateString('it-IT'):'-'),
          el('div',{class:'muted',style:'font-size:12px'}, latest?latest.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'Nessun timestamp rilevato')
        )
      )

      cardsWrap.replaceChildren(
        ...perDataset.map(item=>el('div',{class:'ops-report-card'},
          el('div',{class:'title'}, item.dataset.label),
          el('div',{class:'meta'}, item.dataset.subtitle),
          el('div',{class:'ops-list-pills'},
            el('span',{class:'ops-pill neutral'}, `${item.count.toLocaleString('it-IT')} record`),
            item.last?el('span',{class:'ops-pill brand'}, `Agg. ${item.last.toLocaleDateString('it-IT')}`):el('span',{class:'ops-pill neutral'},'Nessun dato')
          ),
          el('div',{class:'ops-report-actions'},
            el('button',{class:'btn ghost',type:'button',onclick:()=>{state.dataset=item.dataset.id; datasetDropdown.setValue(item.dataset.id); render()}},'Anteprima'),
            el('button',{class:'btn brand',type:'button',onclick:()=>runExport(item.dataset.id,'csv')},'CSV'),
            el('button',{class:'btn ghost',type:'button',onclick:()=>runExport(item.dataset.id,'pdf')},'PDF')
          )
        ))
      )

      const selectedRows=selected.rows
      const sample=selectedRows.slice(0,8)
      previewPanel.replaceChildren(
        el('div',{class:'ops-panel-head'},
          el('div',{},
            el('div',{class:'ops-panel-title'},`Anteprima ${selected.dataset.label}`),
            el('div',{class:'ops-panel-sub'}, selected.count?`${selected.count.toLocaleString('it-IT')} record disponibili`:'Nessun record disponibile')
          ),
          el('span',{class:'badge'}, selectedRows.length?fmtCount(selectedRows.length,'riga','righe'):'Vuoto')
        ),
        sample.length
          ? el('div',{class:'ops-preview'},
            (()=> {
              const headers=Object.keys(sample[0])
              const table=el('table',{class:'ops-table-mini'})
              table.append(el('thead',{}, el('tr',{}, ...headers.map(h=>el('th',{},h)))))
              table.append(el('tbody',{},
                ...sample.map(row=>el('tr',{}, ...headers.map(h=>el('td',{}, row[h]||''))))
              ))
              return table
            })()
          )
          : el('div',{class:'ops-empty'},'Nessun record da visualizzare in anteprima.')
      )
    }

    exportPanel.append(
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Centro esportazione'),
          el('div',{class:'ops-panel-sub'},'Scegli dataset e formato, poi genera il report con un click')
        )
      ),
      el('div',{class:'ops-toolbar'}, datasetDropdown.root, formatDropdown.root, exportBtn),
      exportFeedback
    )

    render()
    wrap.append(hero, stats, exportPanel, cardsWrap, previewPanel)
    return wrap
  }

  // ====== ROUTER & GUARDS ======
  const mountAppShell=({user,onLogout,onRouteChange})=>{
    APP_STATE.shell?.cleanup?.()
    const shell=el('div',{class:`container app-shell${APP_STATE.ui.sidebarCollapsed?' sidebar-collapsed':''}`})
    const header=el('header',{class:'app card'})
    const menuBtn=el('button',{class:'mobile-menu-btn',type:'button','aria-label':'Apri menu'},'☰')
    const left=el('div',{class:'brand-badge row',style:'gap:10px;align-items:center'}, menuBtn, el('div',{class:'brand-logo'}, el('img',{src:LOGO_WHITE,alt:'Logo'})))
    const identity=user.name||user.username||user.email||'Utente'
    const roleLabel=ROLE_LABELS[user.role]||user.role
    const right=el('div',{class:'row'}, el('div',{class:'muted'}, `${identity} · ${roleLabel}`), el('button',{class:'btn ghost',onclick:onLogout},'Esci'))
    header.append(left,right)
    const nav=el('div',{class:'nav card padded'})
    const sidebarToggle=el('button',{class:'sidebar-toggle',type:'button','aria-label':'Comprimi sidebar'})
    const setSidebarCollapsed=(next)=>{
      APP_STATE.ui.sidebarCollapsed=next===true
      uiPreferencesSave({sidebarCollapsed:APP_STATE.ui.sidebarCollapsed})
      shell.classList.toggle('sidebar-collapsed',APP_STATE.ui.sidebarCollapsed)
      sidebarToggle.textContent=APP_STATE.ui.sidebarCollapsed?'→':'←'
      sidebarToggle.setAttribute('aria-label',APP_STATE.ui.sidebarCollapsed?'Espandi sidebar':'Comprimi sidebar')
    }
    setSidebarCollapsed(APP_STATE.ui.sidebarCollapsed)

    const drawerOverlay=el('div',{class:'drawer-overlay'})
    const sidebar=el('div',{class:'sidebar'},
      el('div',{class:'sidebar-head'}, sidebarToggle),
      nav
    )
    const sidebarFrame=el('div',{class:'sidebar-frame'}, sidebar)
    let drawerOpen=false
    const isMobile=()=>window.matchMedia('(max-width: 980px)').matches
    const setDrawer=(open)=>{
      drawerOpen=Boolean(open) && isMobile()
      shell.classList.toggle('drawer-open',drawerOpen)
      drawerOverlay.classList.toggle('open',drawerOpen)
      if(drawerOpen){
        setTimeout(()=>qs('.nav a',sidebar)?.focus(),0)
      }
    }
    menuBtn.onclick=()=>setDrawer(!drawerOpen)
    drawerOverlay.onclick=()=>setDrawer(false)
    sidebarToggle.onclick=()=>setSidebarCollapsed(!APP_STATE.ui.sidebarCollapsed)
    const onEsc=(event)=>{
      if(event.key==='Escape' && drawerOpen){
        event.preventDefault()
        setDrawer(false)
        menuBtn.focus()
      }
    }
    document.addEventListener('keydown',onEsc)

    const navItems=ROUTE_DEFS.filter(item=>!item.perm || hasPermission(user,item.perm))
    navItems.forEach(item=>{
      const link=el('a',{
        href:'#',
        id:`nav-${item.id}`,
        'data-tooltip':item.label,
        title:item.label,
        onclick:(e)=>{
          e.preventDefault()
          navigateTo(item.id)
          setActive(item.id)
          onRouteChange(item.id)
          if(isMobile()) setDrawer(false)
        }
      }, icon(item.icon), el('span',{class:'nav-link-label'},item.label))
      nav.append(link)
    })
    const main=el('div',{id:'main',class:'card padded fade-in'})
    const layout=el('div',{class:'layout layout-shell'}, sidebarFrame, main)
    shell.append(header, el('div',{class:'space'}), drawerOverlay, layout)
    APP_STATE.shell={cleanup:()=>document.removeEventListener('keydown',onEsc)}
    return shell
  }
  const componentFor=(id)=>{
    switch(id){
      case 'dashboard': return Dashboard()
      case 'viaggi': return Viaggi()
      case 'fatture': return Fatture()
      case 'flotta': return Flotta()
      case 'autisti': return Autisti()
      case 'clienti': return Clienti()
      case 'notifiche': return Notifiche()
      case 'paghe': return Paghe()
      case 'report': return Report()
      case 'file': return Files()
      case 'sicurezza': return Sicurezza()
      default: return el('div',{},'Pagina non trovata')
    }
  }
  const AccessDenied=(routeId='dashboard')=>el('div',{class:'guard-card'},
    el('div',{style:'font-weight:700;font-size:18px'},'Accesso negato'),
    el('div',{class:'muted'},`Non hai i permessi per accedere alla sezione "${routeId}".`),
    el('div',{class:'row'},
      el('button',{class:'btn brand',type:'button',onclick:()=>{navigateTo('dashboard'); renderApp()}},'Torna in Dashboard')
    )
  )

  // ====== INIT ======
  const app=document.getElementById('app')
  seedOnce()
  storageMigrate()
  enforceAdminGuard()
  function renderLogin(){
    document.title='Portale Operativo Trasporti'
    const shell=el('div',{class:'login-shell fade-in'})
    const panel=el('div',{class:'login-panel compact'})
    const adminRecord=list('users').find(u=>u.id===ADMIN_ID)
    const demoIdentity=adminRecord?.username||adminRecord?.email||'admin'

    const brand=el('div',{class:'login-brand'},
      el('div',{class:'brand-logo large'}, el('img',{src:LOGO_WHITE,alt:'Logo'}))
    )

    const form=el('div',{class:'login-form compact'})
    const headline=el('h2',{class:'login-headline'},'Accesso riservato')
    const sub=el('div',{class:'login-sub'},'Accedi con le tue credenziali aziendali')
    const userInput=el('input',{class:'input',type:'text',autocomplete:'username',placeholder:'Nome utente',value:demoIdentity})
    const passInput=el('input',{class:'input',type:'password',autocomplete:'current-password',placeholder:'Password'})
    const submit=el('button',{class:'login-btn',type:'button'},'Accedi')
    const msg=el('div',{class:'login-feedback'})
    const hint=el('div',{class:'login-hint muted'},`Accesso demo: ${demoIdentity} / admin`)

    const attempt=()=>{
      msg.className='login-feedback'
      msg.textContent=''
      const identity=userInput.value.trim()
      const password=passInput.value
      if(!identity){
        msg.classList.add('login-feedback','error')
        msg.textContent='Inserisci il nome utente assegnato'
        userInput.focus()
        return
      }
      if(!password){
        msg.classList.add('login-feedback','error')
        msg.textContent='Inserisci la password'
        passInput.focus()
        return
      }
      submit.disabled=true
      submit.textContent='Verifico credenziali...'
      setTimeout(()=>{
        const result=login(identity, password)
        if(!result.ok){
          submit.disabled=false
          submit.textContent='Accedi'
          msg.classList.add('login-feedback','error')
          msg.textContent=result.reason==='disabled'?'Account disabilitato dall’amministratore':'Credenziali non valide'
          passInput.value=''
          passInput.focus()
          return
        }
        submit.textContent='Accesso effettuato'
        const user=result.user||me()
        msg.classList.add('login-feedback','success')
        const greeting=user?.gender==='female'?'Benvenuta':'Benvenuto'
        msg.textContent=`${greeting} ${user?.name||user?.username||''}`
        setTimeout(()=>renderApp(), 420)
      },260)
    }

    submit.onclick=attempt
    userInput.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'){
        e.preventDefault()
        passInput.focus()
      }
    })
    passInput.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'){
        e.preventDefault()
        attempt()
      }
    })

    form.append(headline, sub, el('div',{class:'login-fields'}, userInput, passInput), submit, msg, hint)
    panel.append(brand, form)
    shell.append(panel)
    app.replaceChildren(shell)
  }
  function renderForceChange(user){
    document.title='Aggiorna Password'
    const shell=el('div',{class:'login-shell fade-in'})
    const panel=el('div',{class:'login-panel compact'})
    const brand=el('div',{class:'login-brand'},
      el('div',{class:'brand-logo large'}, el('img',{src:LOGO_WHITE,alt:'Logo'}))
    )
    const form=el('div',{class:'login-form compact'})
    const intro=el('div',{class:'muted'},'Per motivi di sicurezza è richiesta una password personale al primo accesso.')
    const pass=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Nuova password (min 8 caratteri)'})
    const confirm=el('input',{class:'input',type:'password',autocomplete:'new-password',placeholder:'Conferma password'})
    const msg=el('div',{class:'login-feedback'})
    const submit=el('button',{class:'login-btn',type:'button'},'Salva password')

    const complete=()=>{
      msg.className='login-feedback'
      msg.textContent=''
      const p1=pass.value
      const p2=confirm.value
      if(!p1 || p1.length<8){
        msg.classList.add('login-feedback','error')
        msg.textContent='La password deve contenere almeno 8 caratteri'
        pass.focus()
        return
      }
      if(p1!==p2){
        msg.classList.add('login-feedback','error')
        msg.textContent='Le password non coincidono'
        confirm.focus()
        return
      }
      submit.disabled=true
      submit.textContent='Aggiornamento...'
      setTimeout(()=>{
        put('users', user.id,{pass:p1.trim(),forceChange:false})
        logEvent('user_password_initialized',{username:user.username||user.email||''},{actorId:user.id,targetId:user.id})
        const updated={...user,forceChange:false}
        sessionStorage.setItem(SESSION, JSON.stringify(updated))
        msg.classList.add('login-feedback','success')
        const greeting=updated.gender==='female'?'Benvenuta':'Benvenuto'
        msg.textContent=`${greeting}! Accesso in corso...`
        setTimeout(()=>renderApp(), 420)
      },240)
    }

    submit.onclick=complete
    confirm.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault(); complete()}})

    form.append(intro, el('div',{class:'login-fields'}, pass, confirm), submit, msg)
    panel.append(brand, form)
    shell.append(panel)
    app.replaceChildren(shell)
  }
  function renderApp(){
    const user=me(); if(!user) return renderLogin()
    if(user.forceChange) return renderForceChange(user)
    const shell=mountAppShell({
      user,
      onLogout:()=>{logout(); renderLogin()},
      onRouteChange:(id)=>renderRoute(id)
    })
    app.replaceChildren(shell)
    const renderRoute=(targetRoute)=>{
      const requested=(targetRoute||'dashboard').toString().replace('#','').trim()||'dashboard'
      const guard=guardRoute(requested,user)
      const main=qs('#main')
      if(!main) return
      if(!guard.ok){
        if(guard.reason==='route_not_found'){
          navigateTo(guard.redirectTo||'dashboard')
          const fallback=componentFor(guard.redirectTo||'dashboard')
          main.replaceChildren(fallback)
          setActive(guard.redirectTo||'dashboard')
          APP_STATE.currentRoute=guard.redirectTo||'dashboard'
          return
        }
        main.replaceChildren(AccessDenied(requested))
        setActive('__denied__')
        APP_STATE.currentRoute=requested
        return
      }
      let component
      try{
        component=componentFor(requested)
      }catch{
        component=null
      }
      if(!component){
        navigateTo('dashboard')
        main.replaceChildren(componentFor('dashboard'))
        setActive('dashboard')
        APP_STATE.currentRoute='dashboard'
        return
      }
      navigateTo(requested)
      main.replaceChildren(component)
      setActive(requested)
      APP_STATE.currentRoute=requested
    }
    const hashHandler=()=>renderRoute((window.location.hash||'').replace('#','')||'dashboard')
    window.addEventListener('hashchange',hashHandler)
    const previousCleanup=APP_STATE.shell?.cleanup
    APP_STATE.shell={cleanup:()=>{previousCleanup?.(); window.removeEventListener('hashchange',hashHandler)}}
    hashHandler()
  }
  renderApp()
  </script>
