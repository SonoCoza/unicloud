      })
      selectedId=id
      addName.value=''
      addVat.value=''
      addPhone.value=''
      addEmail.value=''
      addPec.value=''
      addSdi.value=''
      addAddress.value=''
      addCity.value=''
      addProvince.value=''
      addTerms.value=''
      addFeedback.textContent='Cliente aggiunto in rubrica.'
      refresh()
    }},'Aggiungi cliente')

    const parseDate=(value)=>{
      if(!value) return null
      const date=new Date(value.includes('T')?value:`${value}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const normalize=(value)=>String(value||'').trim().toLowerCase()
    const matchCustomerInvoice=(inv, customer)=>{
      const invName=normalize(invoiceCounterparty(inv))
      const invVat=normalize(inv?.clientePI)
      const customerName=normalize(customer.name)
      const customerVat=normalize(customer.vat)
      if(customerVat && invVat && customerVat===invVat) return true
      if(customerName && invName && customerName===invName) return true
      return false
    }
    const dueBadge=(date)=>{
      if(!date) return {cls:'neutral',label:'Nessuna scadenza'}
      const today=new Date()
      today.setHours(0,0,0,0)
      const diff=Math.round((date-today)/(1000*60*60*24))
      if(diff<0) return {cls:'danger',label:`Scaduta da ${Math.abs(diff)}g`}
      if(diff<=10) return {cls:'warn',label:diff===0?'Scade oggi':`Scade tra ${diff}g`}
      return {cls:'good',label:`Scade tra ${diff}g`}
    }

    const rowsCache={signature:'',rows:[]}
    const buildRows=()=>{
      const customers=(list('customers')||[]).slice()
      const invoices=list('invoices')||[]
      const trips=list('trips')||[]
      const signature=[
        customers.map(c=>[c.id,c.name,c.vat,c.phone,c.email,c.pec,c.city,c.province,c.paymentTerms,c.due].join('~')).join('|'),
        invoices.map(inv=>[inv.id,inv.paid,inv.totale,inv.dueDate,inv.clientePI,inv.clienteCF,inv.clienteDen].join('~')).join('|'),
        trips.map(trip=>[trip.id,trip.cliente,trip.dataCarico,trip.dataScarico,trip.stato].join('~')).join('|')
      ].join('||')
      if(rowsCache.signature===signature) return rowsCache.rows

      const rows=customers.map(customer=>{
        const relatedTrips=trips.filter(t=>normalize(t.cliente)===normalize(customer.name))
        const relatedInvoices=invoices.filter(inv=>invoiceCategory(inv)==='vendita' && matchCustomerInvoice(inv,customer))
        const openInvoices=relatedInvoices.filter(inv=>!inv.paid)
        const paidInvoices=relatedInvoices.filter(inv=>inv.paid)
        const openTotal=openInvoices.reduce((sum,inv)=>sum+Number(inv.totale||0),0)
        const paidTotal=paidInvoices.reduce((sum,inv)=>sum+Number(inv.totale||0),0)
        const nextDue=openInvoices
          .map(inv=>parseDate(inv.dueDate))
          .filter(Boolean)
          .sort((a,b)=>a-b)[0]||null
        const lastTripDate=relatedTrips
          .map(t=>parseDate(t.dataScarico||t.dataCarico))
          .filter(Boolean)
          .sort((a,b)=>b-a)[0]||null
        return {customer,relatedTrips,relatedInvoices,openInvoices,paidInvoices,openTotal,paidTotal,nextDue,lastTripDate}
      })
      rowsCache.signature=signature
      rowsCache.rows=rows
      return rows
    }

    const renderDetail=(entry)=>{
      rightPanel.replaceChildren()
      if(!entry){
        rightPanel.append(
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Dettaglio cliente'),
              el('div',{class:'ops-panel-sub'},'Seleziona un cliente dalla lista per gestire i suoi dati')
            )
          ),
          el('div',{class:'ops-empty'},'Nessun cliente selezionato.')
        )
        return
      }

      const customer=entry.customer
      const due=dueBadge(entry.nextDue)
      let formState={
        name:customer.name||'',
        vat:customer.vat||'',
        phone:customer.phone||'',
        email:customer.email||'',
        pec:customer.pec||'',
        sdi:customer.sdi||'',
        address:customer.address||'',
        city:customer.city||'',
        province:customer.province||'',
        paymentTerms:customer.paymentTerms||''
      }
      const feedback=el('div',{class:'ops-note'})
      const save=()=>{
        if(!formState.name.trim()){
          feedback.textContent='La denominazione e obbligatoria.'
          return
        }
        put('customers', customer.id,{
          name:formState.name.trim(),
          vat:formState.vat.trim(),
          phone:formState.phone.trim(),
          email:formState.email.trim(),
          pec:formState.pec.trim(),
          sdi:formState.sdi.trim(),
          address:formState.address.trim(),
          city:formState.city.trim(),
          province:formState.province.trim(),
          paymentTerms:formState.paymentTerms.trim()
        })
        feedback.textContent='Anagrafica cliente aggiornata.'
        refresh()
      }
      const removeCustomer=async()=>{
        const ok=await askConfirm({
          title:'Elimina cliente',
          message:`Vuoi eliminare ${customer.name||'questo cliente'} dalla rubrica?`,
          confirmLabel:'Elimina',
          cancelLabel:'Annulla',
          tone:'danger'
        })
        if(!ok) return
        remove('customers', customer.id)
        selectedId=null
        refresh()
      }
      const makeInput=(label,key,placeholder='')=>{
        const input=el('input',{class:'input',value:formState[key]||'',placeholder})
        input.addEventListener('input',()=>{formState[key]=input.value})
        return field(label,input)
      }

      const tripsPreview=entry.relatedTrips.slice(0,5)
      const invoicesPreview=entry.relatedInvoices.slice(0,5)

      rightPanel.append(
        el('div',{class:'ops-panel-head'},
          el('div',{},
            el('div',{class:'ops-panel-title'}, customer.name||'Dettaglio cliente'),
            el('div',{class:'ops-panel-sub'}, `ID ${customer.id}`)
          ),
          el('div',{class:'ops-list-pills'},
            el('span',{class:`ops-pill ${due.cls}`}, due.label),
            el('span',{class:'ops-pill neutral'}, `Viaggi ${entry.relatedTrips.length.toLocaleString('it-IT')}`),
            el('span',{class:'ops-pill brand'}, `Fatture aperte ${entry.openInvoices.length.toLocaleString('it-IT')}`)
          )
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-fields'},
            makeInput('Denominazione','name'),
            makeInput('P. IVA / CF','vat'),
            makeInput('Telefono','phone'),
            makeInput('Email','email'),
            makeInput('PEC','pec'),
            makeInput('Codice SDI','sdi'),
            makeInput('Indirizzo','address'),
            makeInput('Citta','city'),
            makeInput('Provincia','province'),
            makeInput('Termini pagamento','paymentTerms')
          ),
          el('div',{class:'ops-inline-actions'},
            el('button',{class:'btn brand',type:'button',onclick:save},'Salva modifiche'),
            el('button',{class:'btn red',type:'button',onclick:removeCustomer},'Elimina cliente')
          ),
          feedback
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Sintesi commerciale'),
              el('div',{class:'ops-panel-sub'},'Andamento documentale del cliente')
            )
          ),
          el('div',{class:'ops-metrics'},
            el('span',{},'Aperto ', el('span',{class:'ops-metric-strong'},fmtMoney(entry.openTotal))),
            el('span',{},'Incassato ', el('span',{class:'ops-metric-strong'},fmtMoney(entry.paidTotal))),
            el('span',{},'Ultimo viaggio ', el('span',{class:'ops-metric-strong'},entry.lastTripDate?entry.lastTripDate.toLocaleDateString('it-IT'):'-'))
          )
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-title'},'Ultimi viaggi'),
          tripsPreview.length
            ? el('div',{class:'ops-doc-list'},
              ...tripsPreview.map(trip=>el('div',{class:'ops-doc-item'},
                el('div',{class:'ops-doc-main'},
                  el('strong',{}, `${trip.origine||'-'} -> ${trip.arrivo||'-'}`),
                  el('span',{}, `${trip.stato||'Da fare'} · ${fmtDateDisplay(trip.dataCarico||trip.dataScarico||'')}`)
                ),
                el('span',{class:'ops-pill neutral'}, trip.azienda||'-')
              ))
            )
            : el('div',{class:'ops-empty'},'Nessun viaggio collegato.'),
          el('div',{class:'ops-panel-title'},'Ultime fatture'),
          invoicesPreview.length
            ? el('div',{class:'ops-doc-list'},
              ...invoicesPreview.map(inv=>el('div',{class:'ops-doc-item'},
                el('div',{class:'ops-doc-main'},
                  el('strong',{}, inv.numero||'Documento'),
                  el('span',{}, `${inv.paid?'Saldata':'Aperta'} · ${fmtDateDisplay(inv.data||inv.createdAt||inv.ts||'')}`)
                ),
                el('span',{class:`ops-pill ${inv.paid?'good':'brand'}`}, fmtMoney(inv.totale||0))
              ))
            )
            : el('div',{class:'ops-empty'},'Nessuna fattura collegata.')
        )
      )
    }

    const refresh=()=>{
      const rows=buildRows()
      const invoices=list('invoices')||[]
      const credito=invoices.filter(inv=>invoiceCategory(inv)==='vendita' && !inv.paid).reduce((sum,inv)=>sum+Number(inv.totale||0),0)
      const debito=invoices.filter(inv=>invoiceCategory(inv)==='acquisto' && !inv.paid).reduce((sum,inv)=>sum+Number(inv.totale||0),0)
      const withOpen=rows.filter(r=>r.openInvoices.length>0).length
      stats.replaceChildren(
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Clienti'),
          el('div',{class:'value'}, rows.length.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, withOpen?`${withOpen.toLocaleString('it-IT')} con esposizione aperta`:'Nessuna esposizione aperta')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Crediti aperti'),
          el('div',{class:'value'}, fmtMoney(credito)),
          el('div',{class:'muted',style:'font-size:12px'},'Fatture vendita non saldate')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Debiti aperti'),
          el('div',{class:'value'}, fmtMoney(debito)),
          el('div',{class:'muted',style:'font-size:12px'},'Fatture acquisto non pagate')
        )
      )

      const today=new Date()
      today.setHours(0,0,0,0)
      const dueLimit=new Date(today.getTime()+10*24*60*60*1000)
      const dueRows=rows.filter(entry=>entry.nextDue && entry.nextDue<=dueLimit)
      tabs.replaceChildren(
        el('button',{class:`tab-pill ${state.tab==='all'?'active':''}`,type:'button',onclick:()=>{state.tab='all'; refresh()}},`Tutti (${rows.length.toLocaleString('it-IT')})`),
        el('button',{class:`tab-pill ${state.tab==='due'?'active':''}`,type:'button',onclick:()=>{state.tab='due'; refresh()}},`Scaduti/In scadenza (${dueRows.length.toLocaleString('it-IT')})`)
      )

      let filtered=rows.filter(entry=>{
        const c=entry.customer
        if(state.search){
          const hay=[c.name,c.vat,c.phone,c.email,c.pec,c.sdi,c.address,c.city,c.province,c.paymentTerms]
          const matched=hay.some(value=>normalize(value).includes(state.search))
          if(!matched) return false
        }
        return true
      })
      if(state.tab==='due'){
        filtered=filtered.filter(entry=>entry.nextDue && entry.nextDue<=dueLimit)
      }

      filtered.sort((a,b)=>{
        if(state.tab==='due'){
          const da=a.nextDue?a.nextDue.getTime():Number.POSITIVE_INFINITY
          const db=b.nextDue?b.nextDue.getTime():Number.POSITIVE_INFINITY
          return da-db
        }
        if(state.sort==='credit') return b.openTotal-a.openTotal
        if(state.sort==='trips') return b.relatedTrips.length-a.relatedTrips.length
        if(state.sort==='due'){
          const da=a.nextDue?a.nextDue.getTime():Number.POSITIVE_INFINITY
          const db=b.nextDue?b.nextDue.getTime():Number.POSITIVE_INFINITY
          return da-db
        }
        return normalize(a.customer.name).localeCompare(normalize(b.customer.name),'it',{sensitivity:'base'})
      })

      if(selectedId && !rows.some(r=>r.customer.id===selectedId)) selectedId=null
      if(filtered.length && (!selectedId || !filtered.some(r=>r.customer.id===selectedId))) selectedId=filtered[0].customer.id
      if(!selectedId) selectedId=rows[0]?.customer?.id || null
      const selected=rows.find(r=>r.customer.id===selectedId) || null

      listInfo.textContent=filtered.length?fmtCount(filtered.length,'cliente','clienti'):'Nessun cliente'
      listWrap.replaceChildren()
      if(!filtered.length){
        listWrap.append(el('div',{class:'ops-empty'},'Nessun cliente corrisponde ai filtri applicati.'))
      }else{
        filtered.forEach(entry=>{
          const customer=entry.customer
          const due=dueBadge(entry.nextDue)
          const active=selectedId===customer.id
          const card=el('div',{class:`ops-list-item${active?' active':''}`,onclick:()=>{selectedId=customer.id; refresh()}},
            el('div',{class:'ops-list-head'},
              el('div',{},
                el('div',{class:'ops-list-title'}, customer.name||'Cliente senza nome'),
                el('div',{class:'ops-list-sub'}, customer.vat||'P.IVA non indicata')
              ),
              el('span',{class:`ops-pill ${due.cls}`}, due.label)
            ),
            el('div',{class:'ops-list-pills'},
              customer.paymentTerms?el('span',{class:'ops-pill neutral'}, customer.paymentTerms):null,
              customer.city?el('span',{class:'ops-pill neutral'}, customer.city):null
            ),
            el('div',{class:'ops-metrics'},
              el('span',{},`Viaggi ${entry.relatedTrips.length.toLocaleString('it-IT')}`),
              el('span',{},`Aperto ${fmtMoney(entry.openTotal)}`),
              el('span',{},`Fatture ${entry.relatedInvoices.length.toLocaleString('it-IT')}`)
            )
          )
          listWrap.append(card)
        })
      }
      renderDetail(selected)
    }

    leftPanel.append(
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Rubrica clienti'),
          el('div',{class:'ops-panel-sub'},'Seleziona un cliente per modificare dati e monitorare l esposizione')
        ),
        listInfo
      ),
      el('div',{class:'ops-toolbar'}, search, sortDropdown.root),
      tabs,
      listWrap,
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Nuovo cliente'),
          el('div',{class:'ops-panel-sub'},'Inserimento rapido in anagrafica')
        )
      ),
      el('div',{class:'ops-fields'},
        addName, addVat, addPhone, addEmail, addPec, addSdi, addAddress, addCity, addProvince, addTerms
      ),
      el('div',{class:'ops-inline-actions'}, addBtn),
      addFeedback
    )

    refresh()
    wrap.append(hero, stats, grid)
    return wrap
  }

  // Autisti: fascicoli, allegati, salari/trasferte
  const Autisti=()=>{
    const wrap=el('div',{class:'ops-suite'})
    const state={search:''}
    let selectedId=null

    const hero=el('div',{class:'ops-hero'},
      el('div',{class:'ops-hero-title'},'Autisti'),
      el('div',{class:'ops-hero-sub'},'Fascicolo digitale autisti con assegnazioni mezzo, calendario scadenze documentali, archivio allegati e movimenti economici.')
    )
    const stats=el('div',{class:'kpi-grid'})
    const leftPanel=el('div',{class:'ops-panel'})
    const rightPanel=el('div',{class:'ops-panel'})
    const grid=el('div',{class:'ops-main-grid'}, leftPanel, rightPanel)

    const search=el('input',{
      class:'input',
      type:'search',
      placeholder:'Cerca autista per nome o telefono',
      oninput:(e)=>{state.search=(e.target.value||'').trim().toLowerCase(); refresh()}
    })
    const listInfo=el('div',{class:'filters-count'})
    const listWrap=el('div',{class:'ops-list'})

    const addName=el('input',{class:'input',placeholder:'Nome e cognome'})
    const addPhone=el('input',{class:'input',placeholder:'Telefono'})
    const addFeedback=el('div',{class:'ops-note'})
    const addBtn=el('button',{class:'btn brand',type:'button',onclick:()=>{
      const name=(addName.value||'').trim()
      if(!name){
        addFeedback.textContent='Inserisci il nome dell autista.'
        addName.focus()
        return
      }
      const id=crypto.randomUUID()
      add('drivers',{
        id,
        name,
        phone:(addPhone.value||'').trim(),
        camionId:'',
        rimorchioId:'',
        contractType:'',
        payType:'stipendio',
        patenteScad:'',
        cqcScad:'',
        medicoScad:'',
        tachoScad:'',
        attachments:[],
        payroll:[]
      })
      selectedId=id
      addName.value=''
      addPhone.value=''
      addFeedback.textContent='Autista aggiunto.'
      refresh()
    }},'Aggiungi autista')

    const parseDate=(value)=>{
      if(!value) return null
      const date=new Date(value.includes('T')?value:`${value}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const summarizeDocs=(driver)=>{
      const today=new Date()
      today.setHours(0,0,0,0)
      const docs=[driver.patenteScad,driver.cqcScad,driver.medicoScad,driver.tachoScad]
        .map(parseDate)
        .filter(Boolean)
      let expired=0
      let soon=0
      docs.forEach(date=>{
        const diff=Math.round((date-today)/(1000*60*60*24))
        if(diff<0) expired++
        else if(diff<=30) soon++
      })
      return {expired,soon}
    }
    const payLabel=(driver)=>{
      if(driver.payType==='a_viaggio') return 'Compenso a viaggio'
      if(driver.payType==='misto') return 'Misto'
      return 'Stipendio + trasferte'
    }
    const downloadAttachment=(att)=>{
      const bin=atob(att.data)
      const arr=new Uint8Array(bin.length)
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i)
      const blob=new Blob([arr],{type:att.type||'application/octet-stream'})
      blobDownload(blob, att.name||'documento')
    }

    const buildRows=()=>{
      return (list('drivers')||[]).map(driver=>{
        const docs=summarizeDocs(driver)
        const attachments=driver.attachments||[]
        const payroll=driver.payroll||[]
        const saldo=payroll.reduce((sum,row)=>sum+Number(row.amount||0),0)
        return {driver,docs,attachments,payroll,saldo}
      })
    }

    const renderDetail=(entry)=>{
      rightPanel.replaceChildren()
      if(!entry){
        rightPanel.append(
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Fascicolo autista'),
              el('div',{class:'ops-panel-sub'},'Seleziona un autista per aprire il dettaglio operativo')
            )
          ),
          el('div',{class:'ops-empty'},'Nessun autista selezionato.')
        )
        return
      }

      const driver=entry.driver
      const fleet=list('fleet')||[]
      const trucks=fleet.filter(f=>f.tipo==='Camion').map(f=>({value:f.id,label:f.targa||f.modello||f.id,sub:f.modello?`Modello ${f.modello}`:''}))
      const trailers=fleet.filter(f=>f.tipo==='Rimorchio').map(f=>({value:f.id,label:f.targa||f.modello||f.id,sub:f.modello?`Modello ${f.modello}`:''}))
      let contractValue=driver.contractType||''
      let payValue=driver.payType||'stipendio'
      let truckValue=driver.camionId||''
      let trailerValue=driver.rimorchioId||''
      let patenteValue=driver.patenteScad||''
      let cqcValue=driver.cqcScad||''
      let medicalValue=driver.medicoScad||''
      let tachoValue=driver.tachoScad||''

      const nameInput=el('input',{class:'input',value:driver.name||'',placeholder:'Nome e cognome'})
      const phoneInput=el('input',{class:'input',value:driver.phone||'',placeholder:'Telefono'})
      const contractDropdown=createDropdown({
        value:contractValue,
        placeholder:'Contratto',
        allowEmpty:true,
        options:[
          {value:'Indeterminato',label:'Tempo indeterminato'},
          {value:'Determinato',label:'Tempo determinato'},
          {value:'Autonomo',label:'Autonomo'},
          {value:'Interinale',label:'Interinale'}
        ],
        onSelect:(val)=>{contractValue=val||''}
      })
      const payDropdown=createDropdown({
        value:payValue,
        placeholder:'Retribuzione',
        options:[
          {value:'stipendio',label:'Stipendio + trasferte'},
          {value:'a_viaggio',label:'Compenso a viaggio'},
          {value:'misto',label:'Misto'}
        ],
        onSelect:(val)=>{payValue=val||'stipendio'}
      })
      const truckDropdown=createDropdown({
        value:truckValue,
        placeholder:'Camion assegnato',
        allowEmpty:true,
        options:trucks,
        onSelect:(val)=>{truckValue=val||''}
      })
      const trailerDropdown=createDropdown({
        value:trailerValue,
        placeholder:'Rimorchio assegnato',
        allowEmpty:true,
        options:trailers,
        onSelect:(val)=>{trailerValue=val||''}
      })
      const patentePicker=createDateField({value:patenteValue,placeholder:'Scadenza patente',onChange:(val)=>{patenteValue=val||''}})
      const cqcPicker=createDateField({value:cqcValue,placeholder:'Scadenza CQC',onChange:(val)=>{cqcValue=val||''}})
      const medicalPicker=createDateField({value:medicalValue,placeholder:'Visita medica',onChange:(val)=>{medicalValue=val||''}})
      const tachoPicker=createDateField({value:tachoValue,placeholder:'Tessera tachigrafo',onChange:(val)=>{tachoValue=val||''}})

      const feedback=el('div',{class:'ops-note'})
      const saveProfile=()=>{
        const nextName=(nameInput.value||'').trim()
        if(!nextName){
          feedback.textContent='Il nome autista e obbligatorio.'
          return
        }
        put('drivers',driver.id,{
          name:nextName,
          phone:(phoneInput.value||'').trim(),
          contractType:contractValue,
          payType:payValue,
          camionId:truckValue,
          rimorchioId:trailerValue,
          patenteScad:patenteValue,
          cqcScad:cqcValue,
          medicoScad:medicalValue,
          tachoScad:tachoValue
        })
        feedback.textContent='Profilo autista aggiornato.'
        refresh()
      }
      const deleteDriver=async()=>{
        const ok=await askConfirm({
          title:'Elimina autista',
          message:`Vuoi eliminare ${driver.name||'questo autista'}?`,
          confirmLabel:'Elimina',
          cancelLabel:'Annulla',
          tone:'danger'
        })
        if(!ok) return
        remove('drivers',driver.id)
        selectedId=null
        refresh()
      }

      const attachmentsList=el('div',{class:'ops-doc-list'})
      const renderAttachments=()=>{
        attachmentsList.replaceChildren()
        const attachments=driver.attachments||[]
        if(!attachments.length){
          attachmentsList.append(el('div',{class:'ops-empty'},'Nessun documento caricato.'))
          return
        }
        attachments.forEach(att=>{
          attachmentsList.append(el('div',{class:'ops-doc-item'},
            el('div',{class:'ops-doc-main'},
              el('strong',{}, att.name||'Documento'),
              el('span',{}, `${att.size?`${Math.round(att.size/1024)} KB`:'-'} · ${fmtDateDisplay(att.ts||'')}`)
            ),
            el('div',{class:'ops-inline-actions'},
              el('button',{class:'btn ghost',type:'button',onclick:()=>downloadAttachment(att)},'Scarica'),
              el('button',{class:'btn red',type:'button',onclick:()=>{
                const next=(driver.attachments||[]).filter(x=>x.id!==att.id)
                put('drivers',driver.id,{attachments:next})
                refresh()
              }},'Elimina')
            )
          ))
        })
      }

      const filePicker=el('input',{type:'file',multiple:true})
      const uploadBtn=el('button',{class:'btn ghost',type:'button',onclick:async()=>{
        if(!filePicker.files?.length) return
        const next=[...(driver.attachments||[])]
        for(const file of filePicker.files){
          const data=await fileToBase64(file)
          next.push({id:crypto.randomUUID(),name:file.name,size:file.size,type:file.type,data,ts:new Date().toISOString()})
        }
        put('drivers',driver.id,{attachments:next})
        filePicker.value=''
        refresh()
      }},'Carica documenti')
      const fileLabel=el('label',{class:'file'}, el('span',{class:'tag'},'Scegli file'), filePicker)

      let movementType='credito'
      let movementAmount=null
      const movementTypeDropdown=createDropdown({
        value:'credito',
        placeholder:'Tipologia movimento',
        options:[
          {value:'credito',label:'Stipendio / rimborso (+)'},
          {value:'anticipo',label:'Anticipo / trattenuta (-)'}
        ],
        onSelect:(val)=>{movementType=val||'credito'}
      })
      const movementAmountInput=createCurrencyInput(null,{onChange:(val)=>{movementAmount=val}})
      const movementNote=el('input',{class:'input',placeholder:'Nota (mese, trasferta, anticipo...)'})
      const movementFeedback=el('div',{class:'ops-note'})
      const addMovement=()=>{
        const amount=Number(movementAmount||0)
        if(!amount){
          movementFeedback.textContent='Inserisci un importo valido.'
          return
        }
        const signed=movementType==='anticipo'?-Math.abs(amount):Math.abs(amount)
        const next=[...(driver.payroll||[])]
        next.push({
          id:crypto.randomUUID(),
          amount:signed,
          note:(movementNote.value||'').trim(),
          ts:new Date().toISOString()
        })
        put('drivers',driver.id,{payroll:next})
        movementNote.value=''
        movementAmountInput.setValue(null)
        movementFeedback.textContent='Movimento registrato.'
        refresh()
      }

      const payrollList=el('div',{class:'ops-movement-list'})
      const renderPayroll=()=>{
        payrollList.replaceChildren()
        const rows=(driver.payroll||[]).slice().sort((a,b)=>new Date(b.ts)-new Date(a.ts))
        if(!rows.length){
          payrollList.append(el('div',{class:'ops-empty'},'Nessun movimento registrato.'))
          return
        }
        rows.forEach(row=>{
          payrollList.append(el('div',{class:'ops-movement-item'},
            el('div',{class:'ops-movement-main'},
              el('strong',{}, row.note||'Movimento'),
              el('span',{}, fmtDateTime(row.ts||''))
            ),
            el('div',{class:'ops-inline-actions'},
              el('span',{class:`ops-pill ${Number(row.amount||0)>=0?'good':'danger'}`}, fmtMoney(row.amount||0)),
              el('button',{class:'btn red',type:'button',onclick:()=>{
                const next=(driver.payroll||[]).filter(x=>x.id!==row.id)
                put('drivers',driver.id,{payroll:next})
                refresh()
              }},'Elimina')
            )
          ))
        })
      }

      renderAttachments()
      renderPayroll()

      rightPanel.append(
        el('div',{class:'ops-panel-head'},
          el('div',{},
            el('div',{class:'ops-panel-title'}, driver.name||'Fascicolo autista'),
            el('div',{class:'ops-panel-sub'}, `ID ${driver.id}`)
          ),
          el('div',{class:'ops-list-pills'},
            entry.docs.expired?el('span',{class:'ops-pill danger'}, `${entry.docs.expired} scadute`):null,
            entry.docs.soon?el('span',{class:'ops-pill warn'}, `${entry.docs.soon} in scadenza`):null,
            el('span',{class:'ops-pill neutral'}, payLabel(driver))
          )
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-fields'},
            field('Nome', nameInput),
            field('Telefono', phoneInput),
            field('Contratto', contractDropdown.root),
            field('Retribuzione', payDropdown.root),
            field('Camion predefinito', truckDropdown.root),
            field('Rimorchio predefinito', trailerDropdown.root),
            field('Scadenza patente', patentePicker.root),
            field('Scadenza CQC', cqcPicker.root),
            field('Visita medica', medicalPicker.root),
            field('Tessera tachigrafo', tachoPicker.root)
          ),
          el('div',{class:'ops-inline-actions'},
            el('button',{class:'btn brand',type:'button',onclick:saveProfile},'Salva profilo'),
            el('button',{class:'btn red',type:'button',onclick:deleteDriver},'Elimina autista')
          ),
          feedback
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Documenti allegati'),
              el('div',{class:'ops-panel-sub'},'Patente, CQC, certificazioni e altri file')
            ),
            el('div',{class:'ops-inline-actions'}, fileLabel, uploadBtn)
          ),
          attachmentsList
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Movimenti economici'),
              el('div',{class:'ops-panel-sub'},'Storico stipendio, trasferte, anticipi e trattenute')
            ),
            el('span',{class:`ops-pill ${entry.saldo>=0?'good':'danger'}`}, `Saldo ${fmtMoney(entry.saldo)}`)
          ),
          el('div',{class:'ops-fields'},
            field('Tipologia', movementTypeDropdown.root),
            field('Importo', movementAmountInput.input),
            field('Nota', movementNote)
          ),
          el('div',{class:'ops-inline-actions'},
            el('button',{class:'btn green',type:'button',onclick:addMovement},'Registra movimento')
          ),
          movementFeedback,
          payrollList
        )
      )
    }

    const refresh=()=>{
      const rows=buildRows()
      const docCount=rows.reduce((acc,row)=>acc+row.attachments.length,0)
      const assigned=rows.filter(row=>row.driver.camionId||row.driver.rimorchioId).length
      const saldo=rows.reduce((acc,row)=>acc+row.saldo,0)
      stats.replaceChildren(
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Autisti'),
          el('div',{class:'value'}, rows.length.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, rows.length?'Fascicoli attivi':'Nessun autista registrato')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Documenti caricati'),
          el('div',{class:'value'}, docCount.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},'Archivio digitale autisti')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Mezzi assegnati'),
          el('div',{class:'value'}, assigned.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, rows.length?`${assigned}/${rows.length} con assegnazione`:'-')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Saldo movimenti'),
          el('div',{class:'value'}, fmtMoney(saldo)),
          el('div',{class:'muted',style:'font-size:12px'}, saldo>=0?'A favore autisti':'Da recuperare')
        )
      )

      const filtered=rows.filter(row=>{
        if(!state.search) return true
        const hay=`${row.driver.name||''} ${row.driver.phone||''}`.toLowerCase()
        return hay.includes(state.search)
      }).sort((a,b)=>(a.driver.name||'').localeCompare(b.driver.name||'','it',{sensitivity:'base'}))

      if(selectedId && !rows.some(row=>row.driver.id===selectedId)) selectedId=null
      if(filtered.length && (!selectedId || !filtered.some(row=>row.driver.id===selectedId))) selectedId=filtered[0].driver.id
      if(!selectedId) selectedId=rows[0]?.driver?.id || null
      const selected=rows.find(row=>row.driver.id===selectedId) || null

      listInfo.textContent=filtered.length?fmtCount(filtered.length,'autista','autisti'):'Nessun autista'
      listWrap.replaceChildren()
      if(!filtered.length){
        listWrap.append(el('div',{class:'ops-empty'},'Nessun autista trovato con i filtri correnti.'))
      }else{
        filtered.forEach(entry=>{
          const driver=entry.driver
          const active=driver.id===selectedId
          listWrap.append(el('div',{class:`ops-list-item${active?' active':''}`,onclick:()=>{selectedId=driver.id; refresh()}},
            el('div',{class:'ops-list-head'},
              el('div',{},
                el('div',{class:'ops-list-title'}, driver.name||'Autista senza nome'),
                el('div',{class:'ops-list-sub'}, driver.phone||'Telefono non indicato')
              ),
              el('div',{class:'ops-list-pills'},
                entry.docs.expired?el('span',{class:'ops-pill danger'}, `${entry.docs.expired} scadute`):null,
                entry.docs.soon?el('span',{class:'ops-pill warn'}, `${entry.docs.soon} in arrivo`):null
              )
            ),
            el('div',{class:'ops-list-pills'},
              el('span',{class:'ops-pill neutral'}, payLabel(driver)),
              (driver.camionId||driver.rimorchioId)?el('span',{class:'ops-pill brand'},'Mezzo assegnato'):null,
              entry.attachments.length?el('span',{class:'ops-pill neutral'}, `${entry.attachments.length} file`):null
            ),
            el('div',{class:'ops-metrics'},
              el('span',{},`Saldo ${fmtMoney(entry.saldo)}`),
              el('span',{},`Movimenti ${entry.payroll.length.toLocaleString('it-IT')}`)
            )
          ))
        })
      }

      renderDetail(selected)
    }

    leftPanel.append(
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Elenco autisti'),
          el('div',{class:'ops-panel-sub'},'Seleziona un fascicolo per gestione completa')
        ),
        listInfo
      ),
      el('div',{class:'ops-toolbar'}, search),
      listWrap,
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Nuovo autista'),
          el('div',{class:'ops-panel-sub'},'Inserimento rapido in anagrafica')
        )
      ),
      el('div',{class:'ops-fields'}, addName, addPhone),
      el('div',{class:'ops-inline-actions'}, addBtn),
      addFeedback
    )

    refresh()
    wrap.append(hero, stats, grid)
    return wrap
  }

  // Flotta: camion/rimorchio + assicurazione con allegati
  const Flotta=()=>{
    const wrap=el('div',{class:'ops-suite'})
    const state={search:'',type:'all'}
    let selectedId=null

    const hero=el('div',{class:'ops-hero'},
      el('div',{class:'ops-hero-title'},'Flotta'),
      el('div',{class:'ops-hero-sub'},'Gestione completa mezzi con scadenze operative, documenti, costi ricorrenti e visibilita sui viaggi assegnati.')
    )
    const stats=el('div',{class:'kpi-grid'})
    const leftPanel=el('div',{class:'ops-panel'})
    const rightPanel=el('div',{class:'ops-panel'})
    const grid=el('div',{class:'ops-main-grid'}, leftPanel, rightPanel)

    const search=el('input',{
      class:'input',
      type:'search',
      placeholder:'Cerca mezzo per targa o modello',
      oninput:(e)=>{state.search=(e.target.value||'').trim().toLowerCase(); refresh()}
    })
    const typeDropdown=createDropdown({
      value:'all',
      placeholder:'Tipologia',
      options:[
        {value:'all',label:'Tutte le tipologie'},
        {value:'Camion',label:'Camion'},
        {value:'Rimorchio',label:'Rimorchi'}
      ],
      onSelect:(val)=>{state.type=val||'all'; refresh()}
    })
    const listInfo=el('div',{class:'filters-count'})
    const listWrap=el('div',{class:'ops-list'})

    let addType='Camion'
    let addLeasing='no'
    let addCanone=null
    let addCost=null
    let addFuel=null
    const addTypeDropdown=createDropdown({
      value:'Camion',
      placeholder:'Tipologia mezzo',
      options:[{value:'Camion',label:'Camion'},{value:'Rimorchio',label:'Rimorchio'}],
      onSelect:(val)=>{addType=val||'Camion'}
    })
    const addLeasingDropdown=createDropdown({
      value:'no',
      placeholder:'Modalita acquisto',
      options:[{value:'no',label:'Acquisto'},{value:'si',label:'Leasing'}],
      onSelect:(val)=>{addLeasing=val||'no'}
    })
    const addModel=el('input',{class:'input',placeholder:'Modello'})
    const addPlate=el('input',{class:'input',placeholder:'Targa'})
    const addKm=el('input',{class:'input',type:'number',placeholder:'Km attuali'})
    const addCanoneInput=createCurrencyInput(null,{onChange:(val)=>{addCanone=val}})
    const addCostInput=createCurrencyInput(null,{onChange:(val)=>{addCost=val}})
    const addFuelInput=createCurrencyInput(null,{onChange:(val)=>{addFuel=val}})
    const addFeedback=el('div',{class:'ops-note'})
    const addBtn=el('button',{class:'btn brand',type:'button',onclick:()=>{
      const model=(addModel.value||'').trim()
      const plate=(addPlate.value||'').trim()
      if(!model && !plate){
        addFeedback.textContent='Inserisci almeno modello o targa.'
        addModel.focus()
        return
      }
      const id=crypto.randomUUID()
      const kmValueRaw=parseFloat(String(addKm.value||'').replace(',','.'))
      const kmValue=Number.isNaN(kmValueRaw)?null:kmValueRaw
      add('fleet',{
        id,
        tipo:addType,
        modello:model,
        targa:plate,
        assScad:'',
        assNome:'',
        assStradale:'',
        assStradaleScad:'',
        revisioneScad:'',
        bolloScad:'',
        tachoScad:'',
        leasing:addLeasing==='si',
        canoneLeasing:addCanone,
        costoAcquisto:addCost,
        km:kmValue,
        carburanteMensile:addFuel,
        attachments:[]
      })
      selectedId=id
      addModel.value=''
      addPlate.value=''
      addKm.value=''
      addCanoneInput.setValue(null)
      addCostInput.setValue(null)
      addFuelInput.setValue(null)
      addFeedback.textContent='Mezzo aggiunto alla flotta.'
      refresh()
    }},'Aggiungi mezzo')

    const parseDate=(value)=>{
      if(!value) return null
      const date=new Date(value.includes('T')?value:`${value}T00:00:00`)
      return isNaN(date.getTime())?null:date
    }
    const dateDiff=(date)=>{
      if(!date) return null
      const today=new Date()
      today.setHours(0,0,0,0)
      return Math.round((date-today)/(1000*60*60*24))
    }
    const deadlineEntries=(vehicle)=>[
      {id:'assScad',label:'Assicurazione',value:vehicle.assScad},
      {id:'revisioneScad',label:'Revisione',value:vehicle.revisioneScad},
      {id:'bolloScad',label:'Bollo',value:vehicle.bolloScad},
      {id:'assStradaleScad',label:'Assistenza stradale',value:vehicle.assStradaleScad},
      {id:'tachoScad',label:'Tachigrafo',value:vehicle.tachoScad}
    ].map(entry=>{
      const date=parseDate(entry.value)
      const diff=dateDiff(date)
      return {...entry,date,diff}
    }).filter(entry=>entry.date && entry.diff!=null)

    const summarizeDeadlines=(vehicle)=>{
      const entries=deadlineEntries(vehicle).sort((a,b)=>a.diff-b.diff)
      if(!entries.length) return {cls:'neutral',label:'Nessuna scadenza'}
      const top=entries[0]
      if(top.diff<0) return {cls:'danger',label:`${top.label} scaduta`}
      if(top.diff<=30) return {cls:'warn',label:`${top.label} tra ${top.diff}g`}
      return {cls:'good',label:`${top.label} regolare`}
    }
    const downloadAttachment=(att)=>{
      const bin=atob(att.data)
      const arr=new Uint8Array(bin.length)
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i)
      const blob=new Blob([arr],{type:att.type||'application/octet-stream'})
      blobDownload(blob, att.name||'documento')
    }

    const buildRows=()=>{
      const trips=list('trips')||[]
      return (list('fleet')||[]).map(vehicle=>{
        const relatedTrips=trips.filter(trip=>vehicle.tipo==='Rimorchio'?trip.rimorchio===vehicle.id:trip.camion===vehicle.id)
        const revenue=relatedTrips.reduce((sum,trip)=>sum+estimateTripRevenue(trip),0)
        const fuel=Number(vehicle.carburanteMensile||0)
        const margin=revenue-fuel
        const deadlines=deadlineEntries(vehicle)
        const expired=deadlines.filter(item=>item.diff<0).length
        const soon=deadlines.filter(item=>item.diff>=0 && item.diff<=30).length
        const summary=summarizeDeadlines(vehicle)
        return {vehicle,relatedTrips,revenue,margin,deadlines,expired,soon,summary}
      })
    }

    const renderDetail=(entry)=>{
      rightPanel.replaceChildren()
      if(!entry){
        rightPanel.append(
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Scheda mezzo'),
              el('div',{class:'ops-panel-sub'},'Seleziona un mezzo dalla lista per aprire il dettaglio')
            )
          ),
          el('div',{class:'ops-empty'},'Nessun mezzo selezionato.')
        )
        return
      }

      const vehicle=entry.vehicle
      let typeValue=vehicle.tipo||'Camion'
      let leasingValue=vehicle.leasing?'si':'no'
      let assDate=vehicle.assScad||''
      let revDate=vehicle.revisioneScad||''
      let bolloDate=vehicle.bolloScad||''
      let roadDate=vehicle.assStradaleScad||''
      let tachoDate=vehicle.tachoScad||''
      let canoneValue=vehicle.canoneLeasing!=null?Number(vehicle.canoneLeasing):null
      let costValue=vehicle.costoAcquisto!=null?Number(vehicle.costoAcquisto):null
      let fuelValue=vehicle.carburanteMensile!=null?Number(vehicle.carburanteMensile):null

      const typeSelect=createDropdown({
        value:typeValue,
        placeholder:'Tipologia',
        options:[{value:'Camion',label:'Camion'},{value:'Rimorchio',label:'Rimorchio'}],
        onSelect:(val)=>{typeValue=val||'Camion'}
      })
      const leasingSelect=createDropdown({
        value:leasingValue,
        placeholder:'Modalita',
        options:[{value:'no',label:'Acquisto'},{value:'si',label:'Leasing'}],
        onSelect:(val)=>{leasingValue=val||'no'}
      })
      const modelInput=el('input',{class:'input',value:vehicle.modello||'',placeholder:'Modello'})
      const plateInput=el('input',{class:'input',value:vehicle.targa||'',placeholder:'Targa'})
      const insuranceNameInput=el('input',{class:'input',value:vehicle.assNome||'',placeholder:'Compagnia assicurativa'})
      const roadsideNameInput=el('input',{class:'input',value:vehicle.assStradale||'',placeholder:'Assistenza stradale'})
      const kmInput=el('input',{class:'input',type:'number',value:vehicle.km!=null?String(vehicle.km):'',placeholder:'Km attuali'})
      const assPicker=createDateField({value:assDate,placeholder:'Scadenza assicurazione',onChange:(val)=>{assDate=val||''}})
      const revPicker=createDateField({value:revDate,placeholder:'Scadenza revisione',onChange:(val)=>{revDate=val||''}})
      const bolloPicker=createDateField({value:bolloDate,placeholder:'Scadenza bollo',onChange:(val)=>{bolloDate=val||''}})
      const roadPicker=createDateField({value:roadDate,placeholder:'Scadenza assistenza',onChange:(val)=>{roadDate=val||''}})
      const tachoPicker=createDateField({value:tachoDate,placeholder:'Scadenza tachigrafo',onChange:(val)=>{tachoDate=val||''}})
      const canoneInput=createCurrencyInput(canoneValue,{onChange:(val)=>{canoneValue=val}})
      const costInput=createCurrencyInput(costValue,{onChange:(val)=>{costValue=val}})
      const fuelInput=createCurrencyInput(fuelValue,{onChange:(val)=>{fuelValue=val}})

      const feedback=el('div',{class:'ops-note'})
      const saveVehicle=()=>{
        const kmRaw=parseFloat(String(kmInput.value||'').replace(',','.'))
        const kmValue=Number.isNaN(kmRaw)?null:kmRaw
        put('fleet',vehicle.id,{
          tipo:typeValue,
          modello:(modelInput.value||'').trim(),
          targa:(plateInput.value||'').trim(),
          assNome:(insuranceNameInput.value||'').trim(),
          assScad:assDate,
          revisioneScad:revDate,
          bolloScad:bolloDate,
          assStradale:(roadsideNameInput.value||'').trim(),
          assStradaleScad:roadDate,
          tachoScad:tachoDate,
          leasing:leasingValue==='si',
          canoneLeasing:canoneValue,
          costoAcquisto:costValue,
          carburanteMensile:fuelValue,
          km:kmValue
        })
        feedback.textContent='Scheda mezzo aggiornata.'
        refresh()
      }
      const deleteVehicle=async()=>{
        const ok=await askConfirm({
          title:'Elimina mezzo',
          message:`Vuoi eliminare ${vehicle.targa||vehicle.modello||'questo mezzo'} dalla flotta?`,
          confirmLabel:'Elimina',
          cancelLabel:'Annulla',
          tone:'danger'
        })
        if(!ok) return
        remove('fleet',vehicle.id)
        selectedId=null
        refresh()
      }

      const attachmentsList=el('div',{class:'ops-doc-list'})
      const renderAttachments=()=>{
        attachmentsList.replaceChildren()
        const attachments=vehicle.attachments||[]
        if(!attachments.length){
          attachmentsList.append(el('div',{class:'ops-empty'},'Nessun allegato per questo mezzo.'))
          return
        }
        attachments.forEach(att=>{
          attachmentsList.append(el('div',{class:'ops-doc-item'},
            el('div',{class:'ops-doc-main'},
              el('strong',{}, att.name||'Documento'),
              el('span',{}, `${att.size?`${Math.round(att.size/1024)} KB`:'-'} · ${fmtDateDisplay(att.ts||'')}`)
            ),
            el('div',{class:'ops-inline-actions'},
              el('button',{class:'btn ghost',type:'button',onclick:()=>downloadAttachment(att)},'Scarica'),
              el('button',{class:'btn red',type:'button',onclick:()=>{
                const next=(vehicle.attachments||[]).filter(x=>x.id!==att.id)
                put('fleet',vehicle.id,{attachments:next})
                refresh()
              }},'Elimina')
            )
          ))
        })
      }

      const filePicker=el('input',{type:'file',multiple:true})
      const fileLabel=el('label',{class:'file'}, el('span',{class:'tag'},'Scegli file'), filePicker)
      const uploadBtn=el('button',{class:'btn ghost',type:'button',onclick:async()=>{
        if(!filePicker.files?.length) return
        const next=[...(vehicle.attachments||[])]
        for(const file of filePicker.files){
          const data=await fileToBase64(file)
          next.push({id:crypto.randomUUID(),name:file.name,size:file.size,type:file.type,data,ts:new Date().toISOString()})
        }
        put('fleet',vehicle.id,{attachments:next})
        filePicker.value=''
        refresh()
      }},'Carica allegati')

      const tripPreview=entry.relatedTrips.slice(0,5)
      renderAttachments()

      rightPanel.append(
        el('div',{class:'ops-panel-head'},
          el('div',{},
            el('div',{class:'ops-panel-title'}, `${vehicle.targa||vehicle.modello||'Mezzo'} · ${vehicle.tipo||'-'}`),
            el('div',{class:'ops-panel-sub'}, `ID ${vehicle.id}`)
          ),
          el('div',{class:'ops-list-pills'},
            el('span',{class:`ops-pill ${entry.summary.cls}`}, entry.summary.label),
            el('span',{class:'ops-pill neutral'}, `${entry.relatedTrips.length.toLocaleString('it-IT')} viaggi`)
          )
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-fields'},
            field('Tipologia', typeSelect.root),
            field('Modello', modelInput),
            field('Targa', plateInput),
            field('Modalita acquisizione', leasingSelect.root),
            field('Canone leasing / mese', canoneInput.input),
            field('Costo acquisto', costInput.input),
            field('Carburante / mese', fuelInput.input),
            field('Km attuali', kmInput),
            field('Assicurazione', insuranceNameInput),
            field('Scadenza assicurazione', assPicker.root),
            field('Assistenza stradale', roadsideNameInput),
            field('Scadenza assistenza', roadPicker.root),
            field('Scadenza revisione', revPicker.root),
            field('Scadenza bollo', bolloPicker.root),
            field('Scadenza tachigrafo', tachoPicker.root)
          ),
          el('div',{class:'ops-inline-actions'},
            el('button',{class:'btn brand',type:'button',onclick:saveVehicle},'Salva mezzo'),
            el('button',{class:'btn red',type:'button',onclick:deleteVehicle},'Elimina mezzo')
          ),
          feedback
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'KPI operativi'),
              el('div',{class:'ops-panel-sub'},'Valutazione economica e carico viaggi del mezzo')
            )
          ),
          el('div',{class:'ops-metrics'},
            el('span',{},'Ricavi stimati ', el('span',{class:'ops-metric-strong'},fmtMoney(entry.revenue))),
            el('span',{},'Carburante ', el('span',{class:'ops-metric-strong'},fmtMoney(vehicle.carburanteMensile||0))),
            el('span',{},'Margine ', el('span',{class:'ops-metric-strong'},fmtMoney(entry.margin)))
          ),
          tripPreview.length
            ? el('div',{class:'ops-doc-list'},
              ...tripPreview.map(trip=>el('div',{class:'ops-doc-item'},
                el('div',{class:'ops-doc-main'},
                  el('strong',{}, `${trip.cliente||'Cliente'} · ${trip.origine||'-'} -> ${trip.arrivo||'-'}`),
                  el('span',{}, `${trip.stato||'Da fare'} · ${fmtDateDisplay(trip.dataCarico||trip.dataScarico||'')}`)
                ),
                el('span',{class:'ops-pill brand'}, fmtMoney(estimateTripRevenue(trip)))
              ))
            )
            : el('div',{class:'ops-empty'},'Nessun viaggio associato a questo mezzo.')
        ),
        el('div',{class:'ops-detail-grid'},
          el('div',{class:'ops-panel-head'},
            el('div',{},
              el('div',{class:'ops-panel-title'},'Documentazione mezzo'),
              el('div',{class:'ops-panel-sub'},'Libretto, polizze, certificati e prove documentali')
            ),
            el('div',{class:'ops-inline-actions'}, fileLabel, uploadBtn)
          ),
          attachmentsList
        )
      )
    }

    const refresh=()=>{
      const rows=buildRows()
      const allDeadlines=rows.flatMap(row=>row.deadlines)
      const expired=allDeadlines.filter(item=>item.diff<0).length
      const soon=allDeadlines.filter(item=>item.diff>=0 && item.diff<=30).length
      const leasingCount=rows.filter(row=>row.vehicle.leasing).length
      stats.replaceChildren(
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Mezzi censiti'),
          el('div',{class:'value'}, rows.length.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, rows.length?'Parco mezzi attivo':'Nessun mezzo registrato')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Scadenze scadute'),
          el('div',{class:'value'}, expired.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},'Da regolarizzare')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'In scadenza (30g)'),
          el('div',{class:'value'}, soon.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'},'Da pianificare')
        ),
        el('div',{class:'kpi'},
          el('div',{class:'label'},'Mezzi in leasing'),
          el('div',{class:'value'}, leasingCount.toLocaleString('it-IT')),
          el('div',{class:'muted',style:'font-size:12px'}, rows.length?`${leasingCount}/${rows.length}`:'-')
        )
      )

      const filtered=rows.filter(row=>{
        const vehicle=row.vehicle
        if(state.search){
          const hay=`${vehicle.targa||''} ${vehicle.modello||''}`.toLowerCase()
          if(!hay.includes(state.search)) return false
        }
        if(state.type!=='all' && vehicle.tipo!==state.type) return false
        return true
      }).sort((a,b)=>{
        const aLabel=`${a.vehicle.targa||''} ${a.vehicle.modello||''}`.trim().toLowerCase()
        const bLabel=`${b.vehicle.targa||''} ${b.vehicle.modello||''}`.trim().toLowerCase()
        return aLabel.localeCompare(bLabel,'it',{sensitivity:'base'})
      })

      if(selectedId && !rows.some(row=>row.vehicle.id===selectedId)) selectedId=null
      if(filtered.length && (!selectedId || !filtered.some(row=>row.vehicle.id===selectedId))) selectedId=filtered[0].vehicle.id
      if(!selectedId) selectedId=rows[0]?.vehicle?.id || null
      const selected=rows.find(row=>row.vehicle.id===selectedId) || null

      listInfo.textContent=filtered.length?fmtCount(filtered.length,'mezzo','mezzi'):'Nessun mezzo'
      listWrap.replaceChildren()
      if(!filtered.length){
        listWrap.append(el('div',{class:'ops-empty'},'Nessun mezzo trovato con i filtri attivi.'))
      }else{
        filtered.forEach(entry=>{
          const vehicle=entry.vehicle
          const active=vehicle.id===selectedId
          listWrap.append(el('div',{class:`ops-list-item${active?' active':''}`,onclick:()=>{selectedId=vehicle.id; refresh()}},
            el('div',{class:'ops-list-head'},
              el('div',{},
                el('div',{class:'ops-list-title'}, vehicle.targa||vehicle.modello||'Mezzo senza identificativo'),
                el('div',{class:'ops-list-sub'}, `${vehicle.tipo||'-'}${vehicle.modello?` · ${vehicle.modello}`:''}`)
              ),
              el('span',{class:`ops-pill ${entry.summary.cls}`}, entry.summary.label)
            ),
            el('div',{class:'ops-list-pills'},
              vehicle.leasing?el('span',{class:'ops-pill brand'},'Leasing'):el('span',{class:'ops-pill neutral'},'Acquisto'),
              entry.expired?el('span',{class:'ops-pill danger'}, `${entry.expired} scadute`):null,
              entry.soon?el('span',{class:'ops-pill warn'}, `${entry.soon} in arrivo`):null
            ),
            el('div',{class:'ops-metrics'},
              el('span',{},`Viaggi ${entry.relatedTrips.length.toLocaleString('it-IT')}`),
              el('span',{},`Ricavi ${fmtMoney(entry.revenue)}`),
              el('span',{},`Margine ${fmtMoney(entry.margin)}`)
            )
          ))
        })
      }

      renderDetail(selected)
    }

    leftPanel.append(
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Parco mezzi'),
          el('div',{class:'ops-panel-sub'},'Seleziona un veicolo per aprire la scheda completa')
        ),
        listInfo
      ),
      el('div',{class:'ops-toolbar'}, search, typeDropdown.root),
      listWrap,
      el('div',{class:'ops-panel-head'},
        el('div',{},
          el('div',{class:'ops-panel-title'},'Nuovo mezzo'),
          el('div',{class:'ops-panel-sub'},'Inserimento rapido veicolo')
        )
      ),
      el('div',{class:'ops-fields'},
        field('Tipologia', addTypeDropdown.root),
        field('Modalita', addLeasingDropdown.root),
        field('Modello', addModel),
        field('Targa', addPlate),
        field('Km attuali', addKm),
        field('Canone leasing / mese', addCanoneInput.input),
        field('Costo acquisto', addCostInput.input),
        field('Carburante / mese', addFuelInput.input)
      ),
      el('div',{class:'ops-inline-actions'}, addBtn),
      addFeedback
    )

    refresh()
    wrap.append(hero, stats, grid)
    return wrap
  }

  // Viaggi: gestione con procedura guidata e allegati
  const Viaggi=()=>{
    const wrap=el('div',{})
    const heading=el('div',{style:'display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px'},

    const filters={search:'',cliente:'',azienda:'',stato:'',priorita:'',autista:'',from:'',to:''}

    const aziendaDropdown=createDropdown({
      value:'',

    const statoDropdown=createDropdown({

        {value:'',label:'Tutti gli stati'},

      ],
      onSelect:(val)=>{filters.stato=val||''; expanded.clear(); refresh()}
    })
    const prioritaDropdown=createDropdown({
      value:'',
      placeholder:'Priorità',
      options:[
        {value:'',label:'Tutte le priorità'},
        {value:'Alta',label:'Alta',color:'#ff1744'},
        {value:'Normale',label:'Normale',color:'#38bdf8'},
        {value:'Bassa',label:'Bassa',color:'#94a3b8'}
      ],
      onSelect:(val)=>{filters.priorita=val||''; expanded.clear(); refresh()}
    })
    const driverOptions=[{value:'',label:'Tutti gli autisti'}].concat(list('drivers').map(d=>({value:d.id,label:d.name||d.id,sub:d.phone||''})))
    const autistaDropdown=createDropdown({
      value:'',
      placeholder:'Autista',
      options:driverOptions,
      onSelect:(val)=>{filters.autista=val||''; expanded.clear(); refresh()}
    })
    const dateFromPicker=createDateField({
      value:'',
      placeholder:'Dal',
      onChange:(val)=>{filters.from=val||''; expanded.clear(); refresh()}
    })
    const dateToPicker=createDateField({
      value:'',
      placeholder:'Al',
      onChange:(val)=>{filters.to=val||''; expanded.clear(); refresh()}
    })
    dateFromPicker.root.style.minWidth='150px'
    dateFromPicker.root.style.flex='0 0 150px'
    dateToPicker.root.style.minWidth='150px'
    dateToPicker.root.style.flex='0 0 150px'
    const resultsInfo=el('div',{class:'filters-count'},'')
    const clearFilters=el('button',{class:'btn ghost',type:'button',onclick:()=>{
      filters.search=''
      filters.cliente=''
      filters.azienda=''
      filters.stato=''
      filters.priorita=''
      filters.autista=''
      filters.from=''
      filters.to=''
      expanded.clear()
      searchInput.value=''
      clienteInput.value=''
      aziendaDropdown.setValue('')
      statoDropdown.setValue('')
      prioritaDropdown.setValue('')
      autistaDropdown.setValue('')
      dateFromPicker.setValue('')
      dateToPicker.setValue('')
      refresh()
    }},'Azzera filtri')
    let filtersOpen=false
    const filterIcon=icon('M5 4h14l-6 8v8l-4-2v-6z')
    filterIcon.style.width='16px'
    filterIcon.style.height='16px'
    const filterButton=el('button',{class:'filter-button',type:'button'}, filterIcon, el('span',{},'Filtra'))
    const filtersPanel=el('div',{class:'filters-panel'}, clienteInput, aziendaDropdown.root, statoDropdown.root, prioritaDropdown.root, autistaDropdown.root, dateFromPicker.root, dateToPicker.root, clearFilters)
    clearFilters.style.marginLeft='auto'
    const updateFilterVisibility=()=>{
      filtersPanel.classList.toggle('open', filtersOpen)
      filterButton.classList.toggle('active', filtersOpen)
    }
    filterButton.onclick=()=>{filtersOpen=!filtersOpen; updateFilterVisibility()}
    const filtersTop=el('div',{class:'filters-top'}, searchInput, filterButton, resultsInfo)
    updateFilterVisibility()
    wrap.append(heading, filtersTop, filtersPanel, table)

    const statusBadge=(status)=>{
      const map={'Completato':'status-green','In corso':'status-orange','Da fare':'status-gray'}
      const cls=map[status]||'status-gray'
      return el('span',{class:`badge ${cls}`}, status||'-')
    }

    function fmtDate(d){
      if(!d) return '-'
      return fmtDateDisplay(d)
    }

    function describeTariff(t){
      if(!t) return '-'
      if(t.tipo==='A tonnellata'){
        return t.prezzoTonnellata!=null ? `A tonnellata · ${formatCurrencyValue(t.prezzoTonnellata)} / t` : 'A tonnellata · da definire'
      }
      return t.prezzo!=null ? `A viaggio · ${formatCurrencyValue(t.prezzo)}` : 'A viaggio · da definire'
    }
    const validateTripPayload=(payload)=>{
      const errors=[]
      const cliente=(payload?.cliente||'').trim()
      const origine=(payload?.origine||'').trim()
      const arrivo=(payload?.arrivo||'').trim()
      if(!cliente) errors.push('Cliente obbligatorio.')
      if(!origine) errors.push('Origine obbligatoria.')
      if(!arrivo) errors.push('Arrivo obbligatorio.')
      const dataCarico=(payload?.dataCarico||'').trim()
      const dataScarico=(payload?.dataScarico||'').trim()
      if(!dataCarico && !dataScarico){
        errors.push('Indica almeno una data tra carico e scarico.')
      }
      if(dataCarico && dataScarico && dataCarico>dataScarico){
        errors.push('La data di carico non può essere successiva alla data di scarico.')
      }
      const weightUnit=(payload?.pesoUnit||'').trim()||'t'
      if(!['kg','q','t'].includes(weightUnit)){
        errors.push('Unità peso non valida. Usa kg, q o t.')
      }
      if(payload?.peso!=null && payload?.peso!=='' && !(Number(payload.peso)>0)){
        errors.push('Il peso, se indicato, deve essere maggiore di zero.')
      }
      const tariffa=payload?.tariffa||{}
      if((tariffa.tipo||'A tonnellata')==='A tonnellata'){
        if(!(Number(tariffa.prezzoTonnellata)>0)){
          errors.push('Tariffa "A tonnellata": inserisci un prezzo/tonnellata maggiore di zero.')
        }
        if(!(Number(payload?.peso)>0)){
          errors.push('Tariffa "A tonnellata": il peso è obbligatorio.')
        }
      }else{
        if(!(Number(tariffa.prezzo)>0)){
          errors.push('Tariffa "A viaggio": inserisci un prezzo maggiore di zero.')
        }
      }
      return errors
    }
    const openTripWizard=(trip)=>{
      const normalizeDocType=(value)=>{
        const raw=(value||'').toString().toLowerCase()
        if(!raw) return 'DDT'
        if(raw.includes('form')) return 'FR'
        return value
      }
      const isEdit=Boolean(trip)
      const initialAttachments=(trip?.attachments||[]).map(a=>({...a}))
      const state={
        cliente:trip?.cliente||'',
        saveCliente:false,
        azienda:trip?.azienda||'Unitrans Srl',
        caricoAzienda:trip?.caricoAzienda||'',
        origine:trip?.origine||'',
        scaricoAzienda:trip?.scaricoAzienda||'',
        arrivo:trip?.arrivo||'',
        autista:trip?.autista||'',
        camion:trip?.camion||'',
        rimorchio:trip?.rimorchio||'',
        riferimento:trip?.riferimento||'',
        priorita:trip?.priorita||'Normale',
        tipoTrasporto:trip?.tipoTrasporto||'',
        documentoTipo:normalizeDocType(trip?.documento?.tipo)||'DDT',
        documentoNumero:trip?.documento?.numero||'',
        tariffaTipo:trip?.tariffa?.tipo||'A tonnellata',
        prezzoViaggio:trip?.tariffa?.tipo==='A viaggio' && trip?.tariffa?.prezzo!=null ? Number(trip.tariffa.prezzo):null,
        prezzoTonnellata:trip?.tariffa?.tipo==='A tonnellata' && trip?.tariffa?.prezzoTonnellata!=null ? Number(trip.tariffa.prezzoTonnellata):null,
        stato:trip?.stato||'Da fare',
        dataCarico:trip?.dataCarico||'',
        dataScarico:trip?.dataScarico||'',
        attachments:initialAttachments,
        peso:trip?.peso!=null?Number(trip.peso):null,
        pesoUnit:trip?.pesoUnit||'t',
        note:trip?.note||''
      }
      const initialSnapshot=JSON.stringify(state)
      let draftId=isEdit? trip.id : null
      let stepIndex=0
      const overlay=el('div',{class:'modal-backdrop'})
      overlay.tabIndex=0
      const card=el('div',{class:'modal-card'})
      const title=el('div',{class:'modal-title'})
      const stepInfo=el('div',{class:'step-indicator'})
      const body=el('div',{class:'modal-body'})
      const error=el('div')
      uiShowInlineError(error,[])
      const back=el('button',{class:'btn ghost'},'Indietro')
      const next=el('button',{class:'btn brand'},'Avanti')
      const cancel=el('button',{class:'btn ghost'},'Chiudi')
      const footerLeft=el('div',{class:'row',style:'gap:8px'}, cancel, back)
      const footerRight=el('div',{class:'row',style:'gap:8px'}, next)
      const footer=el('div',{class:'modal-footer'}, footerLeft, footerRight)
      card.append(title, stepInfo, body, error, footer)
      overlay.append(card)
      document.body.append(overlay)

      const close=()=>{
        overlay.removeEventListener('keydown', handleOverlayKeydown)
        overlay.removeEventListener('click', onBackdropClick)
        overlay.remove()
      }
      const setError=(errors=[])=>uiShowInlineError(error,errors)
      const getSuggestions=()=>{
        const fromCustomers=list('customers').map(c=>c.name).filter(Boolean)
        const fromTrips=list('trips').map(t=>t.cliente).filter(Boolean)
        return Array.from(new Set([...fromCustomers,...fromTrips])).filter(Boolean)
      }
      const hasMeaningfulData=()=>{
        return Boolean(
          (state.cliente||'').trim() ||
          (state.origine||'').trim() ||
          (state.arrivo||'').trim() ||
          (state.riferimento||'').trim() ||
          (state.tipoTrasporto||'').trim() ||
          state.azienda!=='Unitrans Srl' ||
          (state.caricoAzienda||'').trim() ||
          (state.scaricoAzienda||'').trim() ||
          state.tariffaTipo!=='A tonnellata' ||
          state.documentoTipo!=='DDT' ||
          (state.documentoNumero||'').trim() ||
          state.priorita!=='Normale' ||
          state.autista || state.camion || state.rimorchio ||
          state.prezzoViaggio!=null || state.prezzoTonnellata!=null ||
          state.dataCarico || state.dataScarico ||
          state.stato!=='Da fare' ||
          state.peso!=null ||
          state.pesoUnit!=='t' ||
          (state.attachments||[]).length ||
          (state.note||'').trim()
        )
      }
      const buildPayload=(isDraft)=>{
        const name=(state.cliente||'').trim()
        return {
          cliente: name || (isDraft?'Bozza':''),
          azienda:state.azienda,
          caricoAzienda:(state.caricoAzienda||'').trim(),
          origine:(state.origine||'').trim(),
          scaricoAzienda:(state.scaricoAzienda||'').trim(),
          arrivo:(state.arrivo||'').trim(),
          riferimento:(state.riferimento||'').trim(),
          priorita:state.priorita||'Normale',
          autista:state.autista||null,
          camion:state.camion||null,
          rimorchio:state.rimorchio||null,
          tipoTrasporto:(state.tipoTrasporto||'').trim(),
          documento:{tipo:state.documentoTipo, numero:(state.documentoNumero||'').trim()},
          tariffa:{
            tipo:state.tariffaTipo,
            prezzo:state.prezzoViaggio!=null?Number(state.prezzoViaggio):null,
            prezzoTonnellata:state.prezzoTonnellata!=null?Number(state.prezzoTonnellata):null
          },
          stato:state.stato||'Da fare',
          dataCarico:state.dataCarico||null,
          dataScarico:state.dataScarico||null,
          peso:state.peso!=null?Number(state.peso):null,
          pesoUnit:state.pesoUnit||'t',
          attachments:(state.attachments||[]).map(a=>({...a})),
          note:state.note||'',
          draft:isDraft,
          updatedAt:new Date().toISOString()
        }
      }
      const saveDraft=()=>{
        if(JSON.stringify(state)===initialSnapshot && !isEdit) return
        if(JSON.stringify(state)===initialSnapshot && isEdit) return
        if(!hasMeaningfulData()) return
        const payload=buildPayload(true)
        if(isEdit){
          draftId=trip.id
          put('trips', trip.id, payload)
          logEvent('trip_saved',{tripId:trip.id,cliente:payload.cliente||trip.cliente,auto:true},{targetId:trip.id})
        }else if(draftId){
          put('trips', draftId, payload)
          logEvent('trip_draft_saved',{tripId:draftId,cliente:payload.cliente||''},{targetId:draftId})
        }else{
          draftId='T-'+crypto.randomUUID()
          add('trips',{id:draftId,createdAt:new Date().toISOString(),...payload})
          logEvent('trip_draft_saved',{tripId:draftId,cliente:payload.cliente||''},{targetId:draftId})
        }
        refresh()
      }
      const handleExit=()=>{
        saveDraft()
        close()
      }
      const handleOverlayKeydown=(e)=>{
        if(e.key==='Escape'){
          e.preventDefault()
          handleExit()
          return
        }
        if(e.key==='Enter' && !e.defaultPrevented){
          const target=e.target
          if(target && target.closest('.dropdown.open')) return
          if(target && target.closest('.datepicker-panel')) return
          if(target && target.tagName==='TEXTAREA' && e.shiftKey) return
          e.preventDefault()
          if(target && target.tagName==='TEXTAREA'){
            next.click()
            return
          }
          next.click()
        }
      }
      const onBackdropClick=(e)=>{if(e.target===overlay) handleExit()}
      overlay.addEventListener('keydown', handleOverlayKeydown)
      overlay.addEventListener('click', onBackdropClick)
      overlay.focus()

      const downloadAttachment=(att)=>{
        const file=att.file
        if(!file?.data) return
        const bin=atob(file.data)
        const arr=new Uint8Array(bin.length)
        for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i)
        const blob=new Blob([arr],{type:file.type||'application/octet-stream'})
        blobDownload(blob, file.name || att.titolo || 'documento')
      }
      const handleFileSelection=async(kind, file, titolo)=>{
        if(!file) return
        const data=await fileToBase64(file)
        state.attachments=[...(state.attachments||[]),{
          id:'ATT-'+crypto.randomUUID(),
          tipo:kind,
          titolo:titolo,
          file:{name:file.name,size:file.size,type:file.type,data}
        }]
        renderStep()
      }
      const renderAttachmentsSection=()=>{
        const box=el('div',{})
        const listWrap=el('div',{class:'attachments-list'})
        if((state.attachments||[]).length){
          state.attachments.forEach(att=>{
            listWrap.append(
              el('div',{class:'attachments-item'},
                el('div',{}, el('div',{}, att.titolo||att.tipo.toUpperCase()), el('div',{class:'muted'}, att.file?.name||'')),
                el('div',{class:'row',style:'gap:6px'},
                  el('button',{class:'btn ghost',onclick:()=>downloadAttachment(att)},'Scarica'),
                  el('button',{class:'btn red',onclick:()=>{state.attachments=state.attachments.filter(a=>a.id!==att.id); renderStep()}},'Elimina')
                )
              )
            )
          })
        }else{
          listWrap.append(el('span',{class:'muted'},'Nessun documento allegato'))
        }
        const actions=el('div',{class:'attach-actions'},
          el('button',{class:'btn ghost',onclick:async()=>{
            const tipo=await askDocumentType()
            if(!tipo) return
            let titolo
            if(tipo==='altro'){
              titolo=await askTextModal({title:'Titolo documento',placeholder:'Esempio: Contratto fornitore'})
              if(!titolo) return
            }else{
              titolo=tipo==='ddt'?'DDT':'Formulario rifiuti'
            }
            const file=await pickFile()
            if(!file) return
            await handleFileSelection(tipo, file, titolo)
          }},'Aggiungi documento')
        )
        box.append(listWrap, actions)
        return box
      }
      const summaryRow=(label,value)=>el('div',{class:'summary-row'}, el('span',{},label), el('span',{}, value||'-'))
      cancel.onclick=handleExit
      back.onclick=()=>{
        if(stepIndex===0){handleExit(); return}
